- name: "DarkModeTokens"
  definition: "Semantic CSS custom property system for light/dark theme switching (Phase 2-5). Defines 40+ --theme-* tokens on :root (light defaults) and overrides them in [data-bs-theme=dark]. Tokens cover surfaces (body-bg, surface-bg, raised, sunken), text (primary, secondary, muted, on-primary), borders (color, subtle), interactive states (hover-bg, active-bg, selected-bg), focus ring, shadows (xs through xl with RGB channel vars), RGB channel variants for rgba() usage, semantic colors (--theme-primary, --theme-success, --theme-warning, --theme-danger + -rgb variants), input tokens (--theme-input-bg/border/color), --theme-focus-border, and --theme-group-bg-1..5 for GraphCanvas namespace groups. Bootstrap core var overrides (--bs-body-bg/color, --bs-card-bg, --bs-table-*, --bs-link-*, --bs-list-group-*, --bs-heading-color, --bs-card-title-color, --bs-card-subtitle-color) plus class-scoped overrides for .card, .dropdown-menu, .list-group, .pagination, .nav-*, .accordion, .modal (ADR-074). Global Bootstrap utility dark overrides for .btn-outline-secondary, .btn-close, .text-muted, .bg-light, .bg-white, .text-dark, icon color inheritance (ADR-075). ADR-070/073/074/075."
  anchor_file: "src/scss/_dark-mode.scss"
