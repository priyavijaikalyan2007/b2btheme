# AGENT: Architectural Decision Records (ADRs) for the enterprise Bootstrap 5 theme.
# Read this file to understand WHY design choices were made before proposing alternatives.

- id: "ADR-001"
  title: "Use Bootstrap 5 with SCSS variable overrides instead of a custom CSS framework"
  date: "2025-01-01"
  status: "Accepted"
  context: "Need a well-supported, documented component framework. Custom CSS is harder to maintain and lacks community support."
  files: ["src/scss/_variables.scss", "src/scss/custom.scss"]

- id: "ADR-002"
  title: "Use Atkinson Hyperlegible as the primary font"
  date: "2025-01-15"
  status: "Superseded"
  superseded_by: "ADR-009"
  context: "Optimised for readability at small sizes (14px base). Designed by the Braille Institute for maximum legibility."
  files: ["src/scss/_variables.scss", "demo/index.html"]

- id: "ADR-003"
  title: "Zero border radius for all components"
  date: "2025-01-15"
  status: "Accepted"
  context: "Square corners give a sharp, professional appearance suited to enterprise tools. All border-radius variables set to 0."
  files: ["src/scss/_variables.scss"]

- id: "ADR-004"
  title: "Use console.* directly instead of a logging framework"
  date: "2026-02-09"
  status: "Accepted"
  context: "This is a reusable library. Logging abstractions would conflict with host application logging. Direct console calls are predictable and dependency-free."
  files: ["LOGGING.md"]

- id: "ADR-005"
  title: "Compact spacing with 0.75rem base spacer"
  date: "2025-01-15"
  status: "Accepted"
  context: "Enterprise applications need to display dense data. Reduced spacing from Bootstrap default 1rem to 0.75rem saves screen real estate while remaining readable."
  files: ["src/scss/_variables.scss"]

- id: "ADR-006"
  title: "14px base font size instead of Bootstrap default 16px"
  date: "2025-01-15"
  status: "Accepted"
  context: "Smaller font allows more content density. Combined with Atkinson Hyperlegible font, readability is maintained at smaller sizes."
  files: ["src/scss/_variables.scss"]

- id: "ADR-007"
  title: "Vanilla TypeScript for components instead of React or Angular"
  date: "2025-01-01"
  status: "Accepted"
  context: "Components must be framework-agnostic and usable in any web application. No framework dependency means broader compatibility."
  files: ["FRONTEND.md"]

- id: "ADR-008"
  title: "Cloudflare Pages deployment via Wrangler"
  date: "2025-01-01"
  status: "Accepted"
  context: "Cloudflare Pages provides global CDN distribution, automatic HTTPS, and simple deployment for static assets."
  files: ["README.md"]

- id: "ADR-009"
  title: "Use Open Sans for body text and JetBrains Mono for fixed-width text"
  date: "2026-02-09"
  status: "Superseded"
  superseded_by: "ADR-055"
  context: "Open Sans is clean, legible, and well-optimised for screen readability at small sizes (14px). JetBrains Mono provides clear distinction between similar characters (0/O, 1/l/I). Both loaded from Google Fonts with system font fallbacks."
  files: ["src/scss/_variables.scss", "src/scss/_variables-commented.scss", "demo/index.html"]

- id: "ADR-010"
  title: "Auto-generated documentation with themed HTML output"
  date: "2026-02-09"
  status: "Accepted"
  context: "Consumer-facing docs are auto-generated from source files during build. Markdown is produced for agents and GitHub, while themed HTML is generated for human developers. Three docs are fully auto-generated (DESIGN_TOKENS, COMPONENT_REFERENCE, AGENT_QUICK_REF); hand-written docs are also converted to HTML. All HTML uses the enterprise theme CSS as a living demo."
  files: ["scripts/generate-docs.js", "scripts/copy-docs.sh", "docs/INDEX.md", "package.json"]

- id: "ADR-011"
  title: "Sidebar component uses .sidebar-container root class and z-index 1035-1037"
  date: "2026-02-12"
  status: "Accepted"
  context: "The existing .sidebar class in custom.scss styles nav elements. The new Sidebar panel component uses .sidebar-container as its root to avoid CSS collision. Z-index layering: docked=1035 (above Bootstrap fixed 1030), floating=1036, drop zones=1037, all below StatusBar 1040 and modals 1050+."
  files: ["components/sidebar/sidebar.ts", "components/sidebar/sidebar.scss"]

- id: "ADR-012"
  title: "BannerBar z-index 1045, above StatusBar and Sidebar, below modals"
  date: "2026-02-12"
  status: "Accepted"
  context: "The BannerBar is a fixed-top viewport banner that must sit above all other fixed layout elements (Sidebar 1035-1037, StatusBar 1040) but below Bootstrap modals (1050+). Z-index 1045 provides clear separation. Sets --bannerbar-height CSS custom property on <html> for layout offset by Sidebar and other consumers."
  files: ["components/bannerbar/bannerbar.ts", "components/bannerbar/bannerbar.scss", "components/sidebar/sidebar.scss"]

- id: "ADR-013"
  title: "Toolbar z-index 1032 docked, 1033 floating, 1060 popups"
  date: "2026-02-12"
  status: "Accepted"
  context: "The Toolbar is a fixed/floating action bar. Z-index layering: docked=1032, floating=1033 (below Sidebar 1035, StatusBar 1040, BannerBar 1045). Popup z-index (split menus, gallery popups, overflow menus) bumped from 1034 to 1060 — must appear above ALL layout components including modals (1050) since popups are transient and user-initiated. Each toolbar independently sets --toolbar-<position>-size CSS custom properties on <html> for layout offset."
  files: ["components/toolbar/toolbar.ts", "components/toolbar/toolbar.scss"]

- id: "ADR-014"
  title: "Gauge component: single class design with shape option, no animations"
  date: "2026-02-12"
  status: "Accepted"
  context: "One Gauge class with a shape option (tile/ring/bar) rather than three separate classes. Threshold/value/timer logic is >60% shared code. No CSS transitions or animations per user directive — all value changes are instant. Ring shape uses SVG stroke-dasharray/dashoffset technique. Auto-tick timer uses adaptive intervals (1s/1m/5m/1h) based on remaining time to avoid unnecessary DOM updates."
  files: ["components/gauge/gauge.ts", "components/gauge/gauge.scss"]

- id: "ADR-015"
  title: "Custom-build Conversation component instead of adopting open-source"
  date: "2026-02-12"
  status: "Accepted"
  context: "Evaluated 9 open-source chat/conversation libraries (Deep Chat, DHTMLX ChatBot, NLUX, OpenAI ChatKit, PatternFly Chatbot, Chatscope, BotUI, BuildShip Widget, MDB Bootstrap Chat). None covered >60% of requirements. Critical gaps across all: feedback system, copy in multiple formats (MD/HTML/plaintext), configurable message buffer, inline error display with expandable details. Deep Chat's Shadow DOM conflicts with Bootstrap theming. Building custom leverages existing project infrastructure (13 components, Vditor, DOMPurify, established patterns)."
  files: ["components/conversation/conversation.ts", "components/conversation/conversation.scss"]

- id: "ADR-016"
  title: "Custom-build Timeline component instead of adopting open-source"
  date: "2026-02-12"
  status: "Accepted"
  context: "Evaluated 13 open-source timeline/Gantt libraries (vis-timeline, DHTMLX Gantt, Frappe Gantt, Bryntum, TimelineJS, React-Calendar-Timeline, PlanBy, jQuery Gantt, Google Charts Timeline, D3-Timeline, Chronoline.js, TimelinePointer, vis-timeline-graph2d). None exceeded 65% of requirements. vis-timeline scored highest but has 250KB bundle (10x project component size), missing collapse-to-presence-band feature, buggy viewport callbacks, and 265 open issues. Building custom leverages existing project infrastructure (15 components, SVG patterns from Gauge, established DOM helpers and conventions)."
  files: ["components/timeline/timeline.ts", "components/timeline/timeline.scss"]

- id: "ADR-017"
  title: "Custom MCP App iframe renderer instead of @mcp-ui/client SDK"
  date: "2026-02-13"
  status: "Accepted"
  context: "The MCP Apps specification (mcpui.dev, stable 2026-01-26) defines interactive UI rendering via sandboxed iframes with JSON-RPC 2.0 postMessage. The official @mcp-ui/client SDK is React-focused and incompatible with this project's vanilla TypeScript architecture (ADR-007). Built a custom McpAppFrame class (~200 lines) implementing: sandbox='allow-scripts allow-forms' (no allow-same-origin), CSP meta tag injection via srcdoc, event.source validation (not origin — sandboxed iframe origin is 'null'), theme variable pass-through via getComputedStyle, and guest-side mcpBridge with send/onMessage. Canvas side panel uses pointer-capture resize pattern from Sidebar (ADR-011)."
  files: ["components/conversation/conversation.ts", "components/conversation/conversation.scss", "specs/conversation-mcpui.prd.md"]

- id: "ADR-018"
  title: "TabbedPanel shares Sidebar z-index tier (1035-1037) on different viewport edges"
  date: "2026-02-15"
  status: "Accepted"
  context: "TabbedPanel docks to top/bottom edges while Sidebar docks to left/right edges — they never overlap. Sharing the same z-index tier (docked=1035, floating=1036, drop zones=1037) avoids consuming additional z-index space. Both sit above Toolbar (1032-1034), below StatusBar (1040), BannerBar (1045), and modals (1050+). TabbedPanelManager singleton manages CSS custom properties (--tabbedpanel-top-height, --tabbedpanel-bottom-height) independently from SidebarManager."
  files: ["components/tabbedpanel/tabbedpanel.ts", "components/tabbedpanel/tabbedpanel.scss"]

- id: "ADR-019"
  title: "Custom-build TreeView component with HTML5 DnD, nested DOM, and callbacks-only pattern"
  date: "2026-02-15"
  status: "Accepted"
  context: "No open-source Bootstrap 5 tree library covers >60% of requirements (lazy load, multi-select, cross-tree DnD, context menu, inline rename, search, starred, sort, badges, extensible node types). HTML5 Drag and Drop API chosen over pointer events for dataTransfer cross-instance interop. Nested ul/li DOM follows WAI-ARIA tree pattern. Single TreeView class with no Manager — instances are independent. CSS prefix treeview- avoids collision. Context menu z-index 1050 (above all fixed layout elements, below modals). Callbacks only — consumer owns all data mutations. Bootstrap spinner-border-sm for inline node loading, ProgressModal for bulk operations."
  files: ["components/treeview/treeview.ts", "components/treeview/treeview.scss"]

- id: "ADR-020"
  title: "TreeView virtual scrolling with flat DOM for 1M+ node trees"
  date: "2026-02-15"
  status: "Accepted"
  context: "Nested ul/li DOM renders all visible nodes, causing performance cliff at ~5000 visible (60K DOM elements). Virtual scrolling renders only viewport + buffer (~200 elements) using flat divs with explicit aria-level. Activated automatically above 5000 visible nodes or via virtualScrolling: 'enabled'. Node index maps replace O(N) recursive lookups with O(1). Cached flat visible array eliminates per-keystroke O(V) walks. DOM element recycling pool avoids allocation during scroll. Three search strategies: sync (<5K), chunked rAF (>5K), server-side async (onSearchAsync). Incremental DOM updates for addNode/removeNode avoid full rebuild."
  files: ["components/treeview/treeview.ts", "components/treeview/treeview.scss"]

- id: "ADR-021"
  title: "TreeGrid as standalone component (no TreeView subclass)"
  status: "Accepted"
  date: "2026-02-12"
  context: >
    TreeGrid shares many patterns with TreeView (node model, selection, expand/collapse,
    virtual scrolling, DnD) but the 2D columnar layout, cell-level focus model, column
    resize/reorder/sort, and inline cell editing require fundamentally different DOM
    structure and event handling. Subclassing would create a fragile coupling.
  decision: >
    Implement TreeGrid as a standalone class that reimplements shared patterns
    (createElement/setAttr helpers, nodeMap/parentMap O(1) index, cached visible array,
    virtual scrolling) adapted for columnar layout. Use flexbox rows with JS-managed
    column widths rather than CSS Grid.
  consequences:
    - Code duplication of ~200 lines of shared patterns (DOM helpers, node indexing)
    - Freedom to optimize each component independently
    - No coupling between TreeView and TreeGrid lifecycles
    - Simpler testing and maintenance
  files: ["components/treegrid/treegrid.ts", "components/treegrid/treegrid.scss"]

- id: "ADR-022"
  title: "Inline styles for TreeGrid column widths instead of CSS stylesheet injection"
  date: "2026-02-16"
  status: "Accepted"
  context: >
    Initial approach used a dynamically-created <style> element with nth-child CSS selectors
    (e.g., .treegrid-inst-1 .treegrid-header-cell:nth-child(2){width:150px}). This failed
    to produce visual effect — widths changed in the style element but cells did not resize.
    Replaced with direct inline styles (cell.style.width/minWidth/maxWidth) applied to every
    header and body cell via updateColumnStyles(). Called after every body rebuild
    (renderTree, sort, expand/collapse) to keep widths consistent.
  files: ["components/treegrid/treegrid.ts"]

- id: "ADR-023"
  title: "Programmable sorting with per-column comparator and external sort mode"
  date: "2026-02-16"
  status: "Accepted"
  context: >
    Built-in sort initially converted all values to strings before comparing, causing numbers
    to sort lexicographically (8 after 12). Fixed with type-aware defaultCompare() that
    compares numbers numerically and strings case-insensitively. Added per-column comparator
    callback on TreeGridColumn for custom sort logic without replacing the entire sort
    mechanism. Added externalSort boolean on TreeGridOptions — when true, grid only updates
    visual sort indicators and fires onColumnSort callback; application is responsible for
    sorting data and calling refresh().
  files: ["components/treegrid/treegrid.ts"]

- id: "ADR-024"
  title: "Contained mode pattern for layout-aware components"
  date: "2026-02-16"
  status: "Accepted"
  context: >
    Components using position:fixed (Sidebar, Toolbar, StatusBar, TabbedPanel, BannerBar) cannot
    participate in parent layout flow. Added contained:boolean option (default false) to each.
    When contained, position switches from fixed to relative, viewport offsets clear, z-index
    becomes auto, and drag-to-dock is disabled. DockLayout calls setContained(true) automatically
    before mounting children into grid cells. Sidebar and TabbedPanel expose addResizeListener()
    and addCollapseListener() arrays for DockLayout to hook grid template updates. MarkdownEditor
    gains contained option to default height to "100%" instead of "70vh". Fully backward compatible.
  files: ["components/sidebar/sidebar.ts", "components/toolbar/toolbar.ts", "components/statusbar/statusbar.ts", "components/tabbedpanel/tabbedpanel.ts", "components/bannerbar/bannerbar.ts", "components/markdowneditor/markdowneditor.ts", "components/docklayout/docklayout.ts"]

- id: "ADR-025"
  title: "CSS Grid DockLayout with 6 named areas inspired by Java Swing BorderLayout"
  date: "2026-02-16"
  status: "Accepted"
  context: >
    DockLayout uses CSS Grid with grid-template-areas (toolbar/left/center/right/bottom/status)
    and dynamic grid-template-columns/rows inline styles. When sidebars resize or collapse,
    DockLayout updates column widths; when bottom panel resizes/collapses, row heights update.
    Empty slots collapse to 0. Center cell gets 1fr in both dimensions, filling remaining space.
    This mirrors Java Swing BorderLayout where NORTH/SOUTH/EAST/WEST zones auto-size and CENTER
    fills the remainder. Components are auto-contained on mount. Supports container and height/width
    options for nesting layouts within other layouts.
  files: ["components/docklayout/docklayout.ts", "components/docklayout/docklayout.scss"]

- id: "ADR-026"
  title: "Toolbar extensible item types (input, dropdown, label)"
  date: "2026-02-17"
  status: "Accepted"
  context: >
    App builders need more than buttons in toolbars — search inputs, zoom dropdowns,
    status labels. Rather than forcing all content into buttons or the rightContent slot,
    added first-class item types that integrate into the existing overflow and tool tracking
    system. Each new type has its own interface, builder method, and SCSS class, following
    the same pattern as existing ToolButtonItem, ToolSplitItem, and ToolGalleryItem.
  decision: >
    Three new item type interfaces (ToolInputItem, ToolDropdownItem, ToolLabelItem) with
    corresponding builder methods (buildInputItem, buildDropdownItem, buildLabelItem) that
    produce DOM elements tracked in the tool Map and participating in the Priority+ overflow
    algorithm. Each type renders inline within toolbar regions alongside buttons and other tools.
  files: ["components/toolbar/toolbar.ts", "components/toolbar/toolbar.scss"]

- id: "ADR-027"
  title: "Toolbar dual overflow buttons with portaled fixed-position menus"
  date: "2026-02-17"
  status: "Accepted"
  context: >
    The toolbar overflow algorithm failed because it only summed tool element widths,
    missing dividers, gaps, and region structure. The single overflow button was at the
    toolbar's far-right edge (margin-left: auto) instead of inline with tools. Replaced
    with dual per-group overflow buttons (left/right) positioned inline inside the regions
    container. Menus are portaled to rootEl with position:fixed to escape overflow:hidden
    clipping, positioned via getBoundingClientRect(). Measurement uses direct child-size
    summation (offsetWidth + CSS margins via getComputedStyle) instead of scrollWidth
    which is unreliable on flex containers with overflow:hidden.
  files: ["components/toolbar/toolbar.ts", "components/toolbar/toolbar.scss"]

- id: "ADR-028"
  title: "CodeMirror 6 for CodeEditor component (not Monaco)"
  date: "2026-02-20"
  status: "Accepted"
  context: >
    Evaluated Monaco Editor (~2MB bundle, requires web workers) vs CodeMirror 6 (~150KB tree-shakeable).
    Monaco is overkill for an embeddable code panel — its VS Code heritage adds complexity without benefit.
    CodeMirror 6 is modular, framework-agnostic, supports Bootstrap theming via EditorView.theme(),
    and loads from CDN with dynamic import(). Fallback to styled textarea when CDN unavailable.
  files: ["components/codeeditor/codeeditor.ts", "components/codeeditor/codeeditor.scss"]

- id: "ADR-029"
  title: "DataGrid standalone component (not TreeGrid subclass)"
  date: "2026-02-20"
  status: "Accepted"
  context: >
    DataGrid is a flat sortable/filterable/paginated table — fundamentally different from TreeGrid's
    hierarchical row model. Subclassing TreeGrid would inherit unnecessary tree logic (expand/collapse,
    parent/child relationships, indentation) and constrain flat-table optimizations (virtual scrolling
    by row index, server-side pagination). Borrows patterns (column resize, sort indicators, cell editing)
    but reimplements them for a flat data model with pagination, filtering, and column pinning.
  files: ["components/datagrid/datagrid.ts", "components/datagrid/datagrid.scss"]

- id: "ADR-030"
  title: "GraphToolbar as factory function in own folder, returns standard Toolbar instance"
  date: "2026-02-20"
  status: "Accepted"
  context: >
    GraphToolbar provides a preconfigured toolbar for graph/diagram editors with layout dropdown,
    zoom controls, grid snap, export, and search. Rather than creating a new class, it is a factory
    function (createGraphToolbar) that returns a standard Toolbar instance with preset items.
    Own folder (components/graphtoolbar/) for independent SCSS and README, but no new class.
    Depends on Toolbar and EditableComboBox components.
  files: ["components/graphtoolbar/graphtoolbar.ts", "components/graphtoolbar/graphtoolbar.scss"]

- id: "ADR-031"
  title: "SplitLayout uses flexbox with JS-managed divider positions and pointer-capture drag"
  date: "2026-02-20"
  status: "Accepted"
  context: >
    SplitLayout divides a container into N panes with draggable dividers. Uses flexbox with
    flex-basis percentages (not CSS Grid) for simpler nested layout support. Divider drag uses
    setPointerCapture() — same proven pattern as Sidebar and TabbedPanel resize handles.
    Pane sizes stored as percentages for responsive behaviour. Min/max constraints enforced
    during drag. Supports horizontal and vertical orientation, nested splits, and collapse-to-zero.
  files: ["components/splitlayout/splitlayout.ts", "components/splitlayout/splitlayout.scss"]

- id: "ADR-032"
  title: "Toast z-index 1070, above modals (1050) and toolbar popups (1060)"
  date: "2026-02-20"
  status: "Accepted"
  context: >
    Toast notifications must be visible above all other UI elements except CommandPalette (1080).
    Z-index 1070 sits above Bootstrap modals (1050) and toolbar popups (1060), ensuring toasts
    are never occluded by modal dialogs or dropdown menus. Singleton ToastContainer manages
    stacking at a fixed viewport corner. CommandPalette uses 1080 as the highest interactive overlay.
  files: ["components/toast/toast.ts", "components/toast/toast.scss"]

- id: "ADR-033"
  title: "Ribbon as standalone component with adaptive collapse, not an extension of Toolbar"
  date: "2026-02-24"
  status: "Accepted"
  context: >
    Evaluated extending the existing Toolbar component vs building Ribbon as a standalone class.
    Toolbar uses a flat Priority+ overflow model with single-level items. Ribbon requires a
    fundamentally different layout: tabbed panels, grouped controls with labeled sections, and
    a multi-stage adaptive collapse algorithm. Subclassing Toolbar would fight its flat item model
    and single-overflow-button architecture.
  decision: >
    Built Ribbon as a standalone RibbonImpl class with its own DOM structure, adaptive layout,
    and control system. Six key architectural choices: (1) Adaptive collapse uses five progressive
    stages per group (full → medium → small → mini → overflow), driven by collapsePriority and
    collapseStages arrays, with a ResizeObserver-debounced layout pass that iterates groups from
    lowest priority upward. (2) All colours are exposed as CSS custom properties (--ribbon-bg,
    --ribbon-tab-text, --ribbon-panel-bg, etc.) mapped via a COLOR_MAP constant, enabling runtime
    theming via setColors() without stylesheet manipulation. (3) Multi-level KeyTips: Alt activates
    first-level badges on tabs and QAT; selecting a tab reveals second-level badges on controls
    within that tab's panel; KeyTip state machine tracks active level and pending chord. (4) Custom
    control hosting: the "custom" control type accepts an HTMLElement or factory function, rendered
    inside a standard group cell. groupOverflow option defaults to "visible" so custom controls
    (e.g., popovers, date pickers) can extend beyond group boundaries without clipping. (5) The
    Ribbon uses position:relative (not position:fixed) so it participates in normal document flow
    and works inside DockLayout grid cells, SplitLayout panes, or any other layout container
    without viewport-level z-index conflicts. Dropdown menus and backstage use position:fixed with
    z-index 1060 and 1070 respectively. (6) Twelve built-in control types (button, split-button,
    gallery, dropdown, input, color, number, checkbox, toggle, separator, label, custom) share a
    RibbonControlBase interface with discriminated union typing, avoiding a generic "render callback"
    pattern that would lose type safety.
  consequences:
    - No code sharing with Toolbar — Ribbon is ~2700 lines of independent implementation
    - Ribbon and Toolbar can coexist in the same layout without conflicts
    - Adaptive collapse is specific to Ribbon's grouped layout model
    - CSS custom properties allow per-instance theming without global stylesheet side effects
    - KeyTip state machine adds complexity but enables keyboard-only ribbon navigation
  files: ["components/ribbon/ribbon.ts", "components/ribbon/ribbon.scss"]

- id: "ADR-034"
  title: "Pill component uses 9999px border-radius (exception to zero-radius theme)"
  date: "2026-02-26"
  status: "Accepted"
  context: >
    Pill elements represent inline entity references (mentions, issues, tags) that flow
    within text. The rounded-end (stadium) shape is the universal visual convention for
    pills across Google Docs, GitHub, Slack, and other SaaS products. Users expect this
    shape to distinguish pills from regular UI controls. Overriding the theme's zero-radius
    rule (ADR-003) is justified because pills are content decoration, not structural UI
    components — they live inside text flows, not at panel/card boundaries.
  decision: >
    Pill uses border-radius: 9999px (CSS stadium trick) via --pill-border-radius custom
    property. STIE .stie-token-pill also updated from $border-radius (0) to 9999px for
    consistency. Apps can override via setStyle({ borderRadius: "4px" }) if needed.
  files: ["components/pill/pill.ts", "components/pill/pill.scss", "components/smarttextinput/smarttextinput.scss"]

- id: "ADR-035"
  title: "RichTextInput uses execCommand + HTML-primary serialization"
  date: "2026-02-26"
  status: "Accepted"
  context: >
    RichTextInput is a lightweight contenteditable rich text input for per-row editing contexts
    (todo items, checklist entries, inline detail fields). Too many instances on a page for a
    heavy editor like Vditor/MarkdownEditor; too rich for plain <input>/<textarea>. Uses
    document.execCommand for bold/italic/strikethrough — deprecated in spec but universally
    supported and handles complex selection cases, partial words, cross-node splits, and
    integrates with native undo/redo. Manual DOM manipulation (Range API) only for code wrapping
    and task list toggling where execCommand has no equivalent. HTML-primary serialization avoids
    conversion overhead; optional markdown output via lightweight DOM walker at read time.
    STIE integration is optional composition — checked via window.SmartTextInputEngine at init,
    silently skipped if absent. Inline toolbar is a custom lightweight div (not the 2800-line
    Toolbar component). Shared singleton document.selectionchange listener across all instances
    via static Set to avoid N duplicate listeners. Paste sanitization uses DOMParser with tag
    allowlist (strong, em, s, code, a, ul, ol, li, br). Enter key normalized to <br> across
    browsers (Chrome inserts <div>, Firefox <br>, Safari <p>).
  files: ["components/richtextinput/richtextinput.ts", "components/richtextinput/richtextinput.scss"]

- id: "ADR-036"
  title: "PersonChip replicates UserMenu trigger style as standalone reusable element"
  date: "2026-02-27"
  status: "Accepted"
  context: >
    The apps team needs a compact person-identity chip for share dialogs, assignment fields,
    and permission lists. The UserMenu trigger (collapsed state) already has the desired visual
    style — transparent background, zero border-radius, hover reveals subtle gray, circular
    avatar with initials or image, status dot. Rather than extending UserMenu or creating an
    abstract base, PersonChip copies the initials helpers and styling patterns directly (IIFE
    constraint — no ES module imports). This keeps both components independent and avoids
    coupling a dropdown menu component to an inline chip. The PersonChip API is designed for
    clean embedding in the future PeoplePicker component via metadata data-* attributes.
  files: ["components/personchip/personchip.ts", "components/personchip/personchip.scss"]

- id: "ADR-037"
  title: "PeoplePicker uses runtime PersonChip resolution with inlined fallback"
  date: "2026-02-27"
  status: "Accepted"
  context: >
    PeoplePicker needs PersonChip for visually rich person rows and selected chips. Due to the
    IIFE wrapping constraint (no ES module imports), PeoplePicker resolves window.createPersonChip
    at runtime. If PersonChip JS is not loaded, it falls back to simple span elements with inlined
    initials helpers (same pattern as RichTextInput checking window.SmartTextInputEngine). Both
    callback (onSearch) and URL-based (searchUrl) async search patterns are supported so consumers
    can integrate with any backend. Generation counter prevents stale search results.
  files: ["components/peoplepicker/peoplepicker.ts", "components/peoplepicker/peoplepicker.scss"]

- id: "ADR-038"
  title: "PresenceIndicator composes PersonChip avatarOnly mode with runtime bridge pattern"
  date: "2026-02-27"
  status: "Accepted"
  context: >
    PresenceIndicator needs compact circular avatars (collapsed) and full person chips (expanded).
    PersonChip already has all avatar rendering logic (image, initials, status dot, sizing). Rather
    than duplicating avatar rendering, added an avatarOnly mode to PersonChip that strips padding,
