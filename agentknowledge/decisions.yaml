- id: "ADR-102"
  title: "Element Chrome — subtle shadows, glows, and transitions"
  date: "2026-04-02"
  status: "Accepted"
  context: >
    The enterprise theme is intentionally flat and muted, but docked panels merge
    visually with content, and interactive surfaces lack hover affordance. Needed a
    thin layer of depth cues without breaking the existing aesthetic.
  decision: >
    Created _chrome.scss mixin library (5 mixins: edge-shadow, auto-edge-shadow,
    hover-glow, focus-glow, chrome-transition). Added CSS custom properties for
    glow/edge-shadow in _dark-mode.scss (light + dark). Added $chrome-edge-blur
    and $chrome-glow-radius to _variables.scss. Applied directional edge-shadow
    to Ribbon (bottom), StatusBar (top), Ruler (bottom/right), InlineToolbar
    (bottom), HelpDrawer (left). Used auto-edge-shadow with data-dock attribute
    on Sidebar (sidebar.ts applyModeClasses) and TabbedPanel tab bar
    (tabbedpanel.ts arrangeTabBarAndContent). Applied hover-glow to ActionItems,
    NotificationCenter, TabbedPanel tabs, Toolbar tools, Ribbon buttons/tabs,
    ColorPicker swatches, SymbolPicker cells, InlineToolbar buttons, and demo
    cards. Print reset in _dark-mode.scss via @media print. Always-on, no toggle.
  files:
    - "src/scss/_chrome.scss"
    - "src/scss/_dark-mode.scss"
    - "src/scss/_variables.scss"
    - "components/ribbon/ribbon.scss"
    - "components/statusbar/statusbar.scss"
    - "components/ruler/ruler.scss"
    - "components/inlinetoolbar/inlinetoolbar.scss"
    - "components/helpdrawer/helpdrawer.scss"
    - "components/sidebar/sidebar.scss"
    - "components/sidebar/sidebar.ts"
    - "components/tabbedpanel/tabbedpanel.scss"
    - "components/tabbedpanel/tabbedpanel.ts"
    - "components/actionitems/actionitems.scss"
    - "components/notificationcenter/notificationcenter.scss"
    - "components/toolbar/toolbar.scss"
    - "components/colorpicker/colorpicker.scss"
    - "components/symbolpicker/symbolpicker.scss"
    - "demo/shared/demo-shell.css"

