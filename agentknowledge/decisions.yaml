# AGENT: Architectural Decision Records (ADRs) for the enterprise Bootstrap 5 theme.
# Read this file to understand WHY design choices were made before proposing alternatives.

- id: "ADR-001"
  title: "Use Bootstrap 5 with SCSS variable overrides instead of a custom CSS framework"
  date: "2025-01-01"
  status: "Accepted"
  context: "Need a well-supported, documented component framework. Custom CSS is harder to maintain and lacks community support."
  files: ["src/scss/_variables.scss", "src/scss/custom.scss"]

- id: "ADR-002"
  title: "Use Atkinson Hyperlegible as the primary font"
  date: "2025-01-15"
  status: "Superseded"
  superseded_by: "ADR-009"
  context: "Optimised for readability at small sizes (14px base). Designed by the Braille Institute for maximum legibility."
  files: ["src/scss/_variables.scss", "demo/index.html"]

- id: "ADR-003"
  title: "Zero border radius for all components"
  date: "2025-01-15"
  status: "Accepted"
  context: "Square corners give a sharp, professional appearance suited to enterprise tools. All border-radius variables set to 0."
  files: ["src/scss/_variables.scss"]

- id: "ADR-004"
  title: "Use console.* directly instead of a logging framework"
  date: "2026-02-09"
  status: "Accepted"
  context: "This is a reusable library. Logging abstractions would conflict with host application logging. Direct console calls are predictable and dependency-free."
  files: ["LOGGING.md"]

- id: "ADR-005"
  title: "Compact spacing with 0.75rem base spacer"
  date: "2025-01-15"
  status: "Accepted"
  context: "Enterprise applications need to display dense data. Reduced spacing from Bootstrap default 1rem to 0.75rem saves screen real estate while remaining readable."
  files: ["src/scss/_variables.scss"]

- id: "ADR-006"
  title: "14px base font size instead of Bootstrap default 16px"
  date: "2025-01-15"
  status: "Accepted"
  context: "Smaller font allows more content density. Combined with Atkinson Hyperlegible font, readability is maintained at smaller sizes."
  files: ["src/scss/_variables.scss"]

- id: "ADR-007"
  title: "Vanilla TypeScript for components instead of React or Angular"
  date: "2025-01-01"
  status: "Accepted"
  context: "Components must be framework-agnostic and usable in any web application. No framework dependency means broader compatibility."
  files: ["FRONTEND.md"]

- id: "ADR-008"
  title: "Cloudflare Pages deployment via Wrangler"
  date: "2025-01-01"
  status: "Accepted"
  context: "Cloudflare Pages provides global CDN distribution, automatic HTTPS, and simple deployment for static assets."
  files: ["README.md"]

- id: "ADR-009"
  title: "Use Open Sans for body text and JetBrains Mono for fixed-width text"
  date: "2026-02-09"
  status: "Accepted"
  context: "Open Sans is clean, legible, and well-optimised for screen readability at small sizes (14px). JetBrains Mono provides clear distinction between similar characters (0/O, 1/l/I). Both loaded from Google Fonts with system font fallbacks."
  files: ["src/scss/_variables.scss", "src/scss/_variables-commented.scss", "demo/index.html"]

- id: "ADR-010"
  title: "Auto-generated documentation with themed HTML output"
  date: "2026-02-09"
  status: "Accepted"
  context: "Consumer-facing docs are auto-generated from source files during build. Markdown is produced for agents and GitHub, while themed HTML is generated for human developers. Three docs are fully auto-generated (DESIGN_TOKENS, COMPONENT_REFERENCE, AGENT_QUICK_REF); hand-written docs are also converted to HTML. All HTML uses the enterprise theme CSS as a living demo."
  files: ["scripts/generate-docs.js", "scripts/copy-docs.sh", "docs/INDEX.md", "package.json"]

- id: "ADR-011"
  title: "Sidebar component uses .sidebar-container root class and z-index 1035-1037"
  date: "2026-02-12"
  status: "Accepted"
  context: "The existing .sidebar class in custom.scss styles nav elements. The new Sidebar panel component uses .sidebar-container as its root to avoid CSS collision. Z-index layering: docked=1035 (above Bootstrap fixed 1030), floating=1036, drop zones=1037, all below StatusBar 1040 and modals 1050+."
  files: ["components/sidebar/sidebar.ts", "components/sidebar/sidebar.scss"]

- id: "ADR-012"
  title: "BannerBar z-index 1045, above StatusBar and Sidebar, below modals"
  date: "2026-02-12"
  status: "Accepted"
  context: "The BannerBar is a fixed-top viewport banner that must sit above all other fixed layout elements (Sidebar 1035-1037, StatusBar 1040) but below Bootstrap modals (1050+). Z-index 1045 provides clear separation. Sets --bannerbar-height CSS custom property on <html> for layout offset by Sidebar and other consumers."
  files: ["components/bannerbar/bannerbar.ts", "components/bannerbar/bannerbar.scss", "components/sidebar/sidebar.scss"]

- id: "ADR-013"
  title: "Toolbar z-index 1032-1034, below Sidebar and StatusBar"
  date: "2026-02-12"
  status: "Accepted"
  context: "The Toolbar is a fixed/floating action bar that should sit below other fixed layout elements. Z-index layering: docked=1032, floating=1033, dropdowns/keytips/dock-zones=1034. This places the Toolbar below Sidebar (1035-1037), StatusBar (1040), BannerBar (1045), and modals (1050+). Each toolbar independently sets --toolbar-<position>-size CSS custom properties on <html> for layout offset."
  files: ["components/toolbar/toolbar.ts", "components/toolbar/toolbar.scss"]

- id: "ADR-014"
  title: "Gauge component: single class design with shape option, no animations"
  date: "2026-02-12"
  status: "Accepted"
  context: "One Gauge class with a shape option (tile/ring/bar) rather than three separate classes. Threshold/value/timer logic is >60% shared code. No CSS transitions or animations per user directive — all value changes are instant. Ring shape uses SVG stroke-dasharray/dashoffset technique. Auto-tick timer uses adaptive intervals (1s/1m/5m/1h) based on remaining time to avoid unnecessary DOM updates."
  files: ["components/gauge/gauge.ts", "components/gauge/gauge.scss"]
