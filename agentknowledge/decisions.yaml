- id: "ADR-093"
  title: "Structured logging via LogUtility for studio apps and demo shell"
  date: "2026-03-30"
  status: "Accepted"
  context: >
    The 4 studio apps (Component Studio, Ribbon Studio, Shape Studio, Layout
    Studio), studio-storage.js, and demo-shell.js used raw console.log with a
    LOG prefix string. This was inconsistent with the LogUtility component used
    by library components. Raw console calls lack structured severity levels,
    make filtering difficult, and produce noisy output during normal operation.
  decision: >
    Migrate all studio apps and demo infrastructure to use LogUtility helpers
    (logInfo, logWarn, logError, logDebug, logTrace). Each file defines a
    LOG_PREFIX constant, obtains a LogUtility instance via _lu, and defines
    local helper functions (logInfo, logWarn, logError, logDebug, logTrace)
    that delegate to LogUtility. This aligns studio apps with library component
    logging conventions. ADR-004 (direct console.* for library components)
    remains valid; this ADR extends structured logging to demo/studio code.
  files:
    - "demo/studio/component-studio.html"
    - "demo/studio/ribbon-studio.html"
    - "demo/studio/shape-studio.html"
    - "demo/studio/layout-studio.html"
    - "demo/studio/studio-storage.js"
    - "demo/shared/demo-shell.js"

- id: "ADR-094"
  title: "VisualTableEditor design — unit-aware aggregates, non-contiguous selection, preset system, edit-by-default in embedded mode"
  date: "2026-04-01"
  status: "Accepted"
  context: >
    The project needed a visual-first table component distinct from DataGrid.
    DataGrid targets data management (sorting, filtering, pagination) while
    VisualTableEditor targets cell-styled tabular data editing analogous to
    table widgets in PowerPoint, Figma, draw.io, or Notion. Key design
    questions: (A) how to handle aggregates when cells contain mixed units,
    (B) selection model for non-contiguous ranges, (C) preset system for
    styled table templates, (D) edit mode behavior when embedded in
    DiagramEngine shapes.
  decision: >
    (A) Unit-aware aggregates: only computed when all numeric cells share the
    same unit signature (e.g., all $-prefixed or all %-suffixed). Mixed units
    produce no result. Results reattach the unit prefix/suffix for display.
    Nine aggregate types: Sum, Average, Count, Count Numbers, Min, Max,
    Median, Mode, Std Dev, Range. (B) Non-contiguous selection via
    Ctrl+Click to toggle individual cells plus Shift+Arrow for contiguous
    range extension. Selection state tracked as CellRange[] array.
    (C) Six built-in presets (blue-header, dark-header, green-accent, warm,
    minimal, striped) applied via applyPreset() or preset option. Presets
    set meta and header-row styles without overwriting per-cell overrides.
    (D) Edit-by-default in embedded mode: when contained inside a
    DiagramEngine shape (contained option), the component starts in edit
    mode with no viewport docking, suitable for foreignObject rendering.
  files:
    - "components/visualtableeditor/visualtableeditor.ts"
    - "components/visualtableeditor/visualtableeditor.scss"
    - "components/visualtableeditor/README.md"
    - "specs/visualtableeditor.prd.md"

- id: "ADR-095"
  title: "VisualTableEditor merge rendering fix and resizableColumns default alignment"
  date: "2026-04-02"
  status: "Accepted"
  context: >
    Two bugs found in VisualTableEditor: (A) Merging cells produced N extra
    individual cells adjacent to the merged cell. Root cause: rebuildMergedCellMap()
    was called AFTER rows were rendered in renderTable(), so isCellHiddenByMerge()
    ran against an empty/stale map. (B) Column resize handles never appeared
    despite documentation stating resizableColumns defaults to true. Root cause:
    the guard check used !state.options.resizableColumns (truthy check) which
    treats undefined as false, contradicting the documented default.
  decision: >
    (A) Move rebuildMergedCellMap(state) to the top of renderTable(), immediately
    after clearing the container and before the row rendering loop, so the merge
    map is populated before isCellHiddenByMerge() is consulted. (B) Change the
    guard from !state.options.resizableColumns to state.options.resizableColumns
    === false, matching the !== false pattern used by allowMerge and showToolbar.
    This aligns runtime behavior with the documented default of true.
  files:
    - "components/visualtableeditor/visualtableeditor.ts"

- id: "ADR-096"
