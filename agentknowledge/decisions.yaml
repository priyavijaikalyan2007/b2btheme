- id: "ADR-063"
  title: "Ribbon stack alignment via CSS subgrid"
  date: "2026-03-08"
  status: "Accepted"
  context: "When multiple labeled controls are stacked vertically in a .ribbon-stack (e.g. Width/Type/Shape line pickers), each label has a different natural width, so controls start at different horizontal positions. Root cause: flex-direction column sizes each child independently. Fix: replace flex layout with CSS grid (auto 1fr columns). Labeled wraps (dropdown-wrap, input-wrap, color-wrap, number-wrap, custom-small, custom-mini) use grid-template-columns: subgrid so all labels share one column width and all controls share another. Custom control width property changed to min-width so inline width doesn't conflict with grid column sizing. Mini collapse overrides the stack to single column (1fr) since labels are hidden. Also added Width field to RibbonBuilder renderComponentProps() matching existing dropdown/input pattern."
