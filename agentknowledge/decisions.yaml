- id: "ADR-040"
  title: "Use position:fixed for dropdown overflow escape across all dropdown components"
  date: "2026-02-27"
  status: "Accepted"
  context: >
    Dropdowns inside overflow:hidden containers (modals, scrollable panels) were
    visually clipped because they used position:absolute relative to their parent.
    FontDropdown had already solved this with position:fixed + getBoundingClientRect().
    Extended the same pattern to 8 additional components: EditableComboBox, DatePicker,
    TimePicker, DurationPicker, TimezonePicker, MultiSelectCombo, Tagger, PeoplePicker.
  decision: >
    Each component's positionDropdown() calculates viewport-relative coordinates via
    getBoundingClientRect(), sets position:fixed with explicit left/top/bottom/width,
    flips above when space below is insufficient, and clamps horizontally via
    clampToViewport(). Corresponding SCSS removes position:absolute/top/left/right
    and deletes the now-unnecessary -above class variant.
  files:
