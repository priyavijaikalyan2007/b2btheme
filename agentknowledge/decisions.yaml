- id: "ADR-088"
  title: "Shape render functions must append element to group before applying fill/stroke"
  date: "2026-03-21"
  status: "Accepted"
  context: >
    SVG gradient fills require a <defs> element containing the <linearGradient>
    or <radialGradient> definition. applyGradientFill() inserts defs via
    el.parentNode.insertBefore(). But shape render functions called
    applyFillToSvg() before g.appendChild(shapeEl), meaning parentNode was
    null and defs was never inserted. Non-container SVG elements (rect, ellipse,
    path) cannot have children, so el.appendChild(defs) also failed silently
    in real browsers (passed in jsdom which doesn't enforce SVG spec).
  decision: >
    All shape render functions (33 across 5 source files) now call
    g.appendChild(shapeEl) BEFORE applyFillToSvg(shapeEl, style.fill) and
    applyStrokeToSvg(shapeEl, style.stroke). This ensures parentNode is the
    container <g> when gradient defs are inserted. Also added parseStopColor()
    to split rgba() strings into separate stop-color and stop-opacity SVG
    attributes since SVG <stop> elements don't support rgba() in stop-color.
  files:
    - "components/diagramengine/src/shape-registry.ts"
    - "components/diagramengine/src/shapes-basic.ts"
    - "components/diagramengine/src/shapes-extended.ts"
    - "components/diagramengine/src/stencils-flowchart.ts"
    - "components/diagramengine/src/stencils-uml.ts"
    - "components/diagramengine/src/stencils-network.ts"

- id: "ADR-089"
  title: "Gradient text uses CSS background-clip:text; images rendered as SVG <image> with optional auth headers"
  date: "2026-03-21"
  status: "Accepted"
  context: >
    TextRun.color was string-only, limiting text to solid colours. Image objects
    had an ImageStyle interface but no rendering — the "image" shape was just a
    placeholder rectangle with an icon. Inline text editor was offset from its
    shape because canvasToScreen added viewport position but the overlay is
    position:absolute inside the container.
  decision: >
    (1) TextRun.color changed to string | GradientDefinition. Gradient text uses
    CSS background: linear-gradient(), -webkit-background-clip: text,
    background-clip: text, color: transparent. (2) renderObject() creates SVG
    <image> element from presentation.image.src with preserveAspectRatio mapped
    from fit mode. ImageStyle.headers enables XHR-based loading with custom HTTP
    headers (for auth), converting response to data URI. Image coordinates use
    local space (0,0) since parent <g> already translates. (3) Text editor uses
    new canvasToContainer() which returns container-relative coordinates without
    viewport offset. (4) Connector gradient strokes handled by
    applyGradientStrokeToConnector() inserting defs into shared connector defs.
    (5) Per-edge gradient strokes use gradientUnits=userSpaceOnUse with actual
    line coordinates to avoid degenerate bounding box on zero-width/height lines.
  files:
    - "components/diagramengine/src/types.ts"
    - "components/diagramengine/src/render-engine.ts"
    - "components/diagramengine/src/connectors.ts"
    - "components/diagramengine/src/shape-registry.ts"

- id: "ADR-090"
  title: "Port indicators, connector selectability, text along path, PNG export deprecated"
  date: "2026-03-22"
  status: "Accepted"
  context: >
    Connect tool lacked visual feedback for available ports. Connectors were not
    selectable. Text could only be rendered in rectangular foreignObject regions.
    PNG export had CORS limitations with external images and cross-origin CSS.
  decision: >
    (1) Port hover indicators: ConnectorTool.onMouseMove renders blue circles at
