- id: "ADR-082"
  title: "DiagramEngine architecture — semantic/presentation split, headless engine, SVG rendering, pluggable shapes"
  date: "2026-03-15"
  status: "Accepted"
  context: >
    The project needed a universal diagramming canvas supporting flowcharts,
    UML, BPMN, ER diagrams, network diagrams, poster creation, and embedded
    document surfaces. Evaluated maxGraph-powered GraphCanvasMx and custom
    SVG GraphCanvas — both are graph-centric (nodes + edges) and lack general
    diagramming features (arbitrary shapes, text editing, layers, comments,
    boolean operations, format painter, rich text content). A purpose-built
    engine was needed.
  decision: >
    Built DiagramEngine as a ~6600-line vanilla TypeScript component with:
    (1) Semantic/presentation split — every DiagramObject has a semantic
    record (type, data, references, tags, relationships) separate from its
    presentation (shape, bounds, rotation, flip, style, text, layer, zIndex).
    This enables domain-agnostic canvas use for any diagram type.
    (2) SVG rendering via RenderEngine class — foreignObject for rich text,
    feDropShadow for shadows, pattern/gradient defs, arrow markers.
    (3) Pluggable ShapeRegistry with 6 stencil packs (basic 16 shapes,
    flowchart 7, UML 3, BPMN 5, ER 4, network 4 + path shape).
    (4) Tool system with ToolManager dispatching to 8 tools: SelectTool
    (drag/resize/rotate/rubber-band/nudge), PanTool, DrawTool, TextTool,
    ConnectorTool, PenTool, MeasureTool, BrushTool.
    (5) EventBus for decoupled internal communication.
    (6) UndoStack with command merging (moves within 500ms merge).
    (7) Template engine resolving {{var|filter}} in text content from
    document-level data binding.
    (8) Alignment/spacing guide engine for snap-to-object behavior.
    (9) Graph analysis: BFS shortest path, DFS connected components,
    incoming/outgoing connector queries.
    (10) Dark mode via var(--theme-*) tokens and MutationObserver on
    data-bs-theme attribute for automatic re-rendering on theme change.
  files:
    - "components/diagramengine/diagramengine.ts"
    - "components/diagramengine/diagramengine.scss"
    - "components/diagramengine/README.md"
    - "demo/index.html"

- id: "ADR-083"
  title: "DiagramEngine modular rebuild — concatenation-based multi-file architecture"
  date: "2026-03-16"
  status: "Accepted"
  context: >
    The single-file DiagramEngine (~6600 lines) was difficult to navigate
    and maintain. TypeScript module imports are not supported by the IIFE
    build pipeline, so ES modules could not be used. A multi-file architecture
    was needed that preserves the concatenation-based build while enabling
    modular development.
  decision: >
    Rebuilt DiagramEngine as 25 source modules in components/diagramengine/src/
    concatenated by the build script into a single IIFE. Architecture phases:
    (1) types.ts — all interfaces, types, enums (Point, Rect, DiagramObject,
    DiagramConnector, DiagramDocument, PageFrame, etc.).
    (2) event-bus.ts — EventBus class for decoupled pub/sub.
    (3) undo-stack.ts — UndoStack with command merging.
    (4) shape-registry.ts — ShapeRegistry for pluggable shape definitions.
    (5) shapes-basic.ts + shapes-extended.ts — 16 built-in shapes.
    (6) stencils-flowchart.ts, stencils-uml.ts, stencils-network.ts —
    stencil packs (flowchart 7, UML 5, BPMN 5, ER 4, network 4).
    (7) connectors.ts — routing algorithms (straight, orthogonal, curved,
    manhattan), arrow markers, label positioning, connector rendering.
    (8) render-engine.ts — SVG DOM management, viewport, grid, inline editor.
    (9) templates.ts — template engine with {{var|filter}} interpolation.
    (10) guides.ts — alignment and spacing guide computation + rendering.
    (11) page-frames.ts — 35 predefined page sizes across 7 categories,
    4 margin presets, SVG rendering of frames/badges/guides/lock indicators.
    (12) tool-*.ts (8 files) — one file per interactive tool.
    (13) tool-manager.ts — tool dispatch and lifecycle management.
    (14) engine.ts — main DiagramEngineImpl class (4130 lines).
    (15) engine-phase2.ts — phase 2 features (format painter, comments,
    deep linking, graph analysis, etc.).
    Total: 25 modules, 20,125 lines, 37 registered shapes, 8 tools,
    35 page frame presets, 4 margin presets.
  files:
    - "components/diagramengine/src/engine.ts"
    - "components/diagramengine/src/types.ts"
    - "components/diagramengine/src/connectors.ts"
    - "components/diagramengine/src/render-engine.ts"
    - "components/diagramengine/src/page-frames.ts"
    - "components/diagramengine/src/shape-registry.ts"
    - "components/diagramengine/src/tool-manager.ts"
    - "components/diagramengine/src/guides.ts"

- id: "ADR-084"
  title: "ActionItems component — single-class design with 4-phase feature set"
  date: "2026-03-16"
  status: "Accepted"
  context: >
    Enterprise task management requires a rich action item list that goes
    beyond simple checkboxes. The component needs status lifecycle tracking,
    person assignments, priority badges, due dates, comment integration,
    tags, hierarchical nesting, drag-and-drop reordering, keyboard navigation,
    multi-select, bulk operations, faceted filtering, sorting, clipboard
    interop, and export — all in a single reusable component.
  decision: >
    Built ActionItems as a single-class component (ActionItemsImpl) with
    four implementation phases:
    Phase 1 (Core): status lifecycle, priority, due dates, assignments,
    tags, comment slots, section grouping, inline editing, create/delete.
    Phase 2 (Rich): PersonChip/Pill integration, hierarchical nesting with
    parent/child relationships, section collapse, due date overdue display.
    Phase 3 (Interactions): drag-and-drop reordering with HTML5 DnD API,
    keyboard navigation (arrows, Space, Enter, Escape, Tab, Delete),
    multi-select (Ctrl+click, Shift+click), bulk operations toolbar.
    Phase 4 (Filtering/Export): faceted filtering (status, assignee,
    priority, due-date facets, tags), 10 sort options, clipboard
    (Ctrl+C/X/V/A with markdown checklist format), JSON/markdown export,
    markdown import. Full and compact display modes.
    Factory: createActionItems(options) returns ActionItemsHandle.
  files:
    - "components/actionitems/actionitems.ts"
    - "components/actionitems/actionitems.scss"

- id: "ADR-085"
  title: "Replace Vditor with marked + extensions for markdown preview rendering"
  date: "2026-03-18"
  status: "Accepted"
  context: >
    HelpDrawer and DocViewer used Vditor.preview() for markdown rendering. Vditor
    injected its own CSS font-family via dynamically loaded stylesheets that could not
    be reliably overridden even with !important selectors. Multiple attempts to fix
    (inherit, same-element selectors, explicit font values) all failed because Vditor
    loads content-theme CSS at runtime. Additionally, Vditor is a full editor library
    (~500KB) used only for preview — excessive for read-only rendering.
  decision: >
    Created a shared MarkdownRenderer component (components/markdownrenderer/) that
    uses marked for parsing with auto-detected optional extensions: highlight.js for
    code, KaTeX for math, Mermaid for diagrams, @viz-js/viz for Graphviz/dot (client-
    side WASM), and PlantUML via configurable server URL (default: public server,
    recommended: self-hosted for production). HTML output is sanitised (scripts, iframes,
    event handlers stripped). Registered on window.createMarkdownRenderer. HelpDrawer
    and DocViewer updated to use getMdRenderer() which calls the shared factory. Vditor
    dependency removed from both components and their demo pages. Vditor retained for
    MarkdownEditor (full editing use case).
  files:
    - "components/markdownrenderer/markdownrenderer.ts"
    - "components/markdownrenderer/markdownrenderer.scss"
    - "components/markdownrenderer/README.md"
    - "components/helpdrawer/helpdrawer.ts"
    - "components/docviewer/docviewer.ts"
    - "demo/components/helpdrawer.html"
    - "demo/components/docviewer.html"

- id: "ADR-086"
  title: "Per-edge stroke rendering in DiagramEngine with comprehensive Vitest test suite"
  date: "2026-03-19"
  status: "Accepted"
  context: >
    DiagramEngine had type definitions for PerEdgeStroke, EdgeStroke, and GradientDefinition
    on strokes but no rendering implementation — all shape renderers only called
    applyStrokeToSvg(el, ctx.style.stroke) without checking perEdgeStroke. The
    diagrams-borders.prd.md spec requires per-side border control for box shapes.
    Additionally, the DiagramEngine (19K lines, 90 public methods) had zero unit tests.
  decision: >
    (1) Added renderPerEdgeStroke() function that draws individual SVG <line> elements
    per visible side with independent color, width, dashPattern, and gradient support.
    applyEdgeStrokeColor() handles gradient defs by appending <linearGradient> to a
    shared <defs> element (avoids parentNode insertion issue from applyStrokeColor).
    Modified renderShapeContent() to suppress uniform stroke (color:"none", width:0) and
    overlay per-edge lines when perEdgeStroke is set. (2) Added comprehensive Vitest test
    suite: 183 tests across 4 files covering all 90 public API methods — factory/lifecycle,
    object CRUD, selection, viewport, undo/redo, tools, serialization, connectors, layers,
    groups, transforms, clipboard, z-ordering, alignment, page frames, find/replace,
    format painter, graph analysis, comments, deep linking, events, spatial queries,
    stencils, and per-edge stroke rendering. Added export keyword to createDiagramEngine.
  files:
    - "components/diagramengine/diagramengine.ts"
    - "components/diagramengine/diagramengine.test.ts"
    - "components/diagramengine/diagramengine-core.test.ts"
    - "components/diagramengine/diagramengine-features.test.ts"
    - "components/diagramengine/diagramengine-advanced.test.ts"
    - "specs/diagramengine.plan.md"

- id: "ADR-087"
  title: "GradientPicker composes ColorPicker and AnglePicker for stop editing"
  date: "2026-03-20"
  status: "Accepted"
  context: >
    GradientPicker needs per-stop colour+alpha editing and angle selection.
    Building these from scratch duplicates proven UI (ColorPicker's HSL canvas,
    AnglePicker's SVG dial). The project's IIFE wrapping prevents ES imports,
    so composition uses runtime window factory lookup.
  decision: >
    GradientPicker composes ColorPicker (via window.createColorPicker) and
    AnglePicker (via window.createAnglePicker) at runtime. Both are optional
    soft dependencies — GradientPicker falls back to native <input type="color">
    + alpha range slider and <input type="number"> respectively when the
    composed components are not loaded. One ColorPicker instance is created per
    GradientPicker and reused for all stops. Data model uses GradientStop
    (position, color, alpha) and GradientValue (type, stops, angle, center,
    radius) with toGradientDefinition/fromGradientDefinition converters for
    DiagramEngine compatibility.
