- name: "RibbonControl"
  file: "components/ribbon/ribbon.ts"
  description: "Discriminated union of 12 control types: button, split-button, gallery, dropdown, input, color, number, checkbox, toggle, separator, label, custom. All share RibbonControlBase (type, id, label, icon, tooltip, size, disabled, hidden, keyTip, cssClass). Each variant adds type-specific properties and callbacks."
