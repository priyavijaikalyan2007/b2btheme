<!--
  COMPONENT: ShapeStudio
  PURPOSE: Standalone studio app for creating custom vector shapes
           using DiagramEngine as the core canvas.
  RELATES: [[DiagramEngine]], [[StudioStorage]], [[StudioShell]], [[Sidebar]], [[Toolbar]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Studio - Enterprise Theme</title>

    <!-- FOUC prevention: apply saved theme before CSS loads -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <!-- Preconnect hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <!-- LogUtility: enable all log levels for studio apps -->
    <script src="../../dist/components/logutility/logutility.js"></script>
    <script>window.__ebt_debug_logging=true;window.__ebt_info_logging=true;window.__ebt_trace_logging=true;</script>
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/colorpicker/colorpicker.css">
    <link rel="stylesheet" href="../../dist/components/anglepicker/anglepicker.css">
    <link rel="stylesheet" href="../../dist/components/gradientpicker/gradientpicker.css">
    <link rel="stylesheet" href="../../dist/components/sidebar/sidebar.css">
    <link rel="stylesheet" href="../../dist/components/toolbar/toolbar.css">
    <link rel="stylesheet" href="../../dist/components/diagramengine/diagramengine.css">
    <link rel="stylesheet" href="./studio-shell.css">

    <style>
    /* ================================================================
       Shape Studio — local overrides
       ================================================================ */
    .ss-tool-grid
    {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 2px;
        padding: 8px;
    }

    .ss-tool-btn-wide
    {
        grid-column: 1 / -1;
    }

    .ss-tool-options
    {
        padding: 8px 12px;
        border-top: 1px solid var(--bs-border-color, #dee2e6);
    }

    .ss-tool-options-title
    {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        color: var(--bs-secondary-color, #6c757d);
        margin-bottom: 6px;
    }

    .ss-option-row
    {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 4px;
    }

    .ss-option-label
    {
        font-size: 11px;
        color: var(--bs-secondary-color, #6c757d);
        width: 48px;
        flex-shrink: 0;
    }

    .ss-option-input
    {
        flex: 1;
        font-size: 12px;
        padding: 2px 6px;
        border: 1px solid var(--bs-border-color, #dee2e6);
        background: var(--bs-body-bg, #fff);
        color: var(--bs-body-color, #212529);
    }

    .ss-color-input
    {
        width: 28px;
        height: 22px;
        padding: 1px;
        border: 1px solid var(--bs-border-color, #dee2e6);
        cursor: pointer;
    }

    .ss-highlight-presets
    {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
    }

    .ss-highlight-swatch
    {
        width: 24px;
        height: 24px;
        border: 1px solid var(--bs-border-color, #dee2e6);
        cursor: pointer;
    }

    .ss-highlight-swatch:hover
    {
        outline: 2px solid var(--bs-primary, #0d6efd);
        outline-offset: 1px;
    }

    /* Shape library items */
    .ss-shape-item
    {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 8px;
        border-bottom: 1px solid var(--bs-border-color, #dee2e6);
        cursor: pointer;
    }

    .ss-shape-item:hover
    {
        background: var(--bs-tertiary-bg, #f8f9fa);
    }

    .ss-shape-thumb
    {
        width: 36px;
        height: 36px;
        border: 1px solid var(--bs-border-color, #dee2e6);
        background: var(--bs-body-bg, #fff);
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .ss-shape-thumb svg
    {
        width: 100%;
        height: 100%;
    }

    .ss-shape-info
    {
        flex: 1;
        min-width: 0;
    }

    .ss-shape-name
    {
        font-size: 12px;
        font-weight: 500;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .ss-shape-meta
    {
        font-size: 10px;
        color: var(--bs-secondary-color, #6c757d);
    }

    .ss-shape-actions
    {
        display: flex;
        gap: 2px;
        flex-shrink: 0;
    }

    .ss-shape-action-btn
    {
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 12px;
        color: var(--bs-body-color, #212529);
        opacity: 0.4;
    }

    .ss-shape-action-btn:hover
    {
        opacity: 1;
        background: var(--bs-tertiary-bg, #f8f9fa);
    }

    .ss-shape-action-btn.danger:hover
    {
        color: var(--bs-danger, #dc3545);
    }

    .ss-save-shape-btn
    {
        padding: 2px 8px;
        font-size: 11px;
    }

    #ss-canvas
    {
        width: 100%;
        height: 100%;
    }
    </style>
</head>
<body>

    <div id="ss-root" class="studio-root">
        <!-- ================================================================
             HEADER
             ================================================================ -->
        <div class="studio-header">
            <div class="studio-header-left">
                <h1 class="studio-title"><i class="bi bi-vector-pen"></i> Shape Studio</h1>
                <span class="studio-separator"></span>
                <span class="studio-filename" id="ss-filename">Untitled</span>
                <span class="studio-autosave-indicator" id="ss-autosave">Saved</span>
            </div>
            <div class="studio-header-right">
                <button class="studio-btn" id="ss-help-toggle" title="Toggle help (F1)"><i class="bi bi-question-circle"></i></button>
                <span class="studio-separator"></span>
                <a href="../index.html" class="studio-btn" title="Back to demos"><i class="bi bi-grid-3x3-gap"></i></a>
                <div id="demo-theme-toggle"></div>
            </div>
        </div>

        <!-- Toolbar mounts here via Toolbar component -->
        <div id="ss-toolbar-container" style="flex-shrink: 0;"></div>

        <!-- Main body: sidebars + center canvas -->
        <div id="ss-body" class="studio-body">
            <!-- Left sidebar mounts here via Sidebar component -->
            <div id="ss-center" class="studio-center">
                <div class="studio-canvas">
                    <div id="ss-canvas"></div>
                </div>
            </div>
            <!-- Right sidebar mounts here via Sidebar component -->
        </div>
    </div>

    <!-- ================================================================
         OPEN FILE DIALOG (hidden by default)
         ================================================================ -->
    <div class="studio-dialog-overlay" id="ss-open-dialog" style="display: none;">
        <div class="studio-dialog">
            <div class="studio-dialog-header">
                <span>Open Canvas</span>
                <button class="studio-dialog-close" id="ss-open-dialog-close">&times;</button>
            </div>
            <div class="studio-dialog-body">
                <ul class="studio-file-list" id="ss-open-file-list"></ul>
            </div>
            <div class="studio-dialog-footer">
                <button class="studio-btn" id="ss-open-dialog-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ================================================================
         SAVE-AS DIALOG (hidden by default)
         ================================================================ -->
    <div class="studio-dialog-overlay" id="ss-saveas-dialog" style="display: none;">
        <div class="studio-dialog">
            <div class="studio-dialog-header">
                <span>Save Canvas As</span>
                <button class="studio-dialog-close" id="ss-saveas-dialog-close">&times;</button>
            </div>
            <div class="studio-dialog-body">
                <div class="ss-option-row">
                    <label class="ss-option-label">Name</label>
                    <input type="text" class="ss-option-input" id="ss-saveas-name" placeholder="Canvas name">
                </div>
            </div>
            <div class="studio-dialog-footer">
                <button class="studio-btn" id="ss-saveas-cancel">Cancel</button>
                <button class="studio-btn primary" id="ss-saveas-confirm">Save</button>
            </div>
        </div>
    </div>

    <!-- ================================================================
         SAVE SHAPE DIALOG (hidden by default)
         ================================================================ -->
    <div class="studio-dialog-overlay" id="ss-shape-dialog" style="display: none;">
        <div class="studio-dialog">
            <div class="studio-dialog-header">
                <span>Save Shape</span>
                <button class="studio-dialog-close" id="ss-shape-dialog-close">&times;</button>
            </div>
            <div class="studio-dialog-body">
                <div class="ss-option-row">
                    <label class="ss-option-label">Name</label>
                    <input type="text" class="ss-option-input" id="ss-shape-name-input" placeholder="Shape name">
                </div>
            </div>
            <div class="studio-dialog-footer">
                <button class="studio-btn" id="ss-shape-dialog-cancel">Cancel</button>
                <button class="studio-btn primary" id="ss-shape-dialog-confirm">Save</button>
            </div>
        </div>
    </div>

    <!-- ================================================================
         SCRIPTS
         ================================================================ -->
    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/colorpicker/colorpicker.js"></script>
    <script src="../../dist/components/anglepicker/anglepicker.js"></script>
    <script src="../../dist/components/gradientpicker/gradientpicker.js"></script>
    <script src="../../dist/components/sidebar/sidebar.js"></script>
    <script src="../../dist/components/toolbar/toolbar.js"></script>
    <script src="../../dist/components/diagramengine/diagramengine.js"></script>
    <script src="./studio-storage.js"></script>

    <script>
    /* global createDiagramEngine, StudioStorage, Sidebar, Toolbar */
    (function()
    {
        "use strict";

        // ====================================================================
        // CONSTANTS
        // ====================================================================

        var NS = "shape-studio";

        /** Log prefix for all console messages from this component. */
        var LOG_PREFIX = "[ShapeStudio]";

        var _lu = (typeof window.createLogUtility === "function") ? window.createLogUtility().getLogger(LOG_PREFIX.slice(1, -1)) : null;
        function logInfo() { var a = Array.prototype.slice.call(arguments); _lu ? _lu.info.apply(_lu, a) : console.log.apply(console, [new Date().toISOString(), "[INFO]", LOG_PREFIX].concat(a)); }
        function logWarn() { var a = Array.prototype.slice.call(arguments); _lu ? _lu.warn.apply(_lu, a) : console.warn.apply(console, [new Date().toISOString(), "[WARN]", LOG_PREFIX].concat(a)); }
        function logError() { var a = Array.prototype.slice.call(arguments); _lu ? _lu.error.apply(_lu, a) : console.error.apply(console, [new Date().toISOString(), "[ERROR]", LOG_PREFIX].concat(a)); }
        function logDebug() { var a = Array.prototype.slice.call(arguments); _lu ? _lu.debug.apply(_lu, a) : console.debug.apply(console, [new Date().toISOString(), "[DEBUG]", LOG_PREFIX].concat(a)); }
        function logTrace() { var a = Array.prototype.slice.call(arguments); _lu ? _lu.trace.apply(_lu, a) : console.debug.apply(console, [new Date().toISOString(), "[TRACE]", LOG_PREFIX].concat(a)); }

        var CANVAS_KEY_PREFIX = "canvas:";
        var SHAPES_KEY = "shapes";
        var ACTIVE_KEY = "active";

        var HIGHLIGHT_COLORS = [
            "rgba(255, 255, 0, 0.4)",
            "rgba(0, 255, 128, 0.4)",
            "rgba(0, 200, 255, 0.4)",
            "rgba(255, 128, 0, 0.4)",
            "rgba(255, 0, 128, 0.4)",
            "rgba(180, 128, 255, 0.4)"
        ];

        var TOOLS = [
            { id: "ss-tool-select",    tool: "select",      shape: null,          icon: "bi-cursor",       label: "Select" },
            { id: "ss-tool-rect",      tool: "draw",        shape: "rectangle",   icon: "bi-square",       label: "Rectangle" },
            { id: "ss-tool-ellipse",   tool: "draw",        shape: "ellipse",     icon: "bi-circle",       label: "Ellipse" },
            { id: "ss-tool-diamond",   tool: "draw",        shape: "diamond",     icon: "bi-diamond",      label: "Diamond" },
            { id: "ss-tool-hexagon",   tool: "draw",        shape: "hexagon",     icon: "bi-hexagon",      label: "Hexagon" },
            { id: "ss-tool-star",      tool: "draw",        shape: "star",        icon: "bi-star",         label: "Star" },
            { id: "ss-tool-triangle",  tool: "draw",        shape: "triangle",    icon: "bi-triangle",     label: "Triangle" },
            { id: "ss-tool-arrow",     tool: "draw",        shape: "arrow-right", icon: "bi-arrow-right",  label: "Arrow" },
            { id: "ss-tool-pen",       tool: "pen",         shape: null,          icon: "bi-vector-pen",   label: "Pen" },
            { id: "ss-tool-brush",     tool: "brush",       shape: null,          icon: "bi-brush",        label: "Brush" },
            { id: "ss-tool-highlight", tool: "highlighter",  shape: null,          icon: "bi-highlighter",  label: "Highlight" },
            { id: "ss-tool-paint",     tool: "paintbrush",  shape: null,          icon: "bi-paint-bucket", label: "Paint" },
            { id: "ss-tool-text",      tool: "text",        shape: null,          icon: "bi-fonts",        label: "Text" },
            { id: "ss-tool-measure",   tool: "measure",     shape: null,          icon: "bi-rulers",       label: "Measure" }
        ];

        var TOOL_HELP = {
            "select": "Select, move, resize, and rotate shapes. Click to select, drag to move. Shift+click for multi-select.",
            "draw": "Click and drag to draw a shape. Choose the shape type from the tool panel above.",
            "pen": "Click to add anchor points. Click near the start point to close the shape. Press Escape to finish an open path.",
            "brush": "Click and drag to draw freehand brush strokes. Adjust colour and width in the tool options.",
            "highlighter": "Click and drag to draw translucent highlight strokes. Choose from 6 preset colours.",
            "paintbrush": "Paint inside paintable shapes only. Set brush size, colour, alpha, and hardness in the options panel.",
            "text": "Click to place a text label. Double-click an existing label to edit its content.",
            "connect": "Click a port on one shape, drag to a port on another to create a connector line.",
            "measure": "Click and drag to measure distances and angles between two points on the canvas."
        };

        var toolHelpBody = null;

        // ====================================================================
        // GUARD
        // ====================================================================

        if (typeof createDiagramEngine !== "function")
        {
            logError("createDiagramEngine not available");
            return;
        }

        if (typeof Sidebar !== "function")
        {
            logError("Sidebar component not available");
            return;
        }

        if (typeof Toolbar !== "function")
        {
            logError("Toolbar component not available");
            return;
        }

        // ====================================================================
        // DOM REFERENCES (minimal — sidebars + toolbar are component-managed)
        // ====================================================================

        var studioBody       = document.getElementById("ss-body");
        var toolbarContainer = document.getElementById("ss-toolbar-container");
        var centerEl         = document.getElementById("ss-center");
        var filenameEl       = document.getElementById("ss-filename");
        var autosaveEl       = document.getElementById("ss-autosave");

        if (!studioBody || !toolbarContainer || !centerEl)
        {
            logError("Required DOM elements missing");
            return;
        }

        // ====================================================================
        // STATE
        // ====================================================================

        var currentCanvas = StudioStorage.load(NS, ACTIVE_KEY) || "Untitled";
        var engine = null;
        var autoSave = null;
        var activeTool = "select";

        // DOM references populated after sidebar builds
        var toolGrid = null;
        var toolOptionsContainer = null;
        var toolOptionsTitle = null;
        var toolOptionsBody = null;
        var shapeListEl = null;

        // ====================================================================
        // DOM HELPER
        // ====================================================================

        function el(id)
        {
            return document.getElementById(id);
        }

        // ====================================================================
        // ENGINE SETUP
        // ====================================================================

        function createEngineInstance()
        {
            engine = createDiagramEngine("ss-canvas", {
                grid: { visible: true, size: 10, style: "lines" },
                editable: true,
                connectable: true,
                textEditable: true,
                resizable: true,
                rotatable: true
            });

            autoSave = StudioStorage.createAutoSave(NS, CANVAS_KEY_PREFIX + currentCanvas, 2000);
            wireEngineEvents();

            logDebug("DiagramEngine created");
        }

        function wireEngineEvents()
        {
            engine.on("dirty:change", function(dirty)
            {
                if (dirty) { triggerAutoSave(); }
            });

            engine.on("object:add", function() { triggerAutoSave(); });
            engine.on("object:remove", function() { triggerAutoSave(); });
            engine.on("object:change", function() { triggerAutoSave(); });
        }

        createEngineInstance();

        // ====================================================================
        // AUTO-SAVE
        // ====================================================================

        function triggerAutoSave()
        {
            var data = {
                name: currentCanvas,
                document: engine.exportJSON(),
                modified: StudioStorage.now()
            };

            autoSave(data);
            flashAutoSaveIndicator();
        }

        function flashAutoSaveIndicator()
        {
            autosaveEl.textContent = "Saved";
            autosaveEl.classList.add("visible");

            setTimeout(function()
            {
                autosaveEl.classList.remove("visible");
            }, 1500);
        }

        // ====================================================================
        // TOOLBAR — via Toolbar component
        // ====================================================================

        /**
         * Returns the file operations toolbar items array.
         *
         * @returns {Array} ToolItem array.
         */
        function buildFileToolbarItems()
        {
            return [
                { id: "new", icon: "bi-file-plus", label: "New", tooltip: "New canvas", onClick: function() { newCanvas(); } },
                { id: "open", icon: "bi-folder2-open", label: "Open", tooltip: "Open canvas", onClick: function() { openCanvasDialog(); } },
                { id: "save", icon: "bi-save", label: "Save", tooltip: "Save canvas", onClick: function() { saveCanvas(); } }
            ];
        }

        /**
         * Returns the export operations toolbar items array.
         *
         * @returns {Array} ToolItem array.
         */
        function buildExportToolbarItems()
        {
            return [
                { id: "export-svg", icon: "bi-filetype-svg", label: "SVG", tooltip: "Export as SVG", onClick: function() { exportSVG(); } },
                { id: "export-json", icon: "bi-filetype-json", label: "JSON", tooltip: "Export as JSON", onClick: function() { exportJSON(); } },
                { id: "import", icon: "bi-upload", label: "Import", tooltip: "Import JSON", onClick: function() { importJSON(); } }
            ];
        }

        /**
         * Returns the view operations toolbar items array.
         *
         * @returns {Array} ToolItem array.
         */
        function buildViewToolbarItems()
        {
            return [
                { id: "zoom-fit", icon: "bi-arrows-fullscreen", tooltip: "Zoom to fit", onClick: function() { engine.zoomToFit(); } },
                { id: "zoom-in", icon: "bi-zoom-in", tooltip: "Zoom in", onClick: function() { engine.zoomIn(); } },
                { id: "zoom-out", icon: "bi-zoom-out", tooltip: "Zoom out", onClick: function() { engine.zoomOut(); } }
            ];
        }

        /**
         * Creates the main toolbar using the Toolbar component.
         *
         * @returns {object} Toolbar instance.
         */
        function buildToolbar()
        {
            var tb = new Toolbar({
                label: "Shape Studio Toolbar",
                mode: "docked",
                contained: true,
                regions: [
                    {
                        id: "file",
                        title: "File",
                        items: buildFileToolbarItems()
                    },
                    {
                        id: "export",
                        title: "Export",
                        items: buildExportToolbarItems()
                    },
                    {
                        id: "view",
                        title: "View",
                        items: buildViewToolbarItems()
                    }
                ]
            });

            tb.show(toolbarContainer);
            logDebug("Toolbar created via Toolbar component");
            return tb;
        }

        var studioToolbar = buildToolbar();

        // ====================================================================
        // LEFT SIDEBAR — Tool Panel via Sidebar component
        // ====================================================================

        /**
         * Creates the left sidebar for the tool panel.
         *
         * @returns {object} Sidebar instance.
         */
        function buildLeftSidebar()
        {
            var sb = new Sidebar({
                title: "Tools",
                icon: "bi-tools",
                mode: "docked",
                dockPosition: "left",
                width: 200,
                collapsible: true,
                resizable: true,
                contained: true
            });

            sb.show(studioBody);

            // Move the sidebar before the center panel
            var rootEl = sb.getRootElement();

            if (rootEl && centerEl)
            {
                studioBody.insertBefore(rootEl, centerEl);
            }

            // Build tool content inside sidebar
            var content = sb.getContentElement();

            if (content)
            {
                content.style.padding = "0";
                content.appendChild(buildToolGrid());
                content.appendChild(buildToolOptionsPanel());
                content.appendChild(buildToolHelpPanel());
            }

            logDebug("Left sidebar created via Sidebar component");
            return sb;
        }

        /**
         * Builds the tool button grid container.
         *
         * @returns {HTMLElement} Grid container element.
         */
        function buildToolGrid()
        {
            var grid = document.createElement("div");

            grid.className = "ss-tool-grid";
            grid.id = "ss-tool-grid";
            toolGrid = grid;

            return grid;
        }

        /**
         * Builds the tool options panel container.
         *
         * @returns {HTMLElement} Options panel element.
         */
        function buildToolOptionsPanel()
        {
            var container = document.createElement("div");

            container.className = "ss-tool-options";
            container.id = "ss-tool-options";
            container.style.display = "none";
            toolOptionsContainer = container;

            var title = document.createElement("div");

            title.className = "ss-tool-options-title";
            title.id = "ss-tool-options-title";
            title.textContent = "Options";
            toolOptionsTitle = title;
            container.appendChild(title);

            var body = document.createElement("div");

            body.id = "ss-tool-options-body";
            toolOptionsBody = body;
            container.appendChild(body);

            return container;
        }

        var leftSidebar = buildLeftSidebar();

        // ====================================================================
        // RIGHT SIDEBAR — Shape Library via Sidebar component
        // ====================================================================

        /**
         * Creates the right sidebar for the shape library.
         *
         * @returns {object} Sidebar instance.
         */
        function buildRightSidebar()
        {
            var sb = new Sidebar({
                title: "Saved Shapes",
                icon: "bi-collection",
                mode: "docked",
                dockPosition: "right",
                width: 240,
                collapsible: true,
                resizable: true,
                contained: true
            });

            sb.show(studioBody);

            // Build shape library content inside sidebar
            var content = sb.getContentElement();

            if (content)
            {
                content.style.padding = "0";
                content.appendChild(buildSaveShapeHeader());

                var listDiv = document.createElement("div");

                listDiv.id = "ss-shape-list";
                shapeListEl = listDiv;
                content.appendChild(listDiv);
            }

            logDebug("Right sidebar created via Sidebar component");
            return sb;
        }

        /**
         * Builds the "Save Selected" button header for the shape library.
         *
         * @returns {HTMLElement} Header element with save button.
         */
        function buildSaveShapeHeader()
        {
            var header = document.createElement("div");

            header.style.cssText = "display: flex; align-items: center; justify-content: flex-end; padding: 6px 8px; border-bottom: 1px solid var(--bs-border-color, #dee2e6);";

            var saveBtn = document.createElement("button");

            saveBtn.className = "studio-btn primary ss-save-shape-btn";
            saveBtn.id = "ss-save-shape";
            saveBtn.innerHTML = '<i class="bi bi-plus-lg"></i> Save Selected';

        // ====================================================================

        // ====================================================================

        function applyToolColor(toolName, color)
        {
            var toolInstance = engine.getToolInstance(toolName);

            if (toolInstance && typeof toolInstance.setColor === "function")
            {
                toolInstance.setColor(color);
            }

            logDebug("Tool color:", toolName, color);
        }

        function applyToolWidth(toolName, width)
        {
            var toolInstance = engine.getToolInstance(toolName);

            if (toolInstance && typeof toolInstance.setStrokeWidth === "function")
            {
                toolInstance.setStrokeWidth(width);
            }

            logDebug("Tool width:", toolName, width);
        }

        function applyPaintbrushSetting(prop, value)
        {
            var toolInstance = engine.getToolInstance("paintbrush");

            if (!toolInstance)
            {
                return;
            }

            if (prop === "color" && typeof toolInstance.setColor === "function")
            {
                toolInstance.setColor(value);
            }
            else if (prop === "size" && typeof toolInstance.setSize === "function")
            {
                toolInstance.setSize(value);
            }
            else if (prop === "alpha" && typeof toolInstance.setAlpha === "function")
            {
                toolInstance.setAlpha(value);
            }

            logDebug("Paintbrush:", prop, value);
        }

        function newCanvas()
        {
            if (engine.isDirty())
            {
                saveCanvasData();
            }

            currentCanvas = "Untitled";
            engine.clear();

            StudioStorage.save(NS, ACTIVE_KEY, currentCanvas);
            updateFilenameDisplay();

            autoSave = StudioStorage.createAutoSave(NS, CANVAS_KEY_PREFIX + currentCanvas, 2000);

            logInfo("New canvas created");
        }

        function openCanvasDialog()
        {
            var list = el("ss-open-file-list");

            list.innerHTML = "";

            var canvases = listSavedCanvases();

            if (canvases.length === 0)
            {
                renderEmptyFileList(list);
                showDialog("ss-open-dialog");
                return;
            }

            for (var i = 0; i < canvases.length; i++)
            {
                var item = createFileListItem(canvases[i]);

                list.appendChild(item);
            }

            showDialog("ss-open-dialog");
        }

        function renderEmptyFileList(list)
        {
            var li = document.createElement("li");

            li.className = "studio-empty";
            li.innerHTML = '<i class="bi bi-folder2"></i> No saved canvases';
            list.appendChild(li);
        }

        function createFileListItem(canvas)
        {
            var li = document.createElement("li");

            li.className = "studio-file-item";

            var nameSpan = document.createElement("span");

            nameSpan.className = "studio-file-name";
            nameSpan.textContent = canvas.name;

            var metaSpan = document.createElement("span");

            metaSpan.className = "studio-file-meta";
            metaSpan.textContent = StudioStorage.formatDate(canvas.modified);

            var actions = document.createElement("span");

            actions.className = "studio-file-actions";

            var delBtn = document.createElement("button");

            delBtn.className = "studio-file-delete";
            delBtn.title = "Delete";
            delBtn.innerHTML = '<i class="bi bi-trash"></i>';

            delBtn.addEventListener("click", function(e)
            {
                e.stopPropagation();
                deleteCanvas(canvas.name);
                openCanvasDialog();
            });

            actions.appendChild(delBtn);

            li.appendChild(nameSpan);
            li.appendChild(metaSpan);
            li.appendChild(actions);

            li.addEventListener("click", function()
            {
                openCanvas(canvas.name);
                hideDialog("ss-open-dialog");
            });

            return li;
        }

        function openCanvas(name)
        {
            if (engine.isDirty())
            {
                saveCanvasData();
            }

            var data = StudioStorage.load(NS, CANVAS_KEY_PREFIX + name);

            if (data && data.document)
            {
                engine.fromJSON(data.document);
            }
            else
            {
                engine.clear();
            }

            currentCanvas = name;
            StudioStorage.save(NS, ACTIVE_KEY, currentCanvas);
            updateFilenameDisplay();

            autoSave = StudioStorage.createAutoSave(NS, CANVAS_KEY_PREFIX + currentCanvas, 2000);

            logInfo("Opened canvas:", name);
        }

        function saveCanvas()
        {
            if (currentCanvas === "Untitled")
            {
                showSaveAsDialog();
                return;
            }

            saveCanvasData();
            flashAutoSaveIndicator();
            logInfo("Canvas saved:", currentCanvas);
        }

        function showSaveAsDialog()
        {
            el("ss-saveas-name").value = currentCanvas === "Untitled" ? "" : currentCanvas;
            showDialog("ss-saveas-dialog");

            setTimeout(function()
            {
                el("ss-saveas-name").focus();
            }, 100);
        }

        function confirmSaveAs()
        {
            var name = el("ss-saveas-name").value.trim();

            if (!name)
            {
                return;
            }

            currentCanvas = name;
            saveCanvasData();

            StudioStorage.save(NS, ACTIVE_KEY, currentCanvas);
            updateFilenameDisplay();

            autoSave = StudioStorage.createAutoSave(NS, CANVAS_KEY_PREFIX + currentCanvas, 2000);

            hideDialog("ss-saveas-dialog");
            flashAutoSaveIndicator();

            logInfo("Saved as:", name);
        }

        function saveCanvasData()
        {
            var data = {
                name: currentCanvas,
                document: engine.exportJSON(),
                modified: StudioStorage.now()
            };

            StudioStorage.save(NS, CANVAS_KEY_PREFIX + currentCanvas, data);
            engine.markClean();
        }

        function deleteCanvas(name)
        {
            StudioStorage.remove(NS, CANVAS_KEY_PREFIX + name);

            if (currentCanvas === name)
            {
                newCanvas();
            }

            logInfo("Deleted canvas:", name);
        }

        function listSavedCanvases()
        {
            var keys = StudioStorage.list(NS);
            var canvases = [];

            for (var i = 0; i < keys.length; i++)
            {
                if (keys[i].indexOf("canvas:") === 0)
                {
                    var data = StudioStorage.load(NS, keys[i]);

                    if (data)
                    {
                        canvases.push({
                            name: data.name || keys[i].substring(7),
                            modified: data.modified || ""
                        });
                    }
                }
            }

            canvases.sort(function(a, b)
            {
                return (b.modified || "").localeCompare(a.modified || "");
            });

            return canvases;
        }

        function loadCurrentCanvas()
        {
            var data = StudioStorage.load(NS, CANVAS_KEY_PREFIX + currentCanvas);

            if (data && data.document)
            {
                try
                {
                    engine.fromJSON(data.document);
                    logDebug("Loaded canvas:", currentCanvas);
                }
                catch (err)
                {
                    logError("Failed to load canvas:", err);
                    engine.clear();
                }
            }
        }

        // ====================================================================
        // SHAPE LIBRARY
        // ====================================================================

        function saveSelectedAsShape()
        {
            var selected = engine.getSelectedObjectsPublic();

            if (!selected || selected.length === 0)
            {
                window.alert("Select one or more objects first.");
                return;
            }

            el("ss-shape-name-input").value = "";
            showDialog("ss-shape-dialog");

            setTimeout(function()
            {
                el("ss-shape-name-input").focus();
            }, 100);
        }

        function confirmSaveShape()
        {
            var name = el("ss-shape-name-input").value.trim();

            if (!name)
            {
                return;
            }

            var selected = engine.getSelectedObjectsPublic();

            if (!selected || selected.length === 0)
            {
                hideDialog("ss-shape-dialog");
                return;
            }

            var shapes = loadShapesFromStorage();
            var shapeEntry = buildShapeEntry(name, selected);

            shapes.push(shapeEntry);
            StudioStorage.save(NS, SHAPES_KEY, shapes);

            hideDialog("ss-shape-dialog");
            renderShapeList();

            logInfo("Shape saved:", name, selected.length, "objects");
        }

        function buildShapeEntry(name, objects)
        {
            var bounds = computeObjectsBounds(objects);
            var normalized = normalizeObjects(objects, bounds);

            return {
                id: generateId(),
                name: name,
                objects: normalized,
                width: bounds.width,
                height: bounds.height,
                created: StudioStorage.now()
            };
        }

        function computeObjectsBounds(objects)
        {
            var minX = Infinity;
            var minY = Infinity;
            var maxX = -Infinity;
            var maxY = -Infinity;

            for (var i = 0; i < objects.length; i++)
            {
                var obj = objects[i];
                var x = obj.presentation.x || 0;
                var y = obj.presentation.y || 0;
                var w = obj.presentation.width || 100;
                var h = obj.presentation.height || 100;

                if (x < minX) { minX = x; }
                if (y < minY) { minY = y; }
                if (x + w > maxX) { maxX = x + w; }
                if (y + h > maxY) { maxY = y + h; }
            }

            return { x: minX, y: minY, width: maxX - minX, height: maxY - minY };
        }

        function normalizeObjects(objects, bounds)
        {
            var result = [];

            for (var i = 0; i < objects.length; i++)
            {
                var obj = JSON.parse(JSON.stringify(objects[i]));

                obj.presentation.x = (obj.presentation.x || 0) - bounds.x;
                obj.presentation.y = (obj.presentation.y || 0) - bounds.y;

                result.push(obj);
            }

            return result;
        }

        function loadShapesFromStorage()
        {
            return StudioStorage.load(NS, SHAPES_KEY) || [];
        }

        function renderShapeList()
        {
            if (!shapeListEl)
            {
                return;
            }

            shapeListEl.innerHTML = "";

            var shapes = loadShapesFromStorage();

            if (shapes.length === 0)
            {
                renderEmptyShapeList(shapeListEl);
                return;
            }

            for (var i = 0; i < shapes.length; i++)
            {
                var item = createShapeListItem(shapes[i], i);

                shapeListEl.appendChild(item);
            }
        }

        function renderEmptyShapeList(container)
        {
            var empty = document.createElement("div");

            empty.className = "studio-empty";
            empty.innerHTML = '<i class="bi bi-collection"></i> No saved shapes yet.<br>' +
                '<span style="font-size: 11px; margin-top: 4px; display: inline-block;">' +
                'Select objects and click "Save Selected"</span>';

            container.appendChild(empty);
        }

        function createShapeListItem(shape, index)
        {
            var item = document.createElement("div");

            item.className = "ss-shape-item";

            var thumb = createShapeThumbnail(shape);
            var info = createShapeInfo(shape);
            var actions = createShapeActions(shape, index);

            item.appendChild(thumb);
            item.appendChild(info);
            item.appendChild(actions);

            return item;
        }

        function createShapeThumbnail(shape)
        {
            var thumb = document.createElement("div");

            thumb.className = "ss-shape-thumb";

            var svg = buildThumbnailSVG(shape);

            thumb.innerHTML = svg;

            return thumb;
        }

        function buildThumbnailSVG(shape)
        {
            var w = shape.width || 100;
            var h = shape.height || 100;
            var padding = 4;
            var viewBox = (-padding) + " " + (-padding) + " " + (w + padding * 2) + " " + (h + padding * 2);

            var parts = ['<svg xmlns="http://www.w3.org/2000/svg" viewBox="' + viewBox + '">'];

            for (var i = 0; i < shape.objects.length; i++)
            {
                var obj = shape.objects[i];

                parts.push(renderThumbObject(obj));
            }

            parts.push("</svg>");

            return parts.join("");
        }

        function renderThumbObject(obj)
        {
            var x = obj.presentation.x || 0;
            var y = obj.presentation.y || 0;
            var w = obj.presentation.width || 50;
            var h = obj.presentation.height || 50;
            var fill = (obj.presentation.style && obj.presentation.style.fill) || "#4a90d9";
            var stroke = (obj.presentation.style && obj.presentation.style.stroke) || "#333";
            var sw = 1;
            var shape = obj.presentation.shape || "rectangle";

            if (shape === "ellipse")
            {
                return renderThumbEllipse(x, y, w, h, fill, stroke, sw);
            }

            return '<rect x="' + x + '" y="' + y +
                '" width="' + w + '" height="' + h +
                '" fill="' + escAttr(fill) + '" stroke="' + escAttr(stroke) +
                '" stroke-width="' + sw + '"/>';
        }

        function renderThumbEllipse(x, y, w, h, fill, stroke, sw)
        {
            var cx = x + w / 2;
            var cy = y + h / 2;

            return '<ellipse cx="' + cx + '" cy="' + cy +
                '" rx="' + (w / 2) + '" ry="' + (h / 2) +
                '" fill="' + escAttr(fill) + '" stroke="' + escAttr(stroke) +
                '" stroke-width="' + sw + '"/>';
        }

        function escAttr(val)
        {
            if (typeof val !== "string")
            {
                return String(val);
            }

            return val.replace(/&/g, "&amp;").replace(/"/g, "&quot;")
                .replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function createShapeInfo(shape)
        {
            var info = document.createElement("div");

            info.className = "ss-shape-info";

            var nameEl = document.createElement("div");

            nameEl.className = "ss-shape-name";
            nameEl.textContent = shape.name;

            var metaEl = document.createElement("div");

            metaEl.className = "ss-shape-meta";

            var objCount = shape.objects ? shape.objects.length : 0;

            metaEl.textContent = objCount + " object" + (objCount !== 1 ? "s" : "");

            info.appendChild(nameEl);
            info.appendChild(metaEl);

            return info;
        }

        function createShapeActions(shape, index)
        {
            var actions = document.createElement("div");

            actions.className = "ss-shape-actions";

            var loadBtn = createActionButton("bi-box-arrow-in-down", "Load onto canvas", function(e)
            {
                e.stopPropagation();
                loadShapeOntoCanvas(shape);
            });

            var exportBtn = createActionButton("bi-filetype-svg", "Export SVG", function(e)
            {
                e.stopPropagation();
                exportShapeSVG(shape);
            });

            var deleteBtn = createActionButton("bi-trash", "Delete shape", function(e)
            {
                e.stopPropagation();
                deleteShape(index);
            });

            deleteBtn.classList.add("danger");

            actions.appendChild(loadBtn);
            actions.appendChild(exportBtn);
            actions.appendChild(deleteBtn);

            return actions;
        }

        function createActionButton(icon, titleText, handler)
        {
            var btn = document.createElement("button");

            btn.className = "ss-shape-action-btn";
            btn.title = titleText;
            btn.innerHTML = '<i class="bi ' + icon + '"></i>';
            btn.addEventListener("click", handler);

            return btn;
        }

        // ====================================================================
        // SHAPE OPERATIONS
        // ====================================================================

        function loadShapeOntoCanvas(shape)
        {
            if (!shape.objects || shape.objects.length === 0)
            {
                return;
            }

            var vp = engine.getViewport();
            var centerX = (-vp.x + 400) / vp.zoom;
            var centerY = (-vp.y + 300) / vp.zoom;
            var offsetX = centerX - (shape.width || 100) / 2;
            var offsetY = centerY - (shape.height || 100) / 2;
            var addedIds = [];

            for (var i = 0; i < shape.objects.length; i++)
            {
                var obj = JSON.parse(JSON.stringify(shape.objects[i]));

                obj.presentation.x = (obj.presentation.x || 0) + offsetX;
                obj.presentation.y = (obj.presentation.y || 0) + offsetY;

                delete obj.id;

                var added = engine.addObject(obj);

                addedIds.push(added.id);
            }

            engine.select(addedIds);

            logDebug("Loaded shape:", shape.name, addedIds.length, "objects");
        }

        function exportShapeSVG(shape)
        {
            var svg = buildThumbnailSVG(shape);
            var filename = sanitizeFilename(shape.name) + ".svg";

            StudioStorage.downloadFile(svg, filename, "image/svg+xml;charset=utf-8");

            logInfo("Exported shape SVG:", shape.name);
        }

        function deleteShape(index)
        {
            var shapes = loadShapesFromStorage();

            if (index < 0 || index >= shapes.length)
            {
                return;
            }

            var name = shapes[index].name;

            shapes.splice(index, 1);
            StudioStorage.save(NS, SHAPES_KEY, shapes);
            renderShapeList();

            logInfo("Deleted shape:", name);
        }

        // ====================================================================
        // UTILITY
        // ====================================================================

        function generateId()
        {
            return "ss-" + Date.now().toString(36) + "-" + Math.random().toString(36).substring(2, 8);
        }

        // ====================================================================
        // HELP TOGGLE
        // ====================================================================

        var ssHelpVisible = false;
        var ssHelpToggleBtn = document.getElementById("ss-help-toggle");

        /**
         * Toggles the tool help section visibility.
         */
        function toggleHelp()
        {
            ssHelpVisible = !ssHelpVisible;
            var helpSection = document.getElementById("ss-tool-help");

            if (helpSection)
            {
                helpSection.style.display = ssHelpVisible ? "" : "none";
            }

            if (ssHelpToggleBtn)
            {
                ssHelpToggleBtn.classList.toggle("active", ssHelpVisible);
            }

            if (ssHelpVisible)
            {
                updateToolHelp(activeTool);
            }

            logDebug("Help panel", ssHelpVisible ? "shown" : "hidden");
        }

        if (ssHelpToggleBtn)
        {
            ssHelpToggleBtn.addEventListener("click", function()
            {
                toggleHelp();
            });
        }

        // F1 keyboard shortcut
        document.addEventListener("keydown", function(e)
        {
            if (e.key === "F1")
            {
                e.preventDefault();
                toggleHelp();
            }
        });

        // ====================================================================
        // INITIALIZATION
        // ====================================================================

        function init()
        {
            logInfo("Initializing Shape Studio");

            buildToolButtons();
            wireDialogs();
            renderShapeList();
            loadCurrentCanvas();
            updateFilenameDisplay();

            logInfo("Shape Studio initialised with Sidebar + Toolbar components");
        }

        // ====================================================================
        // BOOTSTRAP
        // ====================================================================

        if (document.readyState === "loading")
        {
            document.addEventListener("DOMContentLoaded", init);
        }
        else
        {
            init();
        }
    })();
    </script>

</body>
</html>
