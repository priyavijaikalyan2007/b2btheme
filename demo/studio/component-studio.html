    <style>
    /* Component Studio — canvas component wrappers (no chrome) */
    .cs-component
    {
        position: absolute;
        cursor: grab;
        outline: none;
        z-index: 10;
        user-select: none;
    }

    .cs-component:hover
    {
        outline: 1px dashed var(--bs-border-color, #dee2e6);
        outline-offset: 2px;
    }

    .cs-component.cs-selected
    {
        outline: 2px solid var(--bs-primary, #0d6efd);
        outline-offset: 2px;
    }

    .cs-component.cs-dragging
    {
        cursor: grabbing;
        opacity: 0.9;
    }

    .cs-component.cs-selected .cs-resize-handle
    {
        display: block;
    }

    .cs-component.cs-selected .cs-delete-btn
    {
        display: block;
    }

    .cs-resize-handle
    {
        display: none;
        position: absolute;
        right: -4px;
        bottom: -4px;
        width: 8px;
        height: 8px;
        background: var(--bs-primary, #0d6efd);
        cursor: nwse-resize;
        z-index: 11;
    }

    .cs-delete-btn
    {
        display: none;
        position: absolute;
        top: -8px;
        right: -8px;
        width: 16px;
        height: 16px;
        background: var(--bs-danger, #dc3545);
        color: white;
        border: none;
        border-radius: 50%;
        font-size: 10px;
        line-height: 16px;
        text-align: center;
        cursor: pointer;
        z-index: 12;
    }

    .cs-delete-btn:hover
    {
        background: #bb2d3b;
    }

    /* Canvas dot grid */
    .cs-canvas-grid
    {
        background-image: radial-gradient(circle, var(--bs-border-color, #dee2e6) 1px, transparent 1px);
        background-size: 20px 20px;
    }

    /* ===== Device frame styles ===== */

    /* Browser frame */
    .cs-frame-browser
    {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        border: 1px solid var(--bs-border-color, #dee2e6);
        border-radius: 8px;
        overflow: hidden;
        background: var(--bs-body-bg, #fff);
    }

    .cs-frame-browser-titlebar
    {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        background: var(--bs-tertiary-bg, #f8f9fa);
        border-bottom: 1px solid var(--bs-border-color, #dee2e6);
        min-height: 32px;
    }

    .cs-frame-dot
    {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
    }

    .cs-frame-tab
    {
        font-size: 11px;
        margin-left: 8px;
        padding: 2px 10px;
        background: var(--bs-body-bg, #fff);
        border-radius: 4px 4px 0 0;
        border: 1px solid var(--bs-border-color, #dee2e6);
        border-bottom: none;
    }

    .cs-frame-browser-addressbar
    {
        display: flex;
        align-items: center;
        padding: 4px 10px;
        background: var(--bs-tertiary-bg, #f8f9fa);
        border-bottom: 1px solid var(--bs-border-color, #dee2e6);
        min-height: 28px;
    }

    .cs-frame-url
    {
        font-size: 11px;
        color: var(--bs-secondary-color, #6c757d);
        flex: 1;
        padding: 2px 8px;
        background: var(--bs-body-bg, #fff);
        border: 1px solid var(--bs-border-color, #dee2e6);
        border-radius: 4px;
    }

    .cs-frame-content
    {
        flex: 1;
        overflow: hidden;
        position: relative;
    }

    /* Mobile frame */
    .cs-frame-mobile
    {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        border: 3px solid var(--bs-emphasis-color, #212529);
        border-radius: 28px;
        overflow: hidden;
        background: var(--bs-body-bg, #fff);
        position: relative;
    }

    .cs-frame-mobile-notch
    {
        width: 120px;
        height: 24px;
        background: var(--bs-emphasis-color, #212529);
        border-radius: 0 0 16px 16px;
        margin: 0 auto;
        flex-shrink: 0;
    }

    .cs-frame-mobile-homebar
    {
        width: 100px;
        height: 4px;
        background: var(--bs-emphasis-color, #212529);
        border-radius: 2px;
        margin: 8px auto;
        flex-shrink: 0;
    }

    /* Tablet frame */
    .cs-frame-tablet
    {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        border: 3px solid var(--bs-emphasis-color, #212529);
        border-radius: 16px;
        overflow: hidden;
        background: var(--bs-body-bg, #fff);
    }

    .cs-frame-tablet-camera
    {
        width: 8px;
        height: 8px;
        background: var(--bs-secondary-color, #6c757d);
        border-radius: 50%;
        margin: 6px auto;
        flex-shrink: 0;
    }

    .cs-frame-tablet-homebar
    {
        width: 80px;
        height: 4px;
        background: var(--bs-emphasis-color, #212529);
        border-radius: 2px;
        margin: 6px auto;
        flex-shrink: 0;
    }

    /* Desktop window frame */
    .cs-frame-desktop
    {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        border: 1px solid var(--bs-border-color, #dee2e6);
        overflow: hidden;
        background: var(--bs-body-bg, #fff);
    }

    .cs-frame-desktop-titlebar
    {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 4px 10px;
        background: var(--bs-tertiary-bg, #f8f9fa);
        border-bottom: 1px solid var(--bs-border-color, #dee2e6);
        min-height: 28px;
        font-size: 12px;
    }

    .cs-frame-title
    {
        font-weight: 600;
        font-size: 12px;
    }

    .cs-frame-desktop-controls
    {
        font-size: 11px;
        letter-spacing: 3px;
        opacity: 0.5;
    }

    /* Dialog frame */
    .cs-frame-dialog
    {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        border: 1px solid var(--bs-border-color, #dee2e6);
        border-radius: 6px;
        overflow: hidden;
        background: var(--bs-body-bg, #fff);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .cs-frame-dialog-titlebar
    {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        border-bottom: 1px solid var(--bs-border-color, #dee2e6);
        font-size: 13px;
        font-weight: 600;
    }

    .cs-frame-dialog-close
    {
        font-size: 14px;
        opacity: 0.4;
    }

    /* Card frame */
    .cs-frame-card
    {
        display: flex;
        flex-direction: column;
        width: 100%;
        height: 100%;
        border: 1px solid var(--bs-border-color, #dee2e6);
        overflow: hidden;
        background: var(--bs-body-bg, #fff);
    }

    .cs-frame-card-header
    {
        padding: 8px 12px;
        font-weight: 600;
        font-size: 13px;
        border-bottom: 1px solid var(--bs-border-color, #dee2e6);
        background: var(--bs-tertiary-bg, #f8f9fa);
    }
    </style>
</head>
<body>

    <div id="cs-root" class="studio-root">
        <!-- Header -->
        <div class="studio-header">
            <div class="studio-header-left">
                <h1 class="studio-title"><i class="bi bi-window-stack"></i> Component Studio</h1>
                <span class="studio-separator"></span>
                <span class="studio-filename" id="cs-filename">Untitled</span>
                <span class="studio-autosave-indicator" id="cs-autosave">Saved</span>
            </div>
            <div class="studio-header-right">
                <button class="studio-btn" id="cs-new"><i class="bi bi-file-earmark-plus"></i> New</button>
                <button class="studio-btn" id="cs-save"><i class="bi bi-save"></i> Save</button>
                <button class="studio-btn" id="cs-open"><i class="bi bi-folder2-open"></i> Open</button>
                <button class="studio-btn" id="cs-export"><i class="bi bi-download"></i> Export HTML</button>
                <a href="../index.html" class="studio-btn" title="Back to demos"><i class="bi bi-grid-3x3-gap"></i></a>
                <div id="demo-theme-toggle"></div>
            </div>
        </div>

        <!-- Main body: sidebars + center canvas -->
        <div id="cs-body" class="studio-body">
            <!-- Left sidebar mounts here via Sidebar component -->
            <!-- Center: canvas area -->
            <div id="cs-center" class="studio-center">
                <div id="cs-canvas" class="cs-canvas-grid" style="position: relative; width: 100%; height: 100%; overflow: auto; background: var(--bs-body-bg);">
                    <!-- Live components placed here as absolute-positioned divs -->
                </div>
            </div>
            <!-- Right sidebar mounts here via Sidebar component -->
        </div>
    </div>

        // ====================================================================

        /**
         * Generates a unique component placement ID.

         * @returns {string} Unique identifier.

        function generateId()
        {
            idCounter++;
            return "comp-" + Date.now() + "-" + idCounter;

        // ====================================================================
        // COMPONENT FACTORY INVOCATION
        // ====================================================================

        /**
         * Calls the window-global factory for a component entry.
         *
         * @param {object} entry - Registry entry with factory, pattern, defaults.
         * @param {string} containerId - DOM container element ID.
         * @param {object} options - Merged component options.
         * @returns {object|null} Component instance or null.
         */
        function invokeFactory(entry, containerId, options)
        {
            var win = window;
            var factory = win[entry.factory];

            if (!factory)
            {
                console.warn(LOG, "Factory not found:", entry.factory);
                return null;
            }

            var containerEl = document.getElementById(containerId);
            var merged = Object.assign(
                {}, entry.defaults, options,
                { container: containerEl, containerId: containerId }
            );

            if (entry.pattern === "opts")
            {
                return factory(merged);
            }

            if (entry.pattern === "opts-id")
            {
                return factory(merged, containerId);
            }

            return factory(containerId, merged);
        }

        // ====================================================================
        // COMPONENT REGISTRY LOOKUP
        // ====================================================================

        /**
         * Finds a component entry by name from the registry.
         *
         * @param {string} name - Component name.
         * @returns {object|null} Registry entry or null.
         */
        function findEntry(name)
        {
            for (var i = 0; i < COMPONENTS.length; i++)
            {
                if (COMPONENTS[i].name === name)
                {
                    return COMPONENTS[i];
                }
            }

            return null;
        }

        /**
         * Finds a placement by its unique ID.
         *
         * @param {string} id - Placement ID.
         * @returns {object|null} Placement object or null.
         */
        function findPlacement(id)
        {
            for (var i = 0; i < placements.length; i++)
            {
                if (placements[i].id === id)
                {
                    return placements[i];
                }
            }

            return null;
        }

        // ====================================================================
        // PLACE COMPONENT ON CANVAS
        // ====================================================================

        /**
         * Calculates placement coordinates near the canvas centre.
         *
         * @param {number} w - Component width.
         * @param {number} h - Component height.
         * @returns {{ x: number, y: number }} Position.
         */
        function calcPlacementPos(w, h)
        {
            var cw = canvasEl.clientWidth || 800;
            var ch = canvasEl.clientHeight || 600;
            var jitter = placements.length * 20;
            var x = Math.max(20, Math.round((cw - w) / 2 + jitter));
            var y = Math.max(20, Math.round((ch - h) / 2 + jitter));
            return { x: x, y: y };
        }

        /**
         * Creates the wrapper DOM for a placed component (no chrome).
         *
         * @param {object} placement - Placement state object.
         * @param {object} entry - Registry entry.
         * @returns {HTMLElement} Wrapper element.
         */
        function buildWrapper(placement, entry)
        {
            var wrapper = document.createElement("div");
            wrapper.className = "cs-component";
            wrapper.setAttribute("data-id", placement.id);
            wrapper.style.cssText = buildPositionStyle(placement);
            wrapper.appendChild(buildDeleteBtn(placement));
            wrapper.appendChild(buildResizeHandle());
            return wrapper;
        }

        /**
         * Builds the inline position/size style string.
         *
         * @param {object} placement - Placement state object.
         * @returns {string} CSS text.
         */
        function buildPositionStyle(placement)
        {
            return "position: absolute; left: " + placement.x + "px; top: "
                + placement.y + "px; width: " + placement.width + "px; height: "
                + placement.height + "px;";
        }

        /**
         * Creates the delete button for a wrapper.
         *
         * @param {object} placement - Placement state object.
         * @returns {HTMLElement} Delete button element.
         */
        function buildDeleteBtn(placement)
        {
            var btn = document.createElement("button");
            btn.className = "cs-delete-btn";
            btn.textContent = "\u00d7";
            btn.title = "Delete";

            btn.addEventListener("click", function(e)
            {
                e.stopPropagation();
                removePlacement(placement.id);
            });

            return btn;
        }

        /**
         * Creates the resize handle element.
         *
         * @returns {HTMLElement} Resize handle element.
         */
        function buildResizeHandle()
        {
            var handle = document.createElement("div");
            handle.className = "cs-resize-handle";
            return handle;
        }

        // ====================================================================
        // FRAME RENDERING
        // ====================================================================

        /**
         * Renders a device frame inside the wrapper.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} entry - Registry entry with frame name.
         * @param {object} opts - Placement options/defaults.
         */
        function renderFrame(wrapper, entry, opts)
        {
            var frameName = entry.name;

            if (frameName === "frame-browser")
            {
                renderBrowserFrame(wrapper, opts);
            }
            else if (frameName === "frame-mobile")
            {
                renderMobileFrame(wrapper);
            }
            else if (frameName === "frame-tablet")
            {
                renderTabletFrame(wrapper);
            }
            else if (frameName === "frame-desktop")
            {
                renderDesktopFrame(wrapper, opts);
            }
            else if (frameName === "frame-dialog")
            {
                renderDialogFrame(wrapper, opts);
            }
            else if (frameName === "frame-card")
            {
                renderCardFrame(wrapper, opts);
            }
        }

        /**
         * Renders a browser window frame.
         *
         * @param {HTMLElement} wrapper - Wrapper element.
         * @param {object} opts - Options with title and url.
         */
        function renderBrowserFrame(wrapper, opts)
        {
            var frame = document.createElement("div");
            frame.className = "cs-frame-browser";

            frame.appendChild(buildBrowserTitlebar(opts));
            frame.appendChild(buildBrowserAddressbar(opts));

            var content = document.createElement("div");
            content.className = "cs-frame-content";
            content.style.background = "white";
            frame.appendChild(content);

            wrapper.insertBefore(frame, wrapper.firstChild);
        }

        /**
         * Builds the browser titlebar with dots and tab.
         *
         * @param {object} opts - Options with title.
         * @returns {HTMLElement} Titlebar element.
         */
        function buildBrowserTitlebar(opts)
        {
            var titlebar = document.createElement("div");
            titlebar.className = "cs-frame-browser-titlebar";
            titlebar.appendChild(createDot("#ff5f57"));
            titlebar.appendChild(createDot("#ffbd2e"));
            titlebar.appendChild(createDot("#28c840"));

            var tab = document.createElement("span");
            tab.className = "cs-frame-tab";
            tab.textContent = opts.title || "New Tab";
            titlebar.appendChild(tab);
            return titlebar;
        }

        /**
         * Builds the browser address bar.
         *
         * @param {object} opts - Options with url.
         * @returns {HTMLElement} Addressbar element.
         */
        function buildBrowserAddressbar(opts)
        {
            var addressbar = document.createElement("div");
            addressbar.className = "cs-frame-browser-addressbar";
            var url = document.createElement("span");
            url.className = "cs-frame-url";
            url.textContent = opts.url || "https://example.com";
            addressbar.appendChild(url);
            return addressbar;
        }

        /**
         * Creates a coloured dot for traffic-light UI.

         * @param {string} color - CSS background color.

        /**
