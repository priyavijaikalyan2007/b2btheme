         * Renders a desktop window frame.
         *
         * @param {HTMLElement} wrapper - Wrapper element.
         * @param {object} opts - Options with title.
         */
        function renderDesktopFrame(wrapper, opts)
        {
            var frame = document.createElement("div");
            frame.className = "cs-frame-desktop";

            var titlebar = document.createElement("div");
            titlebar.className = "cs-frame-desktop-titlebar";

            var title = document.createElement("span");
            title.className = "cs-frame-title";
            title.textContent = opts.title || "Window";
            titlebar.appendChild(title);

            var controls = document.createElement("span");
            controls.className = "cs-frame-desktop-controls";
            controls.textContent = "\u2014 \u25A1 \u00D7";
            titlebar.appendChild(controls);

            frame.appendChild(titlebar);

            var content = document.createElement("div");
            content.className = "cs-frame-content";
            content.style.background = "white";
            frame.appendChild(content);

            wrapper.insertBefore(frame, wrapper.firstChild);
        }

        /**
         * Renders a dialog frame.
         *
         * @param {HTMLElement} wrapper - Wrapper element.
         * @param {object} opts - Options with title.
         */
        function renderDialogFrame(wrapper, opts)
        {
            var frame = document.createElement("div");
            frame.className = "cs-frame-dialog";

            var titlebar = document.createElement("div");
            titlebar.className = "cs-frame-dialog-titlebar";

            var title = document.createElement("span");
            title.textContent = opts.title || "Dialog Title";
            titlebar.appendChild(title);

            var close = document.createElement("span");
            close.className = "cs-frame-dialog-close";
            close.textContent = "\u00D7";
            titlebar.appendChild(close);

            frame.appendChild(titlebar);

            var content = document.createElement("div");
            content.className = "cs-frame-content";
            content.style.background = "white";
            frame.appendChild(content);

            wrapper.insertBefore(frame, wrapper.firstChild);
        }

        /**
         * Renders a card frame.
         *
         * @param {HTMLElement} wrapper - Wrapper element.
         * @param {object} opts - Options with title.
         */
        function renderCardFrame(wrapper, opts)
        {
            var frame = document.createElement("div");
            frame.className = "cs-frame-card";

            var header = document.createElement("div");
            header.className = "cs-frame-card-header";
            header.textContent = opts.title || "Card Title";
            frame.appendChild(header);

            var content = document.createElement("div");
            content.className = "cs-frame-content";
            content.style.background = "white";
            frame.appendChild(content);

            wrapper.insertBefore(frame, wrapper.firstChild);
        }

        // ====================================================================
        // BOOTSTRAP COMPONENT RENDERING
        // ====================================================================

        /**
         * Renders a static Bootstrap component inside the wrapper.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} entry - Registry entry.
         * @param {object} opts - Placement options/defaults.
         */
        function renderBootstrapComponent(wrapper, entry, opts)
        {
            var container = document.createElement("div");
            container.style.cssText = "width:100%;height:100%;overflow:auto;";

            var html = buildBootstrapHTML(entry.name, opts);
            container.innerHTML = html;
            wrapper.insertBefore(container, wrapper.firstChild);
        }

        /**
         * Builds HTML for a given Bootstrap component type.
         *
         * @param {string} name - Component registry name (e.g. "bs-card").
         * @param {object} opts - Options with defaults.
         * @returns {string} HTML string.
         */
        function buildBootstrapHTML(name, opts)
        {
            if (name === "bs-card") { return buildBsCard(opts); }
            if (name === "bs-button") { return buildBsButton(opts); }
            if (name === "bs-accordion") { return buildBsAccordion(opts); }
            if (name === "bs-modal") { return buildBsModal(opts); }
            if (name === "bs-tabs") { return buildBsTabs(opts); }
            if (name === "bs-alert") { return buildBsAlert(opts); }
            if (name === "bs-badge") { return buildBsBadge(opts); }
            if (name === "bs-listgroup") { return buildBsListGroup(opts); }
            if (name === "bs-table") { return buildBsTable(opts); }
            if (name === "bs-form") { return buildBsForm(opts); }
            if (name === "bs-pagination") { return buildBsPagination(opts); }
            if (name === "bs-dropdown") { return buildBsDropdown(opts); }
            if (name === "bs-progress") { return buildBsProgress(opts); }
            if (name === "bs-spinner") { return buildBsSpinner(opts); }
            if (name === "bs-toggle") { return buildBsToggle(opts); }
            if (name === "bs-navbar") { return buildBsNavbar(opts); }

            // --- HTML Primitives ---
            if (name === "html-heading") { return buildHtmlHeading(opts); }
            if (name === "html-text") { return buildHtmlText(opts); }
            if (name === "html-bold") { return buildHtmlBold(opts); }
            if (name === "html-small") { return buildHtmlSmall(opts); }
            if (name === "html-icon") { return buildHtmlIcon(opts); }
            if (name === "html-panel") { return buildHtmlPanel(opts); }
            if (name === "html-divider") { return buildHtmlDivider(opts); }
            if (name === "html-link") { return buildHtmlLink(opts); }
            if (name === "html-badge") { return buildHtmlBadge(opts); }
            if (name === "html-image") { return buildHtmlImage(opts); }
            if (name === "html-list") { return buildHtmlList(opts); }
            if (name === "html-blockquote") { return buildHtmlBlockquote(opts); }

            return "<div>Unsupported Bootstrap component</div>";
        }

        /**
         * Builds Bootstrap card HTML.
         */
        function buildBsCard(opts)
        {
            return '<div class="card"><div class="card-header">'
                + escapeHtml(opts.title || "Card Title")
                + '</div><div class="card-body">'
                + escapeHtml(opts.body || "Card content")
                + "</div></div>";
        }

        /**
         * Builds Bootstrap button HTML.
         */
        function buildBsButton(opts)
        {
            var v = opts.variant || "primary";
            return '<button class="btn btn-' + v + '">'
                + escapeHtml(opts.label || "Button") + "</button>";
        }

        /**
         * Builds Bootstrap accordion HTML.
         */
        function buildBsAccordion(opts)
        {
            var items = opts.items || [];
            var html = '<div class="accordion">';

            for (var i = 0; i < items.length; i++)
            {
                var show = i === 0 ? " show" : "";
                var collapsed = i === 0 ? "" : " collapsed";
                html += '<div class="accordion-item">'
                    + '<h2 class="accordion-header">'
                    + '<button class="accordion-button' + collapsed + '">'
                    + escapeHtml(items[i].title) + '</button></h2>'
                    + '<div class="accordion-collapse collapse' + show + '">'
                    + '<div class="accordion-body">'
                    + escapeHtml(items[i].body)
                    + '</div></div></div>';
            }

            return html + "</div>";
        }

        /**
         * Builds Bootstrap modal (static preview) HTML.
         */
        function buildBsModal(opts)
        {
            return '<div class="modal-dialog" style="position:static;display:block;margin:0;">'
                + '<div class="modal-content">'
                + '<div class="modal-header"><h5 class="modal-title">'
                + escapeHtml(opts.title || "Modal")
                + '</h5><button class="btn-close"></button></div>'
                + '<div class="modal-body">'
                + escapeHtml(opts.body || "")
                + '</div><div class="modal-footer">'
                + '<button class="btn btn-secondary">Close</button>'
                + '<button class="btn btn-primary">Save</button>'
                + '</div></div></div>';
        }

        /**
         * Builds Bootstrap tabs HTML.
         */
        function buildBsTabs(opts)
        {
            var tabs = opts.tabs || [];
            var nav = '<ul class="nav nav-tabs">';
            var content = '<div class="tab-content">';

            for (var i = 0; i < tabs.length; i++)
            {
                var active = tabs[i].active ? " active" : "";
                nav += '<li class="nav-item"><a class="nav-link' + active + '" href="#">'
                    + escapeHtml(tabs[i].label) + "</a></li>";
                content += '<div class="tab-pane' + active
                    + '" style="padding:8px;">' + escapeHtml(tabs[i].label)
                    + " content</div>";
            }

            return nav + "</ul>" + content + "</div>";
        }

        /**
         * Builds Bootstrap alert HTML.
         */
        function buildBsAlert(opts)
        {
            var v = opts.variant || "warning";
            return '<div class="alert alert-' + v + '">'
                + escapeHtml(opts.message || "Alert") + "</div>";
        }

        /**
         * Builds Bootstrap badge HTML.
         */
        function buildBsBadge(opts)
        {
            var v = opts.variant || "primary";
            return '<span class="badge bg-' + v + '">'
                + escapeHtml(opts.label || "Badge") + "</span>";
        }

        /**
         * Builds Bootstrap list-group HTML.
         */
        function buildBsListGroup(opts)
        {
            var items = opts.items || [];
            var html = '<ul class="list-group">';

            for (var i = 0; i < items.length; i++)
            {
                html += '<li class="list-group-item">'
                    + escapeHtml(items[i]) + "</li>";
            }

            return html + "</ul>";
        }

        /**
         * Builds Bootstrap table HTML.
         */
        function buildBsTable(opts)
        {
            var headers = opts.headers || [];
            var rows = opts.rows || [];
            var html = '<table class="table table-bordered table-sm"><thead><tr>';

            for (var h = 0; h < headers.length; h++)
            {
                html += "<th>" + escapeHtml(headers[h]) + "</th>";
            }

            html += "</tr></thead><tbody>";

            for (var r = 0; r < rows.length; r++)
            {
                html += "<tr>";
                for (var c = 0; c < rows[r].length; c++)
                {
                    html += "<td>" + escapeHtml(rows[r][c]) + "</td>";
                }
                html += "</tr>";
            }

            return html + "</tbody></table>";
        }

        /**
         * Builds Bootstrap form HTML.
         */
        function buildBsForm(opts)
        {
            var fields = opts.fields || [];
            var html = '<form style="padding:8px;">';

            for (var i = 0; i < fields.length; i++)
            {
                html += '<div class="mb-2"><label class="form-label">'
                    + escapeHtml(fields[i].label) + "</label>";

                if (fields[i].type === "textarea")
                {
                    html += '<textarea class="form-control" rows="2"></textarea>';
                }
                else
                {
                    html += '<input type="' + (fields[i].type || "text")
                        + '" class="form-control">';
                }

                html += "</div>";
            }

            return html + '<button type="button" class="btn btn-primary btn-sm">Submit</button></form>';
        }

        /**
         * Builds Bootstrap pagination HTML.
         */
        function buildBsPagination(opts)
        {
            var pages = opts.pages || 5;
            var active = opts.active || 1;
            var html = '<nav><ul class="pagination pagination-sm mb-0">';
            html += '<li class="page-item"><a class="page-link" href="#">&laquo;</a></li>';

            for (var i = 1; i <= pages; i++)
            {
                var cls = i === active ? " active" : "";
                html += '<li class="page-item' + cls
                    + '"><a class="page-link" href="#">' + i + "</a></li>";
            }

            return html + '<li class="page-item"><a class="page-link" href="#">&raquo;</a></li></ul></nav>';
        }

        /**
         * Builds Bootstrap dropdown HTML.
         */
        function buildBsDropdown(opts)
        {
            var items = opts.items || [];
            var html = '<div class="dropdown"><button class="btn btn-secondary dropdown-toggle">'
                + escapeHtml(opts.label || "Dropdown")
                + '</button><ul class="dropdown-menu" style="display:block;position:static;">';

            for (var i = 0; i < items.length; i++)
            {
                html += '<li><a class="dropdown-item" href="#">'
                    + escapeHtml(items[i]) + "</a></li>";
            }

            return html + "</ul></div>";
        }

        /**
         * Builds Bootstrap progress bar HTML.
         */
        function buildBsProgress(opts)
        {
            var val = opts.value || 50;
            var v = opts.variant || "primary";
            return '<div class="progress"><div class="progress-bar bg-' + v
                + '" style="width:' + val + '%">' + val + "%</div></div>";
        }

        /**
         * Builds Bootstrap spinner HTML.
         */
        function buildBsSpinner(opts)
        {
            var v = opts.variant || "primary";
            return '<div class="spinner-border text-' + v + '"></div>';
        }

        /**
         * Builds Bootstrap form-check toggle HTML.
         */
        function buildBsToggle(opts)
        {
            var checked = opts.checked ? " checked" : "";
            return '<div class="form-check form-switch">'
                + '<input class="form-check-input" type="checkbox"' + checked + '>'
                + '<label class="form-check-label">'
                + escapeHtml(opts.label || "Toggle") + "</label></div>";
        }

        /**
         * Builds Bootstrap navbar HTML.
         */
        function buildBsNavbar(opts)
        {
            var brand = opts.brand || "Brand";
            var items = opts.items || [];
            var html = '<nav class="navbar navbar-expand navbar-light bg-light" style="width:100%;">'
                + '<div class="container-fluid">'
                + '<a class="navbar-brand" href="#">' + escapeHtml(brand) + '</a>'
                + '<div class="navbar-nav">';

            for (var i = 0; i < items.length; i++)
            {
                var active = i === 0 ? " active" : "";
                html += '<a class="nav-link' + active + '" href="#">'
                    + escapeHtml(items[i]) + '</a>';
            }

            return html + '</div></div></nav>';
        }

        /**
         * Escapes HTML entities in a string.
         *
         * @param {string} str - Raw string.
         * @returns {string} Escaped string.
         */
        function escapeHtml(str)
        {
            if (!str) { return ""; }
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;");
        }

        // ====================================================================
        // HTML PRIMITIVE RENDER FUNCTIONS
        // ====================================================================

        /**
         * Builds an HTML heading element (h1–h6).
         */
        function buildHtmlHeading(opts)
        {
            var level = Math.max(1, Math.min(6, opts.level || 2));
            var tag = "h" + level;
            return "<" + tag + ">" + escapeHtml(opts.text || "Heading")
                + "</" + tag + ">";
        }

        /**
         * Builds an HTML paragraph with text alignment.
         */
        function buildHtmlText(opts)
        {
            var align = opts.align || "left";
            return '<p style="text-align:' + escapeHtml(align) + ';margin:0;">'
                + escapeHtml(opts.text || "Text content") + "</p>";
        }

        /**
         * Builds a bold (strong) text element.
         */
        function buildHtmlBold(opts)
        {
            return "<strong>" + escapeHtml(opts.text || "Bold text")
                + "</strong>";
        }

        /**
         * Builds a small text element with optional muted class.
         */
        function buildHtmlSmall(opts)
        {
            var cls = opts.muted !== false ? ' class="text-muted"' : "";
            return "<small" + cls + ">"
                + escapeHtml(opts.text || "Small text") + "</small>";
        }

        /**
         * Builds a Bootstrap Icon element.
         */
        function buildHtmlIcon(opts)
        {
            var icon = escapeHtml(opts.icon || "bi-star-fill");
            var size = parseInt(opts.size, 10) || 24;
            var color = escapeHtml(opts.color || "#212529");
            return '<i class="bi ' + icon
                + '" style="font-size:' + size + 'px;color:' + color
                + ';"></i>';
        }

        /**
         * Builds a blank panel container.
         */
        function buildHtmlPanel(opts)
        {
            var bg = escapeHtml(opts.background || "#f8f9fa");
            var border = opts.border !== false
                ? "border:1px solid #dee2e6;" : "";
            return '<div style="width:100%;height:100%;background:'
                + bg + ";" + border + '"></div>';
        }

        /**
         * Builds a horizontal divider (hr).
         */
        function buildHtmlDivider(opts)
        {
            var thickness = parseInt(opts.thickness, 10) || 1;
            return '<hr style="border:none;border-top:' + thickness
                + 'px solid #dee2e6;margin:0;">';
        }

        /**
         * Builds a hyperlink anchor element.
         */
        function buildHtmlLink(opts)
        {
            var href = escapeHtml(opts.href || "#");
            return '<a href="' + href + '">'
                + escapeHtml(opts.text || "Link") + "</a>";
        }

        /**
         * Builds a Bootstrap badge element.
         */
        function buildHtmlBadge(opts)
        {
            var variant = escapeHtml(opts.variant || "primary");
            return '<span class="badge bg-' + variant + '">'
                + escapeHtml(opts.text || "Badge") + "</span>";
        }

        /**
         * Builds an image placeholder with centred icon.
         */
        function buildHtmlImage(opts)
        {
            var alt = escapeHtml(opts.alt || "Image");
            var ratio = escapeHtml(opts.ratio || "3:2");
            return '<div style="width:100%;height:100%;background:#e9ecef;'
                + 'display:flex;align-items:center;justify-content:center;'
                + 'flex-direction:column;color:#6c757d;" title="' + alt + '">'
                + '<i class="bi bi-image" style="font-size:32px;"></i>'
                + '<small style="margin-top:4px;">' + ratio + "</small></div>";
        }

        /**
         * Builds an ordered or unordered list.
         */
        function buildHtmlList(opts)
        {
            var items = opts.items || ["Item 1", "Item 2", "Item 3"];
            var tag = opts.ordered ? "ol" : "ul";
            var html = "<" + tag + ' style="margin:0;padding-left:20px;">';

            for (var i = 0; i < items.length; i++)
            {
                html += "<li>" + escapeHtml(items[i]) + "</li>";
            }

            return html + "</" + tag + ">";
        }

        /**
         * Builds a blockquote with optional citation.
         */
        function buildHtmlBlockquote(opts)
        {
            var html = '<blockquote class="blockquote" style="margin:0;'
                + 'padding:8px 16px;border-left:4px solid #dee2e6;">'
                + "<p>" + escapeHtml(opts.text || "Quote text") + "</p>";

            if (opts.cite)
            {
                html += '<footer class="blockquote-footer">'
                    + escapeHtml(opts.cite) + "</footer>";
            }

            return html + "</blockquote>";
        }

        // ====================================================================
        // COMPONENT PLACEMENT
        // ====================================================================

        /**
         * Creates a mount container for live components.
         *
         * @param {HTMLElement} wrapper - Wrapper element.
         * @param {string} mountId - Container ID.
         * @returns {HTMLElement} Mount div.
         */
        function createMountContainer(wrapper, mountId)
        {
            var mount = document.createElement("div");
            mount.id = mountId;
            mount.style.cssText = "width:100%;height:100%;overflow:hidden;";
            wrapper.insertBefore(mount, wrapper.firstChild);
            return mount;
        }

        /**
         * Renders a live component using its factory.
         *
         * @param {HTMLElement} wrapper - Component wrapper.
         * @param {string} id - Placement ID.
         * @param {object} entry - Registry entry.
         * @param {object} options - Component options.
         * @returns {object|null} Component instance.
         */
        function renderLiveComponent(wrapper, id, entry, options)
        {
            var mountId = "cs-" + id;
            createMountContainer(wrapper, mountId);
            return invokeFactory(entry, mountId, options);
        }

        /**
         * Places a component on the canvas from a palette click.
         *
         * @param {object} entry - Registry entry.
         */
        function placeComponent(entry)
        {
            var pos = calcPlacementPos(entry.width, entry.height);
            var placement = createPlacementState(entry, pos);

            placements.push(placement);
            var wrapper = buildWrapper(placement, entry);

            canvasEl.appendChild(wrapper);
            addContentToWrapper(wrapper, placement, entry);

            bindDrag(wrapper, placement);
            bindResize(wrapper, placement);
            bindSelection(wrapper, placement);

            selectPlacement(placement.id);
            scheduleAutoSave();
            logInfo("Placed:", entry.label, "at", pos.x, pos.y);
        }

        /**
         * Creates the placement state object.
         *
         * @param {object} entry - Registry entry.
         * @param {{ x: number, y: number }} pos - Calculated position.
         * @returns {object} Placement state.
         */
        function createPlacementState(entry, pos)
        {
            return {
                id: generateId(),
                componentName: entry.name,
                x: pos.x,
                y: pos.y,
                width: entry.width,
                height: entry.height,
                options: JSON.parse(JSON.stringify(entry.defaults)),
                instance: null
            };
        }

        // ====================================================================
        // PLACEHOLDER RENDERER
        // ====================================================================

        /**
         * Renders a styled placeholder box for components with external deps
         * or viewport-docked components.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} entry - Registry entry.
         */
        function renderPlaceholder(wrapper, entry)
        {
            var box = document.createElement("div");
            box.style.cssText = "display:flex;flex-direction:column;align-items:center;"
                + "justify-content:center;width:100%;height:100%;"
                + "background:var(--bs-tertiary-bg,#f8f9fa);"
                + "border:1px dashed var(--bs-border-color,#dee2e6);"
                + "color:var(--bs-secondary-color,#6c757d);"
                + "font-size:12px;text-align:center;padding:12px;";

            var icon = document.createElement("i");
            icon.className = "bi " + entry.icon;
            icon.style.fontSize = "24px";
            icon.style.marginBottom = "8px";
            box.appendChild(icon);

            var name = document.createElement("strong");
            name.textContent = entry.label;
            box.appendChild(name);

            var msg = document.createElement("p");
            msg.style.margin = "4px 0 0";
            msg.style.fontSize = "11px";
            msg.textContent = entry.placeholderText || "External dependency required";
            box.appendChild(msg);

            wrapper.appendChild(box);
        }

        // ====================================================================
        // TRIGGER BUTTON RENDERER
        // ====================================================================

        /**
         * Renders a Bootstrap button that triggers a dialog/toast/banner action.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} placement - Placement state.
         * @param {object} entry - Registry entry.
         * @param {object} options - Merged options.
         */
        function renderTriggerButton(wrapper, placement, entry, options)
        {
            var btn = document.createElement("button");
            btn.className = "btn btn-" + (options.variant || "primary");
            btn.textContent = options.label || "Button";
            btn.style.cssText = "width:100%;height:100%;";

            btn.addEventListener("click", function(e)
            {
                executeTriggerAction(placement.options.action, placement.options, e);
            });

            wrapper.appendChild(btn);
        }

        /**
         * Executes a trigger button action (toast, confirm, error, banner, contextmenu).
         *
         * @param {string} action - Action type.
         * @param {object} options - Action options.
         * @param {Event} e - Click event for positioning.
         */
        function executeTriggerAction(action, options, e)
        {
            var baseAction = action.split("-")[0];
            var subVariant = action.split("-")[1];

            if (baseAction === "toast" && window.showToast)
            {
                window.showToast({
                    message: options.message || "Notification!",
                    variant: subVariant || options.toastVariant || "success",
                    duration: 3000
                });
            }
            else if (baseAction === "confirm" && window.showConfirmDialog)
            {
                window.showConfirmDialog({
                    title: options.dialogTitle || "Confirm",
                    message: options.dialogMessage || options.message || "Are you sure?",
                    onConfirm: function() { logDebug("Confirmed"); }
                });
            }
            else if (baseAction === "error" && window.showErrorDialog)
            {
                window.showErrorDialog({
                    title: options.dialogTitle || "Error",
                    message: options.dialogMessage || options.message || "An error occurred."
                });
            }
            else if (baseAction === "form" && window.createFormDialog)
            {
                window.createFormDialog({
                    title: options.dialogTitle || "Form",
                    fields: [
                        { id: "name", label: "Name", type: "text" },
                        { id: "email", label: "Email", type: "email" }
                    ],
                    onSubmit: function(data) { logDebug("Form submitted:", data); }
                });
            }
            else if (baseAction === "banner" && window.createBannerBar)
            {
                window.createBannerBar({
                    message: options.message || "Notice",
                    variant: subVariant || options.bannerVariant || "info",
                    dismissible: true
                });
            }
            else if (baseAction === "contextmenu" && window.createContextMenu)
            {
                var rect = e.target.getBoundingClientRect();
                window.createContextMenu({
                    items: options.menuItems || [
                        { id: "action1", label: "Action 1" },
                        { id: "action2", label: "Action 2" },
                    ],
                    x: rect.left,
                    y: rect.bottom + 2,
                    onClose: function() { logDebug("Context menu closed"); }
                });
            }
            else
            {
                logDebug("Trigger action:", action, options);
            }
        }

        // ====================================================================
        // CONTENT MOUNTING
        // ====================================================================

        /**
         * Adds frame, bootstrap, placeholder, trigger, or live content to a wrapper.
         *
         * @param {HTMLElement} wrapper - Wrapper element.
         * @param {object} placement - Placement state.
         * @param {object} entry - Registry entry.
         */
        function addContentToWrapper(wrapper, placement, entry)
        {
            if (entry.pattern === "placeholder")
            {
                renderPlaceholder(wrapper, entry);
            }
            else if (entry.pattern === "trigger")
            {
                renderTriggerButton(wrapper, placement, entry, placement.options);
            }
            else if (entry.pattern === "frame")
            {
                renderFrame(wrapper, entry, placement.options);
            }
            else if (entry.pattern === "bootstrap")
            {
                renderBootstrapComponent(wrapper, entry, placement.options);
            }
            else
            {
                placement.instance = renderLiveComponent(
                    wrapper, placement.id, entry, placement.options
                );
            }
        }

        // ====================================================================
        // DRAG HANDLING (on wrapper body, not header)
        // ====================================================================

        /**
         * Binds mousedown drag behaviour on the wrapper itself.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} placement - Placement state object.
         */
        function bindDrag(wrapper, placement)
        {
            wrapper.addEventListener("mousedown", function(e)
            {
                if (shouldSkipDrag(e))
                {
                    return;
                }

                e.preventDefault();
                startDrag(wrapper, placement, e.clientX, e.clientY);
            });
        }

        /**
         * Checks if drag should be skipped for a mouse event.
         *
         * @param {MouseEvent} e - The mouse event.
         * @returns {boolean} True if drag should be skipped.
         */
        function shouldSkipDrag(e)
        {
            var target = e.target;

            if (target.classList.contains("cs-resize-handle"))
            {
                return true;
            }

            if (target.classList.contains("cs-delete-btn"))
            {
                return true;
            }

            // Skip interactive elements only if inside a mount container
            // (live component). Trigger buttons are direct children of the
            // wrapper, so dragging them should still work.
            if (isInteractiveElement(target))
            {
                var wrapper = target.closest(".cs-component");
                var mountEl = wrapper
                    ? wrapper.querySelector("[id^='cs-']")
                    : null;

                if (mountEl && mountEl.contains(target))
                {
                    return true;
                }
            }

            return false;
        }

        /**
         * Checks if an element is interactive (input, button, link, etc.).
         *
         * @param {HTMLElement} el - DOM element.
         * @returns {boolean} True if interactive.
         */
        function isInteractiveElement(el)
        {
            var tag = el.tagName;
            var interactive = ["INPUT", "TEXTAREA", "SELECT", "BUTTON", "A"];
            return interactive.indexOf(tag) !== -1;
        }

        /**
         * Starts tracking mouse movement for drag repositioning.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} placement - Placement state object.
         * @param {number} startX - Initial mouse X.
         * @param {number} startY - Initial mouse Y.
         */
        function startDrag(wrapper, placement, startX, startY)
        {
            wrapper.classList.add("cs-dragging");

            // Collect start positions for all selected items so multi-select
            // drag moves every member by the same delta.
            var dragGroup = buildDragGroup(placement);

            function onMove(e)
            {
                var dx = e.clientX - startX;
                var dy = e.clientY - startY;

                for (var gi = 0; gi < dragGroup.length; gi++)
                {
                    var item = dragGroup[gi];
                    item.pl.x = Math.max(0, item.origX + dx);
                    item.pl.y = Math.max(0, item.origY + dy);
                    item.el.style.left = item.pl.x + "px";
                    item.el.style.top = item.pl.y + "px";
                }
            }

            function onUp()
            {
                document.removeEventListener("mousemove", onMove);
                document.removeEventListener("mouseup", onUp);
                wrapper.classList.remove("cs-dragging");
                updatePropertyPosition();
                scheduleAutoSave();
            }

            document.addEventListener("mousemove", onMove);
            document.addEventListener("mouseup", onUp);
        }

        /**
         * Builds the array of items to drag together. If the dragged
         * placement belongs to the current multi-selection, all selected
         * items are included; otherwise only the dragged item.
         *
         * @param {object} placement - The placement being dragged.
         * @returns {Array<{pl:object, el:HTMLElement, origX:number, origY:number}>}
         */
        function buildDragGroup(placement)
        {
            var group = [];

            if (selectedIds.indexOf(placement.id) > -1 && selectedIds.length > 1)
            {
                for (var i = 0; i < selectedIds.length; i++)
                {
                    var spl = findPlacement(selectedIds[i]);
                    var sel = canvasEl.querySelector(
                        '[data-id="' + selectedIds[i] + '"]'
                    );

                    if (spl && sel)
                    {
                        group.push({
                            pl: spl,
                            el: sel,
                            origX: spl.x,
                            origY: spl.y
                        });
                    }
                }
            }
            else
            {
                group.push({
                    pl: placement,
                    el: canvasEl.querySelector(
                        '[data-id="' + placement.id + '"]'
                    ),
                    origX: placement.x,
                    origY: placement.y
                });
            }

            return group;
        }

        // ====================================================================
        // RESIZE HANDLING
        // ====================================================================

        /**
         * Binds mousedown resize behaviour on a wrapper's resize handle.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} placement - Placement state object.
         */
        function bindResize(wrapper, placement)
        {
            var handle = wrapper.querySelector(".cs-resize-handle");

            handle.addEventListener("mousedown", function(e)
            {
                e.preventDefault();
                e.stopPropagation();
                startResize(wrapper, placement, e.clientX, e.clientY);
            });
        }

        /**
         * Starts tracking mouse movement for resize.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} placement - Placement state object.
         * @param {number} startX - Initial mouse X.
         * @param {number} startY - Initial mouse Y.
         */
        function startResize(wrapper, placement, startX, startY)
        {
            var origW = placement.width;
            var origH = placement.height;

            function onMove(e)
            {
                var dx = e.clientX - startX;
                var dy = e.clientY - startY;
                placement.width = Math.max(80, origW + dx);
                placement.height = Math.max(40, origH + dy);
                wrapper.style.width = placement.width + "px";
                wrapper.style.height = placement.height + "px";
            }

            function onUp()
            {
                document.removeEventListener("mousemove", onMove);
                document.removeEventListener("mouseup", onUp);
                updatePropertySize();
                scheduleAutoSave();
            }

            document.addEventListener("mousemove", onMove);
            document.addEventListener("mouseup", onUp);
        }

        // ====================================================================
        // SELECTION
        // ====================================================================

        /**
         * Binds click-to-select behaviour on a wrapper.
         *
         * @param {HTMLElement} wrapper - Component wrapper element.
         * @param {object} placement - Placement state object.
         */
        function bindSelection(wrapper, placement)
        {
            wrapper.addEventListener("mousedown", function(e)
            {
                if (e.shiftKey)
                {
                    toggleSelection(placement.id);
                }
                else
                {
                    selectPlacement(placement.id);
                }
            });
        }

        /**
         * Selects a placement by ID and updates the property panel.
         *
         * @param {string} id - Placement ID to select.
         */
        function selectPlacement(id)
        {
            clearSelectionClasses();
            selectedIds = [id];
            selectedId = id;
            var wrapper = canvasEl.querySelector('[data-id="' + id + '"]');

            if (wrapper)
            {
                wrapper.classList.add("cs-selected");
            }

            showPropertyPanel();
        }

        /**
         * Toggles a placement in/out of the multi-selection set (Shift+click).
         *
         * @param {string} id - Placement ID to toggle.
         */
        function toggleSelection(id)
        {
            var idx = selectedIds.indexOf(id);

            if (idx > -1)
            {
                selectedIds.splice(idx, 1);
                var w = canvasEl.querySelector('[data-id="' + id + '"]');
                if (w) { w.classList.remove("cs-selected"); }
            }
            else
            {
                selectedIds.push(id);
                var w2 = canvasEl.querySelector('[data-id="' + id + '"]');
                if (w2) { w2.classList.add("cs-selected"); }
            }

            // Primary selection is last in the array (for property panel)
            selectedId = selectedIds.length > 0
                ? selectedIds[selectedIds.length - 1]
                : null;

            if (selectedIds.length === 0)
            {
                hidePropertyPanel();
            }
            else if (selectedIds.length === 1)
            {
                showPropertyPanel();
            }
            else
            {
                showMultiSelectPanel();
            }
        }

        /**
         * Clears the cs-selected class from all wrappers.
         */
        function clearSelectionClasses()
        {
            var prev = canvasEl.querySelectorAll(".cs-selected");

            for (var i = 0; i < prev.length; i++)
            {
                prev[i].classList.remove("cs-selected");
            }
        }

        /**
         * Deselects all placements and hides the property panel.
         */
        function deselectAll()
        {
            clearSelectionClasses();
            selectedIds = [];
            selectedId = null;
            hidePropertyPanel();
        }

        // Canvas background click deselects
        canvasEl.addEventListener("mousedown", function(e)
        {
            if (e.target === canvasEl)
            {
                deselectAll();
            }
        });

        // ====================================================================
        // REMOVE PLACEMENT
        // ====================================================================

        /**
         * Removes a placed component from the canvas and state.
         *
         * @param {string} id - Placement ID to remove.
         */
        function removePlacement(id)
        {
            var wrapper = canvasEl.querySelector('[data-id="' + id + '"]');

            if (wrapper)
            {
                wrapper.remove();
            }

            for (var i = 0; i < placements.length; i++)
            {
                if (placements[i].id === id)
                {
                    placements.splice(i, 1);
                    break;
                }
            }

            // Remove from multi-selection array
            var sidx = selectedIds.indexOf(id);
            if (sidx > -1) { selectedIds.splice(sidx, 1); }

            if (selectedId === id)
            {
                selectedId = selectedIds.length > 0
                    ? selectedIds[selectedIds.length - 1]
                    : null;

                if (!selectedId)
                {
                    deselectAll();
                }
            }

            scheduleAutoSave();
            logInfo("Removed placement:", id);
        }

        // ====================================================================
        // DUPLICATE / BRING TO FRONT
        // ====================================================================

        /**
         * Duplicates the currently selected placement.
         */
        function duplicateSelected()
        {
            var pl = findPlacement(selectedId);

            if (!pl) { return; }

            var entry = findEntry(pl.componentName);

            if (!entry) { return; }

            var newPl = clonePlacement(pl);
            placements.push(newPl);
            mountPlacementOnCanvas(newPl, entry);

            selectPlacement(newPl.id);
            scheduleAutoSave();
            logInfo("Duplicated:", entry.label);
        }

        /**
         * Clones a placement state with offset position.
         *
         * @param {object} pl - Source placement.
         * @returns {object} Cloned placement state.
         */
        function clonePlacement(pl)
        {
            return {
                id: generateId(),
                componentName: pl.componentName,
                x: pl.x + 30,
                y: pl.y + 30,
                width: pl.width,
                height: pl.height,
                options: JSON.parse(JSON.stringify(pl.options)),
                instance: null
            };
        }

        /**
         * Mounts a placement on the canvas with bindings.
         *
         * @param {object} pl - Placement state.
         * @param {object} entry - Registry entry.
         */
        function mountPlacementOnCanvas(pl, entry)
        {
            var wrapper = buildWrapper(pl, entry);
            canvasEl.appendChild(wrapper);
            addContentToWrapper(wrapper, pl, entry);

            bindDrag(wrapper, pl);
            bindResize(wrapper, pl);
            bindSelection(wrapper, pl);
        }

        /**
         * Brings the selected placement to the front (highest z-index).
         */
        function bringToFront()
        {
            if (!selectedId)
            {
                return;
            }

            var wrapper = canvasEl.querySelector('[data-id="' + selectedId + '"]');

            if (wrapper)
            {
                canvasEl.appendChild(wrapper);
                logInfo("Brought to front:", selectedId);
            }
        }

        // ====================================================================
        // RECREATE COMPONENT (after options change)
        // ====================================================================

        /**
         * Destroys and recreates a component with updated options.
         *
         * @param {object} placement - Placement state object.
         */
        function recreateComponent(placement)
        {
            var entry = findEntry(placement.componentName);

            if (!entry)
            {
                return;
            }

            var wrapper = canvasEl.querySelector(
                '[data-id="' + placement.id + '"]'
            );

            if (!wrapper)
            {
                return;
            }

            clearWrapperContent(wrapper, placement);
            addContentToWrapper(wrapper, placement, entry);
            logInfo("Recreated:", entry.label);
        }

        /**
         * Clears all content from a wrapper, preserving handle and delete btn.
         *
         * @param {HTMLElement} wrapper - Wrapper element.
         * @param {object} placement - Placement state.
         */
        function clearWrapperContent(wrapper, placement)
        {
            if (placement.instance && typeof placement.instance.destroy === "function")
            {
                placement.instance.destroy();
            }

            placement.instance = null;
            var children = Array.prototype.slice.call(wrapper.children);

            for (var i = 0; i < children.length; i++)
            {
                var child = children[i];
                var keep = child.classList.contains("cs-resize-handle")
                    || child.classList.contains("cs-delete-btn");

                if (!keep)
                {
                    child.remove();
                }
            }
        }

        // ====================================================================
        // LEFT SIDEBAR — Component Palette
        // ====================================================================

        /**
         * Creates the left sidebar for the component palette.
         *
         * @returns {object} Sidebar instance.
         */
        function buildLeftSidebar()
        {
            var sb = new Sidebar({
                title: "Components",
                icon: "bi-puzzle",
                mode: "docked",
                dockPosition: "left",
                width: 220,
                collapsible: true,
                resizable: true,
                contained: true
            });

            sb.show(studioBody);
            positionLeftSidebar(sb);
            populateLeftSidebarContent(sb);

            logDebug("Left sidebar created");
            return sb;
        }

        /**
         * Positions the left sidebar before the centre panel.
         *
         * @param {object} sb - Sidebar instance.
         */
        function positionLeftSidebar(sb)
        {
            var rootEl = sb.getRootElement();

            if (rootEl && centerEl)
            {
                studioBody.insertBefore(rootEl, centerEl);
            }
        }

        /**
         * Populates the left sidebar with search and palette container.
         *
         * @param {object} sb - Sidebar instance.
         */
        function populateLeftSidebarContent(sb)
        {
            var content = sb.getContentElement();

            if (!content) { return; }

            content.appendChild(buildPaletteSearch());
            var palDiv = document.createElement("div");
            palDiv.className = "studio-sidebar-body";
            palDiv.id = "cs-palette";
            content.appendChild(palDiv);
            paletteEl = palDiv;
        }

        /**
         * Creates the search input for palette filtering.
         *
         * @returns {HTMLElement} Search container element.
         */
        function buildPaletteSearch()
        {
            var div = document.createElement("div");
            div.className = "studio-sidebar-search";

            var input = document.createElement("input");
            input.type = "text";
            input.placeholder = "Search components...";

            input.addEventListener("input", function()
            {
                filterPalette(input.value.toLowerCase().trim());
            });

            div.appendChild(input);
            return div;
        }

        var leftSidebar = buildLeftSidebar();

        // ====================================================================
        // PALETTE BUILD
        // ====================================================================

        /**
         * Groups COMPONENTS by category.
         *
         * @returns {object} Map of category name to entry arrays.
         */
        function groupByCategory()
        {
            var groups = {};

            for (var i = 0; i < COMPONENTS.length; i++)
            {
                var cat = COMPONENTS[i].category;

                if (!groups[cat])
                {
                    groups[cat] = [];
                }

                groups[cat].push(COMPONENTS[i]);
            }

            return groups;
        }

        /**
         * Returns categories in a fixed display order.
         *
         * @param {object} groups - Map of category name to entries.
         * @returns {string[]} Ordered category names.
         */
        function getCategoryOrder(groups)
        {
            var order = [
                "Frames", "Interactive", "Data", "Input", "Content",
                "Navigation", "Feedback", "AI", "Social", "Graph",
                "Layout", "Other", "HTML", "Bootstrap"
            ];
            var result = [];

            for (var i = 0; i < order.length; i++)
            {
                if (groups[order[i]])
                {
                    result.push(order[i]);
                }
            }

            // Append any extras not in the order list
            var keys = Object.keys(groups).sort();

            for (var k = 0; k < keys.length; k++)
            {
                if (result.indexOf(keys[k]) === -1)
                {
                    result.push(keys[k]);
                }
            }

            return result;
        }

        /**
         * Builds the palette from the component registry.
         */
        function buildPalette()
        {
            if (!paletteEl)
            {
                return;
            }

            var groups = groupByCategory();
            var cats = getCategoryOrder(groups);
            paletteEl.innerHTML = "";

            for (var ci = 0; ci < cats.length; ci++)
            {
                paletteEl.appendChild(
                    buildCategorySection(cats[ci], groups[cats[ci]])
                );
            }

            logDebug("Palette built with", COMPONENTS.length, "components");
        }

        /**
         * Creates a collapsible category section with palette items.
         *
         * @param {string} catName - Category name.
         * @param {Array} items - Component entries in this category.
         * @returns {HTMLElement} Category container element.
         */
        function buildCategorySection(catName, items)
        {
            var catEl = document.createElement("div");
            catEl.className = "studio-category";
            catEl.setAttribute("data-category", catName);

            catEl.appendChild(buildCategoryHeader(catName, items.length, catEl));
            catEl.appendChild(buildCategoryItems(items));
            return catEl;
        }

        /**
         * Builds a collapsible category header.
         *
         * @param {string} catName - Category name.
         * @param {number} count - Number of items.
         * @param {HTMLElement} catEl - Parent element for toggle.
         * @returns {HTMLElement} Header element.
         */
        function buildCategoryHeader(catName, count, catEl)
        {
            var header = document.createElement("div");
            header.className = "studio-category-header";
            header.innerHTML = '<i class="bi bi-chevron-down"></i> '
                + catName
                + ' <span style="opacity: 0.5; font-size: 10px;">('
                + count + ')</span>';

            header.addEventListener("click", function()
            {
                catEl.classList.toggle("collapsed");
            });

            return header;
        }

        /**
         * Builds the container of palette items for a category.
         *
         * @param {Array} items - Component entries.
         * @returns {HTMLElement} Items container.
         */
        function buildCategoryItems(items)
        {
            var container = document.createElement("div");
            container.className = "studio-category-items";

            for (var i = 0; i < items.length; i++)
            {
                container.appendChild(buildPaletteItem(items[i]));
            }

            return container;
        }

        /**
         * Creates a single clickable palette item.
         *
         * @param {object} entry - Component registry entry.
         * @returns {HTMLElement} Palette item element.
         */
        function buildPaletteItem(entry)
        {
            var el = document.createElement("div");
            el.className = "studio-palette-item";
            el.setAttribute("data-component", entry.name);
            el.setAttribute("title", entry.label + " (" + entry.width + "x" + entry.height + ")");

            el.innerHTML = '<i class="bi ' + entry.icon + '"></i> '
                + '<span class="item-label">' + entry.label + '</span>'
                + '<span class="item-size">' + entry.width + 'x' + entry.height + '</span>';

            el.addEventListener("click", function()
            {
                placeComponent(entry);
            });

            return el;
        }

        buildPalette();

        // ====================================================================
        // PALETTE SEARCH FILTER
        // ====================================================================

        /**
         * Filters palette items by search query.
         *
         * @param {string} query - Lowercase search string.
         */
        function filterPalette(query)
        {
            if (!paletteEl)
            {
                return;
            }

            var categories = paletteEl.querySelectorAll(".studio-category");

            for (var ci = 0; ci < categories.length; ci++)
            {
                filterCategory(categories[ci], query);
            }
        }

        /**
         * Filters a single category by query.
         *
         * @param {HTMLElement} cat - Category element.
         * @param {string} query - Lowercase search string.
         */
        function filterCategory(cat, query)
        {
            var items = cat.querySelectorAll(".studio-palette-item");
            var visible = 0;

            for (var ii = 0; ii < items.length; ii++)
            {
                var label = items[ii].querySelector(".item-label");
                var text = label ? label.textContent.toLowerCase() : "";
                var match = !query || text.indexOf(query) !== -1;
                items[ii].style.display = match ? "" : "none";

                if (match)
                {
                    visible++;
                }
            }

            cat.style.display = visible > 0 ? "" : "none";

            if (query && visible > 0)
            {
                cat.classList.remove("collapsed");
            }
        }

        // ====================================================================
        // RIGHT SIDEBAR — Property Panel
        // ====================================================================

         *

        function buildRightSidebar()

        /**
         * Builds the Help tab content container.
         *
         * @returns {HTMLElement} Help tab content.
         */
        function buildHelpTabContent()
        {
            var wrapper = document.createElement("div");
            wrapper.id = "cs-help-tab";
            wrapper.style.cssText = "display:none;padding:8px;flex:1;overflow-y:auto;";

            var body = document.createElement("div");
            body.id = "cs-help-body";

        function updateHelp(componentName)

        /**
         * Fetches and renders the full README for a component.
         *
         * @param {string} componentName - Registry component name.
         */
        function loadComponentReadme(componentName)
        {
            var helpBody = document.getElementById("cs-help-body");

            if (!helpBody) { return; }

            // Skip README fetch for non-component entries (frames, triggers, bootstrap, placeholders)
            var entry = findEntry(componentName);
            if (entry && (entry.pattern === "frame" || entry.pattern === "trigger"
                || entry.pattern === "bootstrap" || entry.pattern === "placeholder"))
            {
                showFallbackHelp(helpBody, componentName, "");
                return;
            }

            helpBody.innerHTML = '<p style="color:var(--bs-secondary-color);'
                + 'text-align:center;padding:20px;">'
                + '<i class="bi bi-hourglass-split"></i> Loading documentation...</p>';

            // Try local dev path first, then CDN docs path
            var localUrl = "../../components/" + componentName + "/README.md";
            var cdnUrl = "../../docs/components/" + componentName + "/README.md";

            fetch(localUrl)
                .then(function(resp)
                {
                    if (!resp.ok) { throw new Error("Not found"); }
                    return resp.text();
                })
                .then(function(md)
                {
                    renderReadme(helpBody, md);
                })
                .catch(function()
                {
                    // Fallback: try CDN docs path (also raw markdown)
                    fetch(cdnUrl)
                        .then(function(resp)
                        {
                            if (!resp.ok) { throw new Error("Not found"); }
                            return resp.text();
                        })
                        .then(function(md)
                        {
                            renderReadme(helpBody, md);
                        })
                        .catch(function()
                        {
                            showFallbackHelp(helpBody, componentName, localUrl);
                        });
                });
        }

        /**
         * Renders Markdown content into a container using MarkdownRenderer,
         * marked, or a plain-text fallback.
         *
         * @param {HTMLElement} container - Target element.
         * @param {string} markdown - Raw Markdown text.
         */
        function renderReadme(container, markdown)
        {
            container.innerHTML = "";

            if (typeof window.createMarkdownRenderer === "function")
            {
                var renderer = window.createMarkdownRenderer({});
                renderer.render(markdown, container);
            }
            else if (typeof window.marked === "object"
                || typeof window.marked === "function")
            {
                var div = document.createElement("div");
                div.style.cssText = "font-size:13px;line-height:1.6;";
                div.innerHTML = window.marked.parse(markdown);
                container.appendChild(div);
            }
            else
            {
                var pre = document.createElement("pre");
                pre.style.cssText = "white-space:pre-wrap;"
                    + "font-size:12px;padding:8px;";
                pre.textContent = markdown;
                container.appendChild(pre);
            }
        }

        /**
         * Renders pre-generated docs HTML (from CDN) into the help panel.
         * Extracts the docs-container content, stripping the nav/breadcrumb.
         *
         * @param {HTMLElement} container - Target element.
         * @param {string} html - Full HTML page string.
         */
        function renderDocsHtml(container, html)
        {
            container.innerHTML = "";

            var wrapper = document.createElement("div");
            wrapper.style.cssText = "font-size:13px;line-height:1.6;";

            // Extract docs-container content from the full page
            var match = html.match(/<div class="docs-container">([\s\S]*?)<\/div>\s*<script/);

            if (match)
            {
                wrapper.innerHTML = match[1];
            }
            else
            {
                // Fallback: strip head/body tags and show as-is
                wrapper.innerHTML = html.replace(/<head[\s\S]*?<\/head>/i, "")
                    .replace(/<nav[\s\S]*?<\/nav>/i, "")
                    .replace(/<script[\s\S]*?<\/script>/gi, "");
            }

            container.appendChild(wrapper);
        }

        /**
         * Shows the inline COMPONENT_HELP fallback when README fetch fails.
         *
         * @param {HTMLElement} helpBody - Help body element.
         * @param {string} componentName - Component name.
         * @param {string} url - URL that was attempted.
         */
        function showFallbackHelp(helpBody, componentName, url)
        {
            var help = COMPONENT_HELP[componentName];
            var html = help
                || '<p style="color:var(--bs-secondary-color)">'
                + 'No documentation available for this component.</p>';

            html += '<p style="font-size:11px;color:var(--bs-secondary-color);'
                + 'margin-top:8px;">README not available at '
                + url + '</p>';

            helpBody.innerHTML = html;
        }

        /**
         * Checks whether a placement uses the trigger pattern.
         *
         * @param {object} pl - Placement state object.
         * @returns {boolean} True if the placement is a trigger-type component.
         */
        function isTrigger(pl)
        {
            return pl.componentName && pl.componentName === "trigger-button";
        }

        /**
         * Maps placement options to the combined action dropdown value.
         *
         * @param {object} opts - Placement options.
         * @returns {string} Combined action value (e.g. "toast-success").
         */
        function mapTriggerAction(opts)
        {
            var action = opts.action || "none";

            if (action === "toast")
            {
                return "toast-" + (opts.toastVariant || "success");
            }

            if (action === "banner")
            {
                return "banner-" + (opts.bannerVariant || "info");
            }

            return action;
        }

        /**
         * Shows and populates the trigger config fields for a placement.
         *
         * @param {object} placement - Placement state object.
         */
        function showTriggerConfig(placement)
        {
            var cfg = document.getElementById("cs-trigger-config");

            if (!cfg) { return; }

            cfg.style.display = "";

            var opts = placement.options || {};
            setTriggerVal("cs-trigger-label", opts.label || "Click Me");
            setTriggerVal("cs-trigger-variant", opts.variant || "primary");
            setTriggerVal("cs-trigger-action", mapTriggerAction(opts));
            setTriggerVal("cs-trigger-message", opts.message || "");
            setTriggerVal("cs-trigger-title", opts.dialogTitle || "");
        }

         *
         * @param {string} id - Element ID.
         * @param {string} val - Value to set.
         */
        function setTriggerVal(id, val)
        {
            var el = document.getElementById(id);

            if (el) { el.value = val; }
        }

        /**
         * Binds change listeners on all trigger config fields.
         */
        function bindTriggerConfig()
        {
            var fields = [
                "cs-trigger-label", "cs-trigger-variant",
                "cs-trigger-action", "cs-trigger-message",
                "cs-trigger-title"
            ];

            for (var i = 0; i < fields.length; i++)
            {
                var el = document.getElementById(fields[i]);

                if (el)
                {
                    el.addEventListener("change", applyTriggerConfig);
                }
            }
        }

        /**
         * Reads trigger config fields and applies them to the selected placement.
         */
        function applyTriggerConfig()
        {
            if (!selectedId) { return; }

            var pl = findPlacement(selectedId);

            if (!pl || !isTrigger(pl)) { return; }

            var actionVal = document.getElementById("cs-trigger-action").value;
            var baseAction = actionVal.split("-")[0];
            var subVariant = actionVal.split("-")[1];

            pl.options = {
                label: document.getElementById("cs-trigger-label").value,
                variant: document.getElementById("cs-trigger-variant").value,
                action: baseAction,
                message: document.getElementById("cs-trigger-message").value,
                dialogTitle: document.getElementById("cs-trigger-title").value,
                dialogMessage: document.getElementById("cs-trigger-message").value
            };

            if (baseAction === "toast")
            {
                pl.options.toastVariant = subVariant || "success";
            }

            if (baseAction === "banner")
            {
                pl.options.bannerVariant = subVariant || "info";
            }

            recreateComponent(pl);
            scheduleAutoSave();
        }

        /**
         * Opens a full-screen modal dialog for editing component options JSON.
         *
         * @param {object} placement - Placement state object.
         * @param {object} entry - Registry entry.
         */
        function showOptionsDialog(placement, entry)
        {
            var overlay = document.createElement("div");
            overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:2000;";

            var dialog = document.createElement("div");
            dialog.style.cssText = "background:var(--bs-body-bg,#fff);border:1px solid var(--bs-border-color);width:600px;max-width:90vw;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(0,0,0,0.2);";

            var header = document.createElement("div");
            header.style.cssText = "padding:12px 16px;border-bottom:1px solid var(--bs-border-color);font-weight:600;display:flex;justify-content:space-between;align-items:center;";
            header.textContent = "Edit Options \u2014 " + entry.label;

            var closeBtn = document.createElement("button");
            closeBtn.style.cssText = "background:none;border:none;font-size:18px;cursor:pointer;opacity:0.5;color:var(--bs-body-color);";
            closeBtn.textContent = "\u00D7";
            header.appendChild(closeBtn);

            var editorContainer = document.createElement("div");
            editorContainer.style.cssText = "flex:1;margin:16px;border:1px solid var(--bs-border-color);overflow:hidden;min-height:300px;";
            editorContainer.id = "cs-opts-editor-" + Date.now();

            var jsonStr = JSON.stringify(placement.options || entry.defaults, null, 2);
            var codeEditorInstance = null;

            var footer = document.createElement("div");
            footer.style.cssText = "padding:12px 16px;border-top:1px solid var(--bs-border-color);display:flex;justify-content:flex-end;gap:8px;";

            var cancelBtn = document.createElement("button");
            cancelBtn.className = "btn btn-sm btn-secondary";
            cancelBtn.textContent = "Cancel";

            var saveBtn = document.createElement("button");
            saveBtn.className = "btn btn-sm btn-primary";
            saveBtn.textContent = "Save & Apply";

            footer.appendChild(cancelBtn);
            footer.appendChild(saveBtn);

            // Try CodeEditor first
            if (typeof window.createCodeEditor === "function")
            {
                dialog.appendChild(header);
                dialog.appendChild(editorContainer);
                dialog.appendChild(footer);
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);

                try
                {
                    codeEditorInstance = window.createCodeEditor(editorContainer.id, {
                        language: "json",
                        value: jsonStr
                    });
                }
                catch (err)
                {
                    logWarn("CodeEditor failed, falling back to textarea:", err);
                    editorContainer.innerHTML = "";
                    var ta = buildFallbackTextarea(jsonStr);
                    editorContainer.appendChild(ta);
                }
            }
            else
            {
                // Fallback textarea
                var ta = buildFallbackTextarea(jsonStr);
                dialog.appendChild(header);
                dialog.appendChild(ta);
                dialog.appendChild(footer);
                overlay.appendChild(dialog);
                document.body.appendChild(overlay);
            }

            // Save handler reads from CodeEditor or textarea
            saveBtn.addEventListener("click", function()
            {
                var newJson;

                if (codeEditorInstance && typeof codeEditorInstance.getValue === "function")
                {
                    newJson = codeEditorInstance.getValue();
                }
                else
                {
                    var textEl = dialog.querySelector("textarea");
                    newJson = textEl ? textEl.value : jsonStr;
                }

                try
                {
                    var newOpts = JSON.parse(newJson);
                    placement.options = newOpts;
                    recreateComponent(placement);
                    populateProperties(placement);
                    scheduleAutoSave();

                    if (codeEditorInstance && typeof codeEditorInstance.destroy === "function")
                    {
                        codeEditorInstance.destroy();
                    }

                    document.body.removeChild(overlay);
                }
                catch (err)
                {
                    alert("Invalid JSON: " + err.message);
                }
            });

            // Cancel cleanup
            cancelBtn.addEventListener("click", function()
            {
                if (codeEditorInstance && typeof codeEditorInstance.destroy === "function")
                {
                    codeEditorInstance.destroy();
                }

                document.body.removeChild(overlay);
            });

            // Close button cleanup
            closeBtn.addEventListener("click", function()
            {
                if (codeEditorInstance && typeof codeEditorInstance.destroy === "function")
                {
                    codeEditorInstance.destroy();
                }

                document.body.removeChild(overlay);
            });

            // Click-outside to close
            overlay.addEventListener("click", function(e)
            {
                if (e.target === overlay)
                {
                    if (codeEditorInstance && typeof codeEditorInstance.destroy === "function")
                    {
                        codeEditorInstance.destroy();
                    }

                    document.body.removeChild(overlay);
                }
            });
        }

        /**
         * Builds a fallback textarea for editing JSON when CodeEditor is unavailable.
         *
         * @param {string} value - Initial textarea value.
         * @returns {HTMLTextAreaElement} Textarea element.
         */
        function buildFallbackTextarea(value)
        {
            var ta = document.createElement("textarea");
            ta.style.cssText = "flex:1;margin:16px;padding:12px;font-family:'JetBrains Mono',monospace;font-size:12px;border:1px solid var(--bs-border-color);background:var(--bs-body-bg);color:var(--bs-body-color);resize:none;min-height:300px;width:calc(100% - 32px);";
            ta.value = value;
            return ta;
        }

        /**
         * Builds the Actions property group with buttons.
         *
         * @returns {HTMLElement} Property group element.
         */
        function buildActionsGroup()
        {
            var grp = createPropGroup("Actions");

            grp.appendChild(buildActionBtn("cs-prop-delete", "bi-trash", " Delete", "danger"));
            grp.appendChild(buildActionBtn("cs-prop-dup", "bi-copy", " Duplicate", ""));
            grp.appendChild(buildActionBtn("cs-prop-front", "bi-front", " Bring to Front", ""));

            return grp;
        }

        /**
         * Creates a styled action button.
         *
         * @param {string} id - Button element ID.
         * @param {string} icon - Bootstrap icon class.
         * @param {string} label - Button text.
         * @param {string} variant - CSS class variant (e.g. "danger").
         * @returns {HTMLElement} Button element.
         */
        function buildActionBtn(id, icon, label, variant)
        {
            var btn = document.createElement("button");
            btn.className = "studio-btn" + (variant ? " " + variant : "");
            btn.id = id;
            btn.style.cssText = "width: 100%; margin-bottom: 4px;";

            var ico = document.createElement("i");
            ico.className = "bi " + icon;
