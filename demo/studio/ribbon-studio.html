    <!-- App logic -->
    <script>
    (function()
    {
        "use strict";

        var LOG = "[Ribbon Studio]";
        var NS = "ribbon-studio";

        // ====================================================================
        // STATE
        // ====================================================================

        var files = StudioStorage.load(NS, "files") || {};
        var currentFile = StudioStorage.load(NS, "active") || "Untitled Ribbon";
        var builder = null;
        var autoSaveTimer = null;
        var AUTOSAVE_DELAY = 2000;

        // ====================================================================
        // DOM REFERENCES
        // ====================================================================

        var filenameEl       = document.getElementById("rs-filename");
        var autosaveEl       = document.getElementById("rs-autosave");
        var btnNew           = document.getElementById("rs-btn-new");
        var btnOpen          = document.getElementById("rs-btn-open");
        var btnSave          = document.getElementById("rs-btn-save");

        // ====================================================================
        // UI HELPERS
        // ====================================================================

        /**
         * Updates the filename display in the header.
         */
        function updateFilenameDisplay()
        {
            if (filenameEl)
            {
                filenameEl.textContent = currentFile;
            }
        }

        /**
         * Flashes the autosave indicator briefly.
         */
        function flashAutosave()
        {
            if (!autosaveEl)
            {
                return;
            }

            autosaveEl.textContent = "Saved";
            autosaveEl.classList.add("visible");

            setTimeout(function()
            {
                autosaveEl.classList.remove("visible");
            }, 1500);
        }

        /**
         * Marks the autosave indicator as having unsaved changes.
         */
        function markUnsaved()
        {
            if (!autosaveEl)
            {
                return;
            }

            autosaveEl.textContent = "Unsaved";
            autosaveEl.classList.add("visible");
        }

        // ====================================================================
        // PERSISTENCE
        // ====================================================================

        /**
         * Persists the files map and active file name to storage.
         */
        function persistState()
        {
            StudioStorage.save(NS, "files", files);
            StudioStorage.save(NS, "active", currentFile);
        }

        /**
         * Triggers a debounced auto-save of the current builder config.
         *
         * @param {object} config - The ribbon config from onChange.
         */
        function scheduleAutoSave(config)
        {
            markUnsaved();

            if (autoSaveTimer)
            {
                clearTimeout(autoSaveTimer);
            }

            autoSaveTimer = setTimeout(function()
            {
                saveCurrentConfig(config);
                autoSaveTimer = null;
            }, AUTOSAVE_DELAY);
        }

        /**
         * Saves a config snapshot for the current file.
         *
         * @param {object} config - The ribbon config to save.
         */
        function saveCurrentConfig(config)
        {
            files[currentFile] = {
                config: config,
                modified: StudioStorage.now()
            };
            persistState();
            flashAutosave();
            console.log(LOG, "Auto-saved:", currentFile);
        }

        // ====================================================================
        // DEFAULT CONFIG
        // ====================================================================

        /**
         * Returns a starter config with one empty tab.
         *
         * @returns {object} Minimal RibbonOptions.
         */
        function createDefaultConfig()
        {
            return {
                tabs: [
                    {
                        id: "tab-1",
                        label: "Home",
                        groups: []
                    }
                ]
            };
        }

        // ====================================================================
        // BUILDER MANAGEMENT
        // ====================================================================

        /**
         * Loads a config into the RibbonBuilder, creating it if needed.
         *
         * @param {object} config - RibbonOptions to load.
         */
        function loadIntoBuilder(config)
        {
            if (builder)
            {
                builder.setConfig(config);
            }
            else
            {
                initBuilder(config);
            }
        }

        /**
         * Creates the RibbonBuilder instance and mounts it.
         *
         * @param {object} config - Initial RibbonOptions.
         */
        function initBuilder(config)
        {
            builder = createRibbonBuilder({
                initialConfig: config,
                onChange: function(c)
                {
                    scheduleAutoSave(c);
                }
            }, "rs-builder");

            console.log(LOG, "Builder initialized");
        }

        /**
         * Switches to a named file, loading its config into the builder.
         *
         * @param {string} name - File name to switch to.
         */
        function switchToFile(name)
        {
            currentFile = name;
            updateFilenameDisplay();

            var entry = files[name];
            var config = entry ? entry.config : createDefaultConfig();

            loadIntoBuilder(config);
            StudioStorage.save(NS, "active", currentFile);
            console.log(LOG, "Switched to:", name);
        }

        // ====================================================================
        // FILE OPERATIONS
        // ====================================================================

        /**
         * Creates a new file. Prompts for a name, creates an empty config.
         */
        function newFile()
        {
            var name = prompt("New ribbon name:", "My Ribbon");

            if (!name || !name.trim())
            {
                return;
            }

            name = name.trim();

            if (files[name])
            {
                if (!confirm("\"" + name + "\" already exists. Overwrite?"))
                {
                    return;
                }
            }

            files[name] = {
                config: createDefaultConfig(),
                modified: StudioStorage.now()
            };

            persistState();
            switchToFile(name);
            console.log(LOG, "New file created:", name);
        }

        /**
         * Opens the file picker dialog.
         */
        function openFile()
        {
            var names = Object.keys(files);

            if (names.length === 0)
            {
                alert("No saved files. Use \"New\" to create one.");
                return;
            }

            showOpenDialog(names);
        }

        /**
         * Saves the current builder config under the current file name.
         */
        function saveFile()
        {
            if (!builder)
            {
                return;
            }

            saveCurrentConfig(builder.getConfig());
            console.log(LOG, "Saved:", currentFile);
        }

        /**
         * Deletes a file by name with confirmation.
         *
         * @param {string} name - File name to delete.
         */
        function deleteFile(name)
        {
            if (!confirm("Delete \"" + name + "\"?"))
            {
                return;
            }

            delete files[name];
            persistState();
            console.log(LOG, "Deleted:", name);

            if (name === currentFile)
            {
                var remaining = Object.keys(files);

                if (remaining.length > 0)
                {
                    switchToFile(remaining[0]);
                }
                else
                {
                    switchToFile("Untitled Ribbon");
                }
            }
        }

        /**
         * Exports the current config as a downloadable JSON file.
         */
        function exportJSON()
        {
            if (!builder)
            {
                return;
            }

            var json = builder.exportJSON();
            var filename = sanitizeFilename(currentFile) + ".json";

            StudioStorage.downloadFile(json, filename, "application/json;charset=utf-8");
            console.log(LOG, "Exported JSON:", filename);
        }

        /**
         * Exports the current config as a downloadable Markdown file.
         */
        function exportMarkdown()
        {
            if (!builder)
            {
                return;
            }

            var md = builder.exportMarkdown();
            var filename = sanitizeFilename(currentFile) + ".md";

            StudioStorage.downloadFile(md, filename, "text/markdown;charset=utf-8");
            console.log(LOG, "Exported Markdown:", filename);
        }

        /**
         * Opens a file picker to import a JSON config.
         */
        function importJSON()
        {
            StudioStorage.pickFile(".json", function(content)
            {
                try
                {
                    var config = JSON.parse(content);

                    if (!config.tabs || !Array.isArray(config.tabs))
                    {
                        alert("Invalid ribbon config: missing \"tabs\" array.");
                        return;
                    }

                    var name = prompt("Name for imported ribbon:", "Imported Ribbon");

                    if (!name || !name.trim())
                    {
                        return;
                    }

                    name = name.trim();

                    files[name] = {
                        config: config,
                        modified: StudioStorage.now()
                    };

                    persistState();
                    switchToFile(name);
                    console.log(LOG, "Imported:", name);
                }
                catch (err)
                {
                    console.error(LOG, "Import failed:", err);
                    alert("Failed to parse JSON file.");
                }
            });
        }

        /**
         * Sanitizes a string for use as a filename.
         *
         * @param {string} name - Raw name.
         * @returns {string} Filesystem-safe name.
         */
        function sanitizeFilename(name)
        {
            return name.replace(/[^a-zA-Z0-9_\-\s]/g, "").replace(/\s+/g, "-").toLowerCase();
        }

        // ====================================================================
        // HEADER BUTTON WIRING
        // ====================================================================

        if (btnNew)  { btnNew.addEventListener("click",  function() { newFile(); }); }
        if (btnOpen) { btnOpen.addEventListener("click", function() { openFile(); }); }
        if (btnSave) { btnSave.addEventListener("click", function() { saveFile(); }); }

        // ====================================================================
        // OPEN FILE DIALOG
        // ====================================================================

        /**
         * Builds and shows the file picker overlay.
         *
         * @param {string[]} names - List of saved file names.
         */
        function showOpenDialog(names)
        {
            var selectedName = null;
            var overlay = buildDialogOverlay();
            var dialog = buildDialogFrame("Open File");
            var body = buildFileList(names);
            var footer = buildDialogFooter();

            dialog.appendChild(body);
            dialog.appendChild(footer);
            overlay.appendChild(dialog);
            document.body.appendChild(overlay);

            /**
             * Builds the dialog overlay backdrop.
             */
            function buildDialogOverlay()
            {
                var el = document.createElement("div");

                el.className = "studio-dialog-overlay";

                el.addEventListener("click", function(e)
                {
                    if (e.target === el)
                    {
                        closeDialog();
                    }
                });

                return el;
            }

            /**
             * Builds the dialog frame with header.
             *
             * @param {string} title - Dialog title.
             */
            function buildDialogFrame(title)
            {
                var el = document.createElement("div");

                el.className = "studio-dialog";

                var header = document.createElement("div");

                header.className = "studio-dialog-header";

                var titleEl = document.createElement("span");

                titleEl.textContent = title;
                header.appendChild(titleEl);

                var closeBtn = document.createElement("button");

                closeBtn.className = "studio-dialog-close";
                closeBtn.innerHTML = "&times;";

                closeBtn.addEventListener("click", function()
                {
                    closeDialog();
                });

                header.appendChild(closeBtn);
                el.appendChild(header);

                return el;
            }

            /**
             * Builds the file list body.
             *
             * @param {string[]} fileNames - File names to display.
             */
            function buildFileList(fileNames)
            {
                var bodyEl = document.createElement("div");

                bodyEl.className = "studio-dialog-body";

                if (fileNames.length === 0)
                {
                    var emptyEl = document.createElement("div");

                    emptyEl.className = "studio-empty";
                    emptyEl.innerHTML = "<i class=\"bi bi-folder2\"></i>No saved files";
                    bodyEl.appendChild(emptyEl);

                    return bodyEl;
                }

                var list = document.createElement("ul");

                list.className = "studio-file-list";

                for (var i = 0; i < fileNames.length; i++)
                {
                    var item = buildFileItem(fileNames[i], list);

                    list.appendChild(item);
                }

                bodyEl.appendChild(list);

                return bodyEl;
            }

            /**
             * Builds a single file list item.
             *
             * @param {string} name - File name.
             * @param {HTMLElement} listEl - Parent list for refresh.
             */
            function buildFileItem(name, listEl)
            {
                var li = document.createElement("li");

                li.className = "studio-file-item";

                if (name === currentFile)
                {
                    li.classList.add("selected");
                    selectedName = name;
                }

                var info = document.createElement("div");

                var nameEl = document.createElement("div");

                nameEl.className = "studio-file-name";
                nameEl.textContent = name;
                info.appendChild(nameEl);

                var meta = document.createElement("div");
                var entry = files[name];

                meta.className = "studio-file-meta";
                meta.textContent = entry ? StudioStorage.formatDate(entry.modified) : "";
                info.appendChild(meta);

                li.appendChild(info);

                var actions = document.createElement("div");

                actions.className = "studio-file-actions";

                var delBtn = document.createElement("button");

                delBtn.className = "studio-file-delete";
                delBtn.title = "Delete";
                delBtn.innerHTML = "<i class=\"bi bi-trash\"></i>";

                delBtn.addEventListener("click", function(e)
                {
                    e.stopPropagation();
                    handleDeleteInDialog(name, listEl);
                });

                actions.appendChild(delBtn);
                li.appendChild(actions);

                li.addEventListener("click", function()
                {
                    selectInDialog(name, listEl);
                });

                li.addEventListener("dblclick", function()
                {
                    openSelectedFile(name);
                });

                return li;
            }

            /**
             * Highlights a file item in the dialog list.
             *
             * @param {string} name - File name to select.
             * @param {HTMLElement} listEl - List container.
             */
            function selectInDialog(name, listEl)
            {
                selectedName = name;

                var items = listEl.querySelectorAll(".studio-file-item");

                for (var i = 0; i < items.length; i++)
                {
                    items[i].classList.remove("selected");
                }

                var target = findItemByName(listEl, name);

                if (target)
                {
                    target.classList.add("selected");
                }
            }

            /**
             * Finds a file list item by name.
             *
             * @param {HTMLElement} listEl - List container.
             * @param {string} name - File name.
             * @returns {HTMLElement|null}
             */
            function findItemByName(listEl, name)
            {
                var items = listEl.querySelectorAll(".studio-file-item");

                for (var i = 0; i < items.length; i++)
                {
                    var nameEl = items[i].querySelector(".studio-file-name");

                    if (nameEl && nameEl.textContent === name)
                    {
                        return items[i];
                    }
                }

                return null;
            }

            /**
             * Handles file deletion from within the dialog.
             *
             * @param {string} name - File to delete.
             * @param {HTMLElement} listEl - List to refresh.
             */
            function handleDeleteInDialog(name, listEl)
            {
                if (!confirm("Delete \"" + name + "\"?"))
                {
                    return;
                }

                delete files[name];
                persistState();

                var item = findItemByName(listEl, name);

                if (item)
                {
                    item.parentNode.removeChild(item);
                }

                if (selectedName === name)
                {
                    selectedName = null;
                }

                console.log(LOG, "Deleted from dialog:", name);
            }

            /**
             * Opens the selected file and closes the dialog.
             *
             * @param {string} name - File name to open.
             */
            function openSelectedFile(name)
            {
                switchToFile(name);
                closeDialog();
            }

            /**
             * Builds the dialog footer with Cancel and Open buttons.
             */
            function buildDialogFooter()
            {
                var footerEl = document.createElement("div");

                footerEl.className = "studio-dialog-footer";

                var cancelBtn = document.createElement("button");

                cancelBtn.className = "studio-btn";
                cancelBtn.textContent = "Cancel";

                cancelBtn.addEventListener("click", function()
                {
                    closeDialog();
                });

                footerEl.appendChild(cancelBtn);

                var openBtn = document.createElement("button");

                openBtn.className = "studio-btn primary";
                openBtn.textContent = "Open";

                openBtn.addEventListener("click", function()
                {
                    if (selectedName)
                    {
                        openSelectedFile(selectedName);
                    }
                });

                footerEl.appendChild(openBtn);

                return footerEl;
            }

            /**
             * Removes the dialog overlay from the DOM.
             */
            function closeDialog()
            {
                if (overlay && overlay.parentNode)
                {
                    overlay.parentNode.removeChild(overlay);
                }
            }
        }

        // ====================================================================

        var helpBarEl      = document.getElementById("rs-help-bar");
        var helpContentEl  = document.getElementById("rs-help-content");
        var helpTitleEl    = document.getElementById("rs-help-title");
        var helpToggleBtn  = document.getElementById("rs-help-toggle");
        var helpCloseBtn   = document.getElementById("rs-help-close");
        var helpVisible    = false;
        var helpObserver   = null;
        var helpDebounce   = null;
        var HELP_DEBOUNCE_MS = 150;

        /**
         * Toggles the help bar visibility.
         */
        function toggleHelp()
        {
            helpVisible = !helpVisible;

            if (helpBarEl)
            {
                helpBarEl.style.display = helpVisible ? "flex" : "none";
            }

            if (helpToggleBtn)
            {
                helpToggleBtn.classList.toggle("active", helpVisible);
            }

            if (helpVisible)
            {
                detectSelectedControl();
                startHelpObserver();
            }
            else
            {
                stopHelpObserver();
            }

            console.log(LOG, "Help panel", helpVisible ? "shown" : "hidden");
        }

        /**
         * Renders the full control reference into the help content area.
         */
        function renderFullReference()
        {
            if (!helpContentEl)
            {
                return;
            }

            helpContentEl.innerHTML = "";

            if (helpTitleEl)
            {
                helpTitleEl.innerHTML =
                    "<i class=\"bi bi-question-circle\"></i> Control Reference";
            }

            var frag = document.createDocumentFragment();

            frag.appendChild(buildRefSection("Built-in Controls", CONTROL_HELP));
            frag.appendChild(buildRefSection("Component Pickers", COMPONENT_HELP));

            helpContentEl.appendChild(frag);
        }

        /**
         * Builds a reference section with title and grid of items.
         *
         * @param {string} title - Section heading text.
         * @param {object} helpMap - Map of type keys to help objects.
         * @returns {DocumentFragment}
         */
        function buildRefSection(title, helpMap)
        {
            var frag = document.createDocumentFragment();

            var heading = document.createElement("div");

            heading.className = "rs-help-section-title";
            heading.textContent = title;
            frag.appendChild(heading);

            var grid = document.createElement("div");

            grid.className = "rs-help-ref-grid";

            var keys = Object.keys(helpMap);

            for (var i = 0; i < keys.length; i++)
            {
                var item = buildRefItem(keys[i], helpMap[keys[i]]);

                grid.appendChild(item);
            }

            frag.appendChild(grid);

            return frag;
        }

        /**
         * Builds a single reference grid item.
         *
         * @param {string} type - Control type key.
         * @param {object} info - Help object with desc and props.
         * @returns {HTMLElement}
         */
        function buildRefItem(type, info)
        {
            var el = document.createElement("div");

            el.className = "rs-help-ref-item";

            var strong = document.createElement("strong");

            strong.textContent = type;
            el.appendChild(strong);

            var p = document.createElement("p");

            p.textContent = info.desc;
            el.appendChild(p);

            return el;
        }

        /**
         * Renders context-sensitive help for a specific control type.
         *
         * @param {string} type - The control type key.
         * @param {string} kind - "control", "component", "tab", or "group".
         */
        function renderContextHelp(type, kind)
        {
            if (!helpContentEl)
            {
                return;
            }

            var info = null;

            if (kind === "component")
            {
                info = COMPONENT_HELP[type];
            }
            else if (kind === "control")
            {
                info = CONTROL_HELP[type];
            }

            helpContentEl.innerHTML = "";

            if (helpTitleEl)
            {
                helpTitleEl.innerHTML =
                    "<i class=\"bi bi-info-circle\"></i> " +
                    escapeHtml(formatTypeName(type, kind));
            }

            if (!info)
            {
                renderStructureHelp(kind);
                return;
            }

            var frag = document.createDocumentFragment();

            var descDiv = document.createElement("div");

            descDiv.className = "rs-help-context";

            var descP = document.createElement("div");

            descP.className = "rs-help-context-desc";
            descP.textContent = info.desc;
            descDiv.appendChild(descP);

            frag.appendChild(descDiv);

            var propKeys = Object.keys(info.props || {});

            if (propKeys.length > 0)
            {
                var propsTitle = document.createElement("div");

                propsTitle.className = "rs-help-props-title";
                propsTitle.textContent = "Properties";
                frag.appendChild(propsTitle);

                var dl = document.createElement("dl");

                dl.className = "rs-help-props";

                for (var i = 0; i < propKeys.length; i++)
                {
                    var dt = document.createElement("dt");

                    dt.textContent = propKeys[i];
                    dl.appendChild(dt);

                    var dd = document.createElement("dd");

                    dd.textContent = info.props[propKeys[i]];
                    dl.appendChild(dd);
                }

                frag.appendChild(dl);
            }

            helpContentEl.appendChild(frag);
        }

        /**
         * Renders help text for tab or group structural nodes.
         *
         * @param {string} kind - "tab" or "group".
         */
        function renderStructureHelp(kind)
        {
            if (!helpContentEl)
            {
                return;
            }

            var text = "";

            if (kind === "tab")
            {
                text = "Tabs are the top-level sections of a ribbon toolbar. " +
                    "Each tab has an ID, a label, an optional keyTip (shown when " +
                    "Alt is held), and contains one or more groups.";
            }
            else if (kind === "group")
            {
                text = "Groups organize controls within a tab. Each group has an " +
                    "ID, a label, and an optional collapsePriority (controls the " +
                    "order in which groups collapse when the ribbon shrinks). " +
                    "Add controls to a group using the toolbar buttons.";
            }
            else
            {
                text = "Select a tab, group, or control in the structure tree to " +
                    "see context-sensitive documentation here.";
            }

            var p = document.createElement("div");

            p.className = "rs-help-context-desc";
            p.textContent = text;
            helpContentEl.appendChild(p);
        }

        /**
         * Formats a control type key into a display name.
         *
         * @param {string} type - Control type key.
         * @param {string} kind - "control", "component", "tab", or "group".
         * @returns {string} Human-readable name.
         */
        function formatTypeName(type, kind)
        {
            if (kind === "tab")
            {
                return "Tab Properties";
            }

            if (kind === "group")
            {
                return "Group Properties";
            }

            return type.split("-").map(function(w)
            {
                return w.charAt(0).toUpperCase() + w.slice(1);
            }).join(" ");
        }

        /**
         * Escapes HTML special characters in a string.
         *
         * @param {string} str - Raw string.
         * @returns {string} HTML-safe string.
         */
        function escapeHtml(str)
        {
            var div = document.createElement("div");

            div.textContent = str;

            return div.innerHTML;
        }

        /**
         * Inspects the RibbonBuilder properties panel to detect what is selected.
         */
        function detectSelectedControl()
        {
            if (!helpVisible)
            {
                return;
            }

            var builderEl = document.getElementById("rs-builder");

            if (!builderEl)
            {
                renderFullReference();
                return;
            }

            var propsHeader = builderEl.querySelector(".ribbonbuilder-props-header");

            if (!propsHeader)
            {
                renderFullReference();
                return;
            }

            var headerText = (propsHeader.textContent || "").trim();

            if (headerText === "Tab Properties")
            {
                renderContextHelp("tab", "tab");
                return;
            }

            if (headerText === "Group Properties")
            {
                renderContextHelp("group", "group");
                return;
            }

            if (headerText === "Control Properties")
            {
                var detectedType = detectControlType(builderEl);

                if (detectedType)
                {
                    showControlTypeHelp(detectedType);
                    return;
                }
            }

            renderFullReference();
        }

        /**
         * Extracts the control type from the properties panel readonly field.
         *
         * @param {HTMLElement} builderEl - The RibbonBuilder root element.
         * @returns {string|null} The control type string, or null.
         */
        function detectControlType(builderEl)
        {
            var fields = builderEl.querySelectorAll(".ribbonbuilder-props-field");

            for (var i = 0; i < fields.length; i++)
            {
                var labelEl = fields[i].querySelector(".ribbonbuilder-props-label");
                var valueEl = fields[i].querySelector(
                    ".ribbonbuilder-props-readonly"
                );

                if (!labelEl || !valueEl)
                {
                    continue;
                }

                var labelText = (labelEl.textContent || "").trim();

                if (labelText === "Type")
                {
                    return (valueEl.textContent || "").trim();
                }
            }

            return null;
        }

        /**
         * Shows help for a control type, detecting component sub-type if needed.
         *
         * @param {string} type - The control type from the properties panel.
         */
        function showControlTypeHelp(type)
        {
            if (type === "component")
            {
                var compType = detectComponentType();

                if (compType && COMPONENT_HELP[compType])
                {
                    renderContextHelp(compType, "component");
                    return;
                }
            }

            if (CONTROL_HELP[type])
            {
                renderContextHelp(type, "control");
            }
            else
            {
                renderFullReference();
            }
        }

        /**
         * Detects the component sub-type from the properties panel Component field.
         *
         * @returns {string|null} Component type string, or null.
         */
        function detectComponentType()
        {
            var builderEl = document.getElementById("rs-builder");

            if (!builderEl)
            {
                return null;
            }

            var fields = builderEl.querySelectorAll(".ribbonbuilder-props-field");

            for (var i = 0; i < fields.length; i++)
            {
                var labelEl = fields[i].querySelector(".ribbonbuilder-props-label");
                var valueEl = fields[i].querySelector(
                    ".ribbonbuilder-props-readonly"
                );

                if (!labelEl || !valueEl)
                {
                    continue;
                }

                var labelText = (labelEl.textContent || "").trim();

                if (labelText === "Component")
                {
                    return (valueEl.textContent || "").trim();
                }
            }

            return null;
        }

        /**
         * Starts a MutationObserver on the properties panel to detect selection changes.
         */
        function startHelpObserver()
        {
            stopHelpObserver();

            var builderEl = document.getElementById("rs-builder");

            if (!builderEl)
            {
                return;
            }

            helpObserver = new MutationObserver(function()
            {
                if (helpDebounce)
                {
                    clearTimeout(helpDebounce);
                }

                helpDebounce = setTimeout(function()
                {
                    detectSelectedControl();
                    helpDebounce = null;
                }, HELP_DEBOUNCE_MS);
            });

            helpObserver.observe(builderEl, {
                childList: true,
                subtree: true,
                characterData: true
            });
        }

        /**
         * Stops the MutationObserver for the help system.
         */
        function stopHelpObserver()
        {
            if (helpObserver)
            {
                helpObserver.disconnect();
                helpObserver = null;
            }
        }

        // Wire help toggle button and close button
        if (helpToggleBtn)
        {
            helpToggleBtn.addEventListener("click", function()
            {
                toggleHelp();
            });
        }

        if (helpCloseBtn)
        {
            helpCloseBtn.addEventListener("click", function()
            {
                if (helpVisible)
                {
                    toggleHelp();
                }
            });
        }

        // ====================================================================
        // KEYBOARD SHORTCUTS
        // ====================================================================

        /**
         * Handles keyboard shortcuts for file operations.
         *
         * @param {KeyboardEvent} e - The keyboard event.
         */
        function handleKeyboard(e)
        {
            // F1 toggles help bar
            if (e.key === "F1")
            {
                e.preventDefault();
                toggleHelp();
                return;
            }

            var isCtrl = e.ctrlKey || e.metaKey;

            if (!isCtrl)
            {
                return;
            }

            switch (e.key.toLowerCase())
            {
                case "s":
                    e.preventDefault();
                    if (e.shiftKey)
                    {
                        exportJSON();
                    }
                    else
                    {
                        saveFile();
                    }
                    break;

                case "n":
                    e.preventDefault();
                    newFile();
                    break;

                case "o":
                    e.preventDefault();
                    openFile();
                    break;
            }
        }

        // ====================================================================
        // INITIALIZATION
        // ====================================================================

        /**
         * Bootstraps the Ribbon Studio application.
         */
        function init()
        {
            console.log(LOG, "Initializing...");

            var entry = files[currentFile];
            var config = entry ? entry.config : createDefaultConfig();

            if (!entry)
            {
                files[currentFile] = {
                    config: config,
                    modified: StudioStorage.now()
                };
                persistState();
            }

            updateFilenameDisplay();
            initBuilder(config);
            document.addEventListener("keydown", handleKeyboard);

            console.log(LOG, "Ready. File:", currentFile,
                "| Saved files:", Object.keys(files).length);
        }

        // ====================================================================
        // BOOT
        // ====================================================================

        if (document.readyState === "loading")
        {
            document.addEventListener("DOMContentLoaded", init);
        }
        else
        {
            init();
        }
    })();
    </script>
