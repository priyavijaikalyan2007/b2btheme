<!--
  COMPONENT: DemoPage-Stepper
  PURPOSE: Standalone demo page for the Stepper component.
  RELATES: [[Stepper]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stepper - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/stepper/stepper.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            Stepper
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="stepper-section">
            <h2>Multi-Stage Stepper (Wizard)</h2>
            <p class="text-muted">Step progression UI with validation gates, completion tracking, and linear/non-linear navigation.</p>

            <h3 class="h5">Linear Stepper</h3>
            <div id="demo-stepper-linear" class="mb-4"></div>

            <h3 class="h5">Non-Linear Stepper (vertical)</h3>
            <div id="demo-stepper-nonlinear" class="mb-3"></div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/stepper/stepper.js"></script>

    <script>

    // ====================================================================
    // Multi-Stage Stepper Demos
    // ====================================================================

    (function()
    {
        // Helper: create simple content panels
        function makeContent(text)
        {
            var el = document.createElement("div");
            el.style.padding = "16px";
            el.style.background = "#f8f9fa";
            el.style.border = "1px solid #dee2e6";
            el.textContent = text;
            return el;
        }

        // 1. Linear stepper
        createStepper({
            container: document.getElementById("demo-stepper-linear"),
            steps: [
                { label: "Account", description: "Create your account", content: makeContent("Enter your email and password to create an account.") },
                {
                    label: "Profile", description: "Set up your profile",
                    content: makeContent("Add your name, avatar, and bio."),
                    validate: function() { return true; }
                },
                { label: "Preferences", description: "Configure settings", content: makeContent("Choose your notification and theme preferences."), optional: true },
                { label: "Confirm", description: "Review and submit", content: makeContent("Review all information and confirm.") }
            ],
            showProgress: true,
            onStepChange: function(from, to) { console.log("Step:", from, "->", to); },
            onFinish: function() { console.log("Stepper: Finished!"); }
        });

        // 2. Non-linear vertical stepper
        createStepper({
            container: document.getElementById("demo-stepper-nonlinear"),
            orientation: "vertical",
            nonLinear: true,
            showSaveAsDraft: true,
            steps: [
                { label: "Basic Info", icon: "bi-person", content: makeContent("Company name, domain, industry.") },
                { label: "Team Members", icon: "bi-people", content: makeContent("Invite team members by email.") },
                { label: "Integrations", icon: "bi-plug", content: makeContent("Connect Slack, GitHub, Jira."), optional: true },
                { label: "Billing", icon: "bi-credit-card", content: makeContent("Add payment method.") }
            ],
            finishLabel: "Complete Setup",
            onFinish: function() { console.log("Setup complete!"); },
            onSaveAsDraft: function() { console.log("Saved as draft"); }
        });
    })();

    </script>
</body>
</html>
