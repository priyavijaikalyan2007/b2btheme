<!--
  COMPONENT: DemoPage-ConfirmDialog
  PURPOSE: Standalone demo page for the ConfirmDialog component.
  RELATES: [[ConfirmDialog]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConfirmDialog - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/confirmdialog/confirmdialog.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            ConfirmDialog
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="confirmdialog-section">
            <h2><i class="bi bi-question-circle"></i> ConfirmDialog</h2>
            <p class="text-muted">Promise-based confirmation modal with customisable title, message, variant, and buttons. Traps focus and supports Escape/Enter.</p>

            <div class="row g-3">
                <div class="col-auto">
                    <button class="btn btn-primary btn-sm" id="cd-demo-default">Default Confirm</button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-danger btn-sm" id="cd-demo-danger">Danger (Delete)</button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-warning btn-sm" id="cd-demo-warning">Warning</button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-info btn-sm" id="cd-demo-info">Info</button>
                </div>
            </div>
            <pre class="mt-3 p-2 demo-output" id="cd-demo-output" style="font-size: 12px; min-height: 32px;">Click a button above to open a confirm dialog.</pre>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/confirmdialog/confirmdialog.js"></script>

    <script>

    // ====================================================================
    // ConfirmDialog Demos
    // ====================================================================
    (function() {
        var output = document.getElementById("cd-demo-output");

        document.getElementById("cd-demo-default").addEventListener("click", function() {
            showConfirmDialog({
                message: "Do you want to save your changes before closing?",
                title: "Save Changes"
            }).then(function(result) {
                output.textContent = "Default dialog result: " + (result ? "Confirmed" : "Cancelled");
            });
        });

        document.getElementById("cd-demo-danger").addEventListener("click", function() {
            showDangerConfirmDialog(
                "This will permanently delete the project and all its data. This action cannot be undone.",
                "Delete Project"
            ).then(function(result) {
                output.textContent = "Danger dialog result: " + (result ? "Confirmed (deleted)" : "Cancelled");
            });
        });

        document.getElementById("cd-demo-warning").addEventListener("click", function() {
            showConfirmDialog({
                message: "You have unsaved changes. Navigating away will discard them.",
                title: "Unsaved Changes",
                variant: "warning",
                icon: "bi-exclamation-triangle",
                confirmLabel: "Discard",
                cancelLabel: "Stay"
            }).then(function(result) {
                output.textContent = "Warning dialog result: " + (result ? "Discarded" : "Stayed");
            });
        });

        document.getElementById("cd-demo-info").addEventListener("click", function() {
            showConfirmDialog({
                message: "A new version of the application is available. Refresh to update?",
                title: "Update Available",
                variant: "info",
                icon: "bi-info-circle",
                confirmLabel: "Refresh Now",
                cancelLabel: "Later"
            }).then(function(result) {
                output.textContent = "Info dialog result: " + (result ? "Refreshing" : "Postponed");
            });
        });
    })();

    </script>
</body>
</html>
