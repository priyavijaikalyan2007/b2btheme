<!--
  COMPONENT: DemoPage-DurationPicker
  PURPOSE: Standalone demo page for the DurationPicker component.
  RELATES: [[DurationPicker]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DurationPicker - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/durationpicker/durationpicker.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            DurationPicker
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="durationpicker-section">
            <h2>Duration Picker</h2>
            <p>A configurable duration/interval picker supporting various unit patterns and ISO 8601 input/output.</p>

            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label">Hours-Minutes (default)</label>
                    <div id="demo-duration-hm"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Days-Hours-Minutes</label>
                    <div id="demo-duration-dhm"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Hours-Minutes-Seconds</label>
                    <div id="demo-duration-hms"></div>
                </div>
            </div>

            <div class="row g-4 mt-2">
                <div class="col-md-3">
                    <label class="form-label">Weeks</label>
                    <div id="demo-duration-weeks"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Months</label>
                    <div id="demo-duration-months"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Years-Months</label>
                    <div id="demo-duration-ymo"></div>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Carry Mode (h-m-s)</label>
                    <div id="demo-duration-carry"></div>
                    <small class="text-muted mt-1 d-block">Overflow carries to the next unit.</small>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/durationpicker/durationpicker.js"></script>

    <script>
    // ====================================================================
    // Duration Picker Demos
    // ====================================================================

    createDurationPicker("demo-duration-hm", {
        pattern: "h-m",
        onChange: function(v) { console.log("[Duration h-m]", v); }
    });

    createDurationPicker("demo-duration-dhm", {
        pattern: "d-h-m",
        onChange: function(v) { console.log("[Duration d-h-m]", v); }
    });

    createDurationPicker("demo-duration-hms", {
        pattern: "h-m-s",
        onChange: function(v) { console.log("[Duration h-m-s]", v); }
    });

    createDurationPicker("demo-duration-weeks", {
        pattern: "w",
        onChange: function(v) { console.log("[Duration w]", v); }
    });

    createDurationPicker("demo-duration-months", {
        pattern: "mo",
        onChange: function(v) { console.log("[Duration mo]", v); }
    });

    createDurationPicker("demo-duration-ymo", {
        pattern: "y-mo",
        onChange: function(v) { console.log("[Duration y-mo]", v); }
    });

    createDurationPicker("demo-duration-carry", {
        pattern: "h-m-s",
        carry: true,
        onChange: function(v) { console.log("[Duration carry]", v); }
    });

    </script>
</body>
</html>
