<!--
  COMPONENT: DemoPage-GraphCanvas
  PURPOSE: Standalone demo page for the GraphCanvas component.
  RELATES: [[GraphCanvas]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GraphCanvas - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/graphcanvas/graphcanvas.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            GraphCanvas
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="graphcanvas-section">
            <h2>GraphCanvas</h2>
            <p>Interactive SVG graph visualization with zoom/pan, layout algorithms, selection, and keyboard shortcuts.</p>

            <div class="mb-2">
                <button type="button" class="btn btn-sm btn-outline-secondary" id="demo-gc-force">Force</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" id="demo-gc-hierarchical">Hierarchical</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" id="demo-gc-radial">Radial</button>
                <button type="button" class="btn btn-sm btn-outline-secondary" id="demo-gc-group">Group by NS</button>
                <button type="button" class="btn btn-sm btn-outline-primary" id="demo-gc-fit">Zoom to Fit</button>
            </div>
            <div id="demo-graphcanvas" style="width:100%;height:500px;"></div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/graphcanvas/graphcanvas.js"></script>

    <script>

    // ====================================================================
    // GraphCanvas Demo (Custom SVG)
    // ====================================================================

    var gcContainer = document.getElementById("demo-graphcanvas");
    if (gcContainer) {
        var gc = createGraphCanvas({
            container: gcContainer,
            mode: "schema",
            layout: "force",
            nodes: sharedGcNodes,
            edges: sharedGcEdges,
            showEdgeLabels: true,
            showNodeIcons: false,
            onNodeClick: function(n) { console.log("[GraphCanvas] node click:", n.label); },
            onEdgeClick: function(e) { console.log("[GraphCanvas] edge click:", e.label); },
            onSelectionChange: function(nodes, edges) {
                console.log("[GraphCanvas] selection:", nodes.length, "nodes,", edges.length, "edges");
            }
        });

        document.getElementById("demo-gc-force").addEventListener("click", function() { gc.setLayout("force"); });
        document.getElementById("demo-gc-hierarchical").addEventListener("click", function() { gc.setLayout("hierarchical"); });
        document.getElementById("demo-gc-radial").addEventListener("click", function() { gc.setLayout("radial"); });
        document.getElementById("demo-gc-group").addEventListener("click", function() { gc.setLayout("group-by-namespace"); });
        document.getElementById("demo-gc-fit").addEventListener("click", function() { gc.zoomToFit(); });
    }

    </script>
</body>
</html>
