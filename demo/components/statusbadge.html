<!--
  COMPONENT: DemoPage-StatusBadge
  PURPOSE: Standalone demo page for the StatusBadge component.
  RELATES: [[StatusBadge]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatusBadge - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/statusbadge/statusbadge.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            StatusBadge
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="statusbadge-section">
            <h2><i class="bi bi-circle-fill"></i> StatusBadge</h2>
            <p class="text-muted">Colour-coded status indicators with dot, pill, and indicator variants. Animated pulse for live states.</p>

            <div class="row g-4">
                <div class="col-12">
                    <h3 class="h5">Dot Variant</h3>
                    <div class="d-flex flex-wrap gap-3 align-items-center" id="sb-demo-dots"></div>
                </div>
                <div class="col-12">
                    <h3 class="h5">Pill Variant</h3>
                    <div class="d-flex flex-wrap gap-3 align-items-center" id="sb-demo-pills"></div>
                </div>
                <div class="col-12">
                    <h3 class="h5">Indicator Variant (default)</h3>
                    <div class="d-flex flex-wrap gap-3 align-items-center" id="sb-demo-indicators"></div>
                </div>
                <div class="col-12">
                    <h3 class="h5">Size Variants</h3>
                    <div class="d-flex flex-wrap gap-3 align-items-center" id="sb-demo-sizes"></div>
                </div>
                <div class="col-12">
                    <h3 class="h5">Clickable Badge</h3>
                    <div id="sb-demo-clickable"></div>
                    <pre class="mt-2 p-2 demo-output" id="sb-demo-output" style="font-size: 12px; min-height: 32px;"></pre>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/statusbadge/statusbadge.js"></script>

    <script>

    // ====================================================================
    // StatusBadge Demos
    // ====================================================================
    (function() {
        var statuses = [
            "operational", "degraded", "down", "in-progress",
            "failed", "maintenance", "unknown"
        ];

        // Dot variant — one per status
        statuses.forEach(function(s) {
            var id = "sb-dot-" + s;
            var span = document.createElement("span");
            span.id = id;
            document.getElementById("sb-demo-dots").appendChild(span);
            createStatusBadge(id, { status: s, variant: "dot" });
        });

        // Pill variant
        statuses.forEach(function(s) {
            var id = "sb-pill-" + s;
            var span = document.createElement("span");
            span.id = id;
            document.getElementById("sb-demo-pills").appendChild(span);
            createStatusBadge(id, { status: s, variant: "pill" });
        });

        // Indicator variant (default)
        statuses.forEach(function(s) {
            var id = "sb-ind-" + s;
            var span = document.createElement("span");
            span.id = id;
            document.getElementById("sb-demo-indicators").appendChild(span);
            createStatusBadge(id, { status: s, variant: "indicator" });
        });

        // Size variants
        ["xs", "sm", "md", "lg"].forEach(function(sz) {
            var id = "sb-size-" + sz;
            var span = document.createElement("span");
            span.id = id;
            document.getElementById("sb-demo-sizes").appendChild(span);
            createStatusBadge(id, { status: "operational", size: sz, label: sz.toUpperCase() });
        });

        // Clickable
        var clickSpan = document.createElement("span");
        clickSpan.id = "sb-click-demo";
        document.getElementById("sb-demo-clickable").appendChild(clickSpan);
        createStatusBadge("sb-click-demo", {
            status: "operational",
            clickable: true,
            onClick: function(st) {
                document.getElementById("sb-demo-output").textContent =
                    "Clicked badge with status: " + st;
            }
        });
    })();

    </script>
</body>
</html>
