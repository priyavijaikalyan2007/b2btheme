<!--
  COMPONENT: DemoPage-Ruler
  PURPOSE: Standalone demo page for the Ruler component.
  RELATES: [[Ruler]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruler - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/ruler/ruler.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            Ruler
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="ruler-section">
            <h2><i class="bi bi-rulers"></i> Ruler</h2>
            <p class="text-muted mb-3">Calibrated ruler component with cursor tracking, multiple units, and canvas rendering.</p>

            <div class="row g-4">
                <div class="col-md-8">
                    <h3 class="h5">Horizontal (px)</h3>
                    <p class="text-muted small">Pixel ruler with cursor tracking. Move mouse over the ruler.</p>
                    <div id="ruler-demo-horizontal" style="width: 100%;"></div>
                </div>
                <div class="col-md-4">
                    <h3 class="h5">Vertical (cm)</h3>
                    <p class="text-muted small">Centimeter ruler, vertical orientation.</p>
                    <div id="ruler-demo-vertical" style="height: 300px;"></div>
                </div>
            </div>
            <pre class="mt-3 p-2 demo-output" id="ruler-demo-output" style="font-size: 12px; min-height: 32px;"></pre>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/ruler/ruler.js"></script>

    <script>

    // ── Ruler Demos ──
    (function()
    {
        var outputEl = document.getElementById("ruler-demo-output");
        function logEvent(msg) { if (outputEl) { outputEl.textContent = msg; } }

        // Horizontal px ruler
        createRuler("ruler-demo-horizontal", {
            orientation: "horizontal",
            unit: "px",
            showCursor: true
        });

        // Vertical cm ruler
        createRuler("ruler-demo-vertical", {
            orientation: "vertical",
            unit: "cm",
            showCursor: true
        });

        logEvent("Move mouse over rulers to see cursor tracking.");
    })();

    </script>
</body>
</html>
