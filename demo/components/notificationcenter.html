<!--
  COMPONENT: DemoPage-NotificationCenter
  PURPOSE: Standalone demo page for the NotificationCenter component.
  RELATES: [[NotificationCenter]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotificationCenter - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/notificationcenter/notificationcenter.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            NotificationCenter
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="notificationcenter-section">
            <h2>Notification Center</h2>
            <p class="text-muted">In-app notification bell with slide-out panel, category filters, read/unread state, and dismiss.</p>

            <h3 class="h5">Bell Trigger</h3>
            <div id="demo-notificationcenter-bell" class="mb-3" style="display:inline-block;"></div>
            <div class="mb-3">
                <button class="btn btn-sm btn-outline-primary" id="demo-nc-add">Add Notification</button>
                <button class="btn btn-sm btn-outline-secondary" id="demo-nc-markall">Mark All Read</button>
                <small class="text-muted ms-2">Output: </small><code id="demo-nc-output">—</code>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/notificationcenter/notificationcenter.js"></script>

    <script>

    // ====================================================================
    // Notification Center Demo
    // ====================================================================

    (function()
    {
        var outputEl = document.getElementById("demo-nc-output");
        var now = new Date();

        var nc = createNotificationCenter({
            container: document.getElementById("demo-notificationcenter-bell"),
            notifications: [
                {
                    id: "n1", title: "Alice mentioned you",
                    message: "Check the updated design for the dashboard component.",
                    category: "mentions", icon: "bi-at",
                    timestamp: new Date(now.getTime() - 300000)
                },
                {
                    id: "n2", title: "Build #347 succeeded",
                    message: "All 142 tests passed.", category: "alerts",
                    icon: "bi-check-circle", timestamp: new Date(now.getTime() - 3600000),
                    read: true
                },
                {
                    id: "n3", title: "Task assigned: Fix login bug",
                    category: "tasks", icon: "bi-clipboard-check",
                    timestamp: new Date(now.getTime() - 86400000)
                }
            ],
            categories: [
                { id: "mentions", label: "Mentions", icon: "bi-at" },
                { id: "alerts", label: "Alerts", icon: "bi-exclamation-triangle" },
                { id: "tasks", label: "Tasks", icon: "bi-clipboard-check" }
            ],
            onNotificationClick: function(n)
            {
                outputEl.textContent = "Clicked: " + n.title;
            },
            onDismiss: function(id)
            {
                outputEl.textContent = "Dismissed: " + id;
            }
        });

        var addCounter = 4;
        document.getElementById("demo-nc-add").addEventListener("click", function()
        {
            nc.addNotification({
                id: "n" + addCounter,
                title: "New notification #" + addCounter,
                message: "This was just added dynamically.",
                icon: "bi-bell-fill",
                timestamp: new Date()
            });
            addCounter++;
        });

        document.getElementById("demo-nc-markall").addEventListener("click", function()
        {
            nc.markAllRead();
            outputEl.textContent = "All marked read";
        });
    })();

    </script>
</body>
</html>
