    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <script>

                                /* Row 1: alignment */

                                { type: "button", id: "align-left", icon: "bi bi-text-left", size: "mini", tooltip: "Align Left", toggle: true, active: true, keyTip: "AL", onClick: function() { logEvent("Align Left"); } },
                                { type: "button", id: "align-center", icon: "bi bi-text-center", size: "mini", tooltip: "Center", toggle: true, keyTip: "AC", onClick: function() { logEvent("Center"); } },
                                { type: "button", id: "align-right", icon: "bi bi-text-right", size: "mini", tooltip: "Align Right", toggle: true, keyTip: "AR", onClick: function() { logEvent("Align Right"); } },
                                { type: "button", id: "justify", icon: "bi bi-justify", size: "mini", tooltip: "Justify", toggle: true },
                                { type: "row-break", id: "para-break-1" },
                                /* Row 2: lists + indent */
                                { type: "button", id: "bullets", icon: "bi bi-list-ul", size: "mini", tooltip: "Bullets", toggle: true },
                                { type: "button", id: "numbering", icon: "bi bi-list-ol", size: "mini", tooltip: "Numbering", toggle: true },
                                { type: "button", id: "indent-dec", icon: "bi bi-text-indent-left", size: "mini", tooltip: "Decrease Indent", onClick: function() { logEvent("Decrease Indent"); } },
                                { type: "button", id: "indent-inc", icon: "bi bi-text-indent-right", size: "mini", tooltip: "Increase Indent", onClick: function() { logEvent("Increase Indent"); } },
                                { type: "row-break", id: "para-break-2" },
                                /* Row 3: spacing */
                                { type: "number", id: "line-spacing", label: "Spacing", value: 1.15, min: 0.5, max: 3, step: 0.05, width: "55px", onChange: function(v) { logEvent("Line spacing: " + v); } }
                            ]
                        },
                        {
                            id: "styles",
                            label: "Styles",
                            collapsePriority: 60,
                            controls: [
                                {
                                    type: "gallery", id: "quick-styles",
                                    options: [
                                        { id: "normal", label: "Normal", preview: "<span style='font-size:12px'>Normal</span>" },
                                        { id: "heading1", label: "Heading 1", preview: "<span style='font-size:18px;font-weight:700'>Heading 1</span>" },
                                        { id: "heading2", label: "Heading 2", preview: "<span style='font-size:16px;font-weight:600'>Heading 2</span>" },
                                        { id: "heading3", label: "Heading 3", preview: "<span style='font-size:14px;font-weight:600'>Heading 3</span>" },
                                        { id: "subtitle", label: "Subtitle", preview: "<span style='font-size:13px;color:#666'>Subtitle</span>" },
                                        { id: "quote", label: "Quote", preview: "<span style='font-style:italic;color:#555'>Quote</span>" }
                                    ],
                                    selectedId: "normal",
                                    inlineCount: 3,
                                    columns: 3,
                                    layout: "grid",
                                    onSelect: function(opt) { logEvent("Style: " + opt.label); }
                                }
                            ]
                        }
                    ]
                },
                {
                    id: "insert",
                    label: "Insert",
                    keyTip: "N",
                    groups: [
                        {
                            id: "tables",
                            label: "Tables",
                            controls: [
                                { type: "button", id: "insert-table", label: "Table", icon: "bi bi-table", size: "large", keyTip: "T", onClick: function() { logEvent("Insert Table"); } }
                            ]
                        },
                        {
                            id: "illustrations",
                            label: "Illustrations",
                            controls: [
                                { type: "button", id: "insert-image", label: "Image", icon: "bi bi-image", size: "large", onClick: function() { logEvent("Insert Image"); } },
                                { type: "button", id: "insert-shapes", label: "Shapes", icon: "bi bi-pentagon", size: "small", onClick: function() { logEvent("Insert Shapes"); } },
                                { type: "button", id: "insert-icons", label: "Icons", icon: "bi bi-emoji-smile", size: "small", onClick: function() { logEvent("Insert Icons"); } },
                                { type: "button", id: "insert-chart", label: "Chart", icon: "bi bi-bar-chart", size: "small", onClick: function() { logEvent("Insert Chart"); } }
                            ]
                        },
                        {
                            id: "links",
                            label: "Links",
                            controls: [
                                { type: "button", id: "insert-link", label: "Link", icon: "bi bi-link-45deg", size: "large", keyTip: "K", onClick: function() { logEvent("Insert Link"); } },
                                { type: "button", id: "insert-bookmark", label: "Bookmark", icon: "bi bi-bookmark", size: "small", onClick: function() { logEvent("Insert Bookmark"); } },
                                { type: "button", id: "insert-comment", label: "Comment", icon: "bi bi-chat-square-text", size: "small", onClick: function() { logEvent("Insert Comment"); } }
                            ]
                        },
                        {
                            id: "media",
                            label: "Media",
                            controls: [
                                { type: "button", id: "insert-video", label: "Video", icon: "bi bi-camera-video", size: "small", onClick: function() { logEvent("Insert Video"); } },
                                { type: "button", id: "insert-audio", label: "Audio", icon: "bi bi-music-note-beamed", size: "small", onClick: function() { logEvent("Insert Audio"); } },
                                { type: "button", id: "insert-code", label: "Code Block", icon: "bi bi-code-slash", size: "small", onClick: function() { logEvent("Insert Code Block"); } }
                            ]
                        }
                    ]
                },
                {
                    id: "view",
                    label: "View",
                    keyTip: "W",
                    groups: [
                        {
                            id: "views",
                            label: "Views",
                            controls: [
                                { type: "button", id: "view-normal", label: "Normal", icon: "bi bi-file-earmark-text", size: "large", toggle: true, active: true, onClick: function() { logEvent("Normal view"); } },
                                { type: "button", id: "view-outline", label: "Outline", icon: "bi bi-list-nested", size: "small", toggle: true, onClick: function() { logEvent("Outline view"); } },
                                { type: "button", id: "view-preview", label: "Preview", icon: "bi bi-eye", size: "small", toggle: true, onClick: function() { logEvent("Preview"); } }
                            ]
                        },
                        {
                            id: "show",
                            label: "Show",
                            controls: [
                                { type: "checkbox", id: "show-ruler", label: "Ruler", checked: true, onChange: function(c) { logEvent("Ruler: " + c); } },
                                { type: "checkbox", id: "show-gridlines", label: "Gridlines", onChange: function(c) { logEvent("Gridlines: " + c); } },
                                { type: "checkbox", id: "show-nav", label: "Navigation Pane", onChange: function(c) { logEvent("Nav Pane: " + c); } }
                            ]
                        },
                        {
                            id: "zoom",
                            label: "Zoom",
                            controls: [
                                { type: "number", id: "zoom-level", label: "Zoom", value: 100, min: 25, max: 400, step: 25, suffix: "%", width: "60px", onChange: function(v) { logEvent("Zoom: " + v + "%"); } },
                                { type: "toggle", id: "dark-mode", label: "Dark Mode", onChange: function(c) { logEvent("Dark mode: " + c); } }
                            ]
                        }
                    ]
                },
                {
                    id: "table-design",
                    label: "Table Design",
                    contextual: true,
                    accentColor: "#e06030",
                    keyTip: "JT",
                    groups: [
                        {
                            id: "table-styles",
                            label: "Table Styles",
                            controls: [
                                {
                                    type: "gallery", id: "table-style-gallery",
                                    options: [
                                        { id: "ts-plain", label: "Plain", color: "#f8f9fa" },
                                        { id: "ts-blue", label: "Blue Header", color: "#0d6efd" },
                                        { id: "ts-green", label: "Green Header", color: "#198754" },
                                        { id: "ts-dark", label: "Dark", color: "#343a40" },
                                        { id: "ts-striped", label: "Striped", color: "#e9ecef" },
                                        { id: "ts-bordered", label: "Bordered", color: "#dee2e6" }
                                    ],
                                    selectedId: "ts-plain",
                                    inlineCount: 4,
                                    columns: 3,
                                    onSelect: function(opt) { logEvent("Table style: " + opt.label); }
                                }
                            ]
                        },
                        {
                            id: "table-options",
                            label: "Options",
                            controls: [
                                { type: "checkbox", id: "header-row", label: "Header Row", checked: true },
                                { type: "checkbox", id: "banded-rows", label: "Banded Rows", checked: true },
                                { type: "checkbox", id: "first-column", label: "First Column" },
                                { type: "checkbox", id: "total-row", label: "Total Row" }
                            ]
                        }
                    ]
                }
            ],
            menuBar: [
                {
                    id: "menu-file", label: "File", keyTip: "AF",
                    items: [
                        { id: "mf-new", label: "New", icon: "bi bi-file-earmark-plus", shortcut: "Ctrl+N", onClick: function() { logEvent("Menu: New"); } },
                        { id: "mf-open", label: "Open", icon: "bi bi-folder2-open", shortcut: "Ctrl+O", onClick: function() { logEvent("Menu: Open"); } },
                        { id: "mf-save", label: "Save", icon: "bi bi-floppy", shortcut: "Ctrl+S", onClick: function() { logEvent("Menu: Save"); } },
                        { id: "mf-sep1", label: "", type: "separator" },
                        { id: "mf-saveas", label: "Save As", icon: "bi bi-floppy2", children: [
                            { id: "mf-sa-docx", label: "Word Document (.docx)", onClick: function() { logEvent("Save As DOCX"); } },
                            { id: "mf-sa-pdf", label: "PDF (.pdf)", onClick: function() { logEvent("Save As PDF"); } },
                            { id: "mf-sa-html", label: "Web Page (.html)", onClick: function() { logEvent("Save As HTML"); } }
                        ]},
                        { id: "mf-sep2", label: "", type: "separator" },
                        { id: "mf-print", label: "Print", icon: "bi bi-printer", shortcut: "Ctrl+P", onClick: function() { logEvent("Menu: Print"); } },
                        { id: "mf-close", label: "Close", onClick: function() { logEvent("Menu: Close"); } }
                    ]
                },
                {
                    id: "menu-edit", label: "Edit", keyTip: "AE",
                    items: [
                        { id: "me-undo", label: "Undo", icon: "bi bi-arrow-counterclockwise", shortcut: "Ctrl+Z", onClick: function() { logEvent("Menu: Undo"); } },
                        { id: "me-redo", label: "Redo", icon: "bi bi-arrow-clockwise", shortcut: "Ctrl+Y", onClick: function() { logEvent("Menu: Redo"); } },
                        { id: "me-sep1", label: "", type: "separator" },
                        { id: "me-find", label: "Find", icon: "bi bi-search", shortcut: "Ctrl+F", onClick: function() { logEvent("Menu: Find"); } },
                        { id: "me-replace", label: "Replace", icon: "bi bi-arrow-left-right", shortcut: "Ctrl+H", onClick: function() { logEvent("Menu: Replace"); } }
                    ]
                },
                {
                    id: "menu-view", label: "View", keyTip: "AV",
                    items: [
                        { id: "mv-zoom-header", label: "Zoom", type: "header" },
                        { id: "mv-zoom-in", label: "Zoom In", icon: "bi bi-zoom-in", shortcut: "Ctrl++", onClick: function() { logEvent("Menu: Zoom In"); } },
                        { id: "mv-zoom-out", label: "Zoom Out", icon: "bi bi-zoom-out", shortcut: "Ctrl+-", onClick: function() { logEvent("Menu: Zoom Out"); } },
                        { id: "mv-sep1", label: "", type: "separator" },
                        { id: "mv-fullscreen", label: "Full Screen", icon: "bi bi-arrows-fullscreen", shortcut: "F11", onClick: function() { logEvent("Menu: Full Screen"); } }
                    ]
                }
            ],
            qat: [
                { id: "qat-save", icon: "bi bi-floppy", tooltip: "Save (Ctrl+S)", keyTip: "1", onClick: function() { logEvent("QAT: Save"); } },
                { id: "qat-undo", icon: "bi bi-arrow-counterclockwise", tooltip: "Undo (Ctrl+Z)", keyTip: "2", onClick: function() { logEvent("QAT: Undo"); } },
                { id: "qat-redo", icon: "bi bi-arrow-clockwise", tooltip: "Redo (Ctrl+Y)", keyTip: "3", onClick: function() { logEvent("QAT: Redo"); } }
            ],
            qatPosition: "above",
            activeTabId: "home",
            statusBar: function()
            {
                var bar = document.createElement("div");
                bar.style.display = "inline-flex";
                bar.style.alignItems = "center";
                bar.style.gap = "10px";

                // PresenceIndicator — collapsed avatars
                var presence = createPresenceIndicator(null, {
                    people: [
                        { id: "u1", name: "Jane Doe", status: "online" },
                        { id: "u2", name: "Alex Rivera", status: "busy" },
                        { id: "u3", name: "Mei Chen", status: "away" }
                    ],
                    maxVisible: 3,
                    size: "sm",
                    expandable: false
                });
                bar.appendChild(presence.getElement());

                // Thin separator
                var sep = document.createElement("span");
                sep.style.width = "1px";
                sep.style.height = "16px";
                sep.style.background = "#d1d5db";
                sep.style.flexShrink = "0";
                bar.appendChild(sep);

                // PersonChip — current user
                var chip = createPersonChip({
                    name: "Jane Doe",
                    status: "online",
                    size: "sm",
                    clickable: true,
                    onClick: function() { logEvent("Status bar: user chip clicked"); }
                });
                bar.appendChild(chip.getElement());

                // Pill — entity name
                var entityPill = createPill({
                    label: "Acme Corp",
                    icon: "bi bi-building",
                    color: "gray",
                    size: "sm"
                });
                bar.appendChild(entityPill.getElement());

                // StatusBadge — version
                var badgeHost = document.createElement("span");
                badgeHost.id = "ribbon-status-badge-host";
                bar.appendChild(badgeHost);
                // Defer so host is in DOM
                setTimeout(function() {
                    createStatusBadge("ribbon-status-badge-host", {
                        status: "operational",
                        variant: "pill",
                        size: "xs",
                        label: "v2.4.1"
                    });
                }, 0);

                return bar;
            },
            autoCollapseDelay: 8000,
            onTabChange: function(tabId) { logEvent("Tab: " + tabId); },
            onCollapse: function(collapsed) { logEvent("Collapsed: " + collapsed); }
        }, "ribbon-demo-1");

        // Contextual tab buttons
        document.getElementById("ribbon-demo-show-ctx").addEventListener("click", function()
        {
            ribbon.showContextualTab("table-design");
            logEvent("Contextual tab shown");
        });
        document.getElementById("ribbon-demo-hide-ctx").addEventListener("click", function()
        {
            ribbon.hideContextualTab("table-design");
            logEvent("Contextual tab hidden");
        });
        document.getElementById("ribbon-demo-toggle-collapse").addEventListener("click", function()
        {
            ribbon.toggleCollapse();
        });

        var statusBarVisible = true;
        document.getElementById("ribbon-demo-toggle-status").addEventListener("click", function()
        {
            if (statusBarVisible)
            {
                ribbon.setStatusBar(null);
                logEvent("Status bar removed");
            }
            else
            {
                ribbon.setStatusBar(function()
                {
                    var wrap = document.createElement("div");
                    wrap.style.display = "inline-flex";
                    wrap.style.alignItems = "center";
                    wrap.style.gap = "10px";

                    var chip = createPersonChip({
                        name: "Jane Doe",
                        status: "online",
                        size: "sm"
                    });
                    wrap.appendChild(chip.getElement());

                    var pill = createPill({
                        label: "Acme Corp",
                        icon: "bi bi-building",
                        color: "gray",
                        size: "sm"
                    });
                    wrap.appendChild(pill.getElement());

                    return wrap;
                });
                logEvent("Status bar restored");
            }
            statusBarVisible = !statusBarVisible;
        });

        var savedState = null;
        document.getElementById("ribbon-demo-save-state").addEventListener("click", function()
        {
            savedState = ribbon.getState();
            logEvent("State saved: " + JSON.stringify(savedState, null, 2));
        });
        document.getElementById("ribbon-demo-restore-state").addEventListener("click", function()
        {
            if (savedState)
            {
                ribbon.restoreState(savedState);
                logEvent("State restored");
            }
            else
            {
                logEvent("No saved state — click Save State first");
            }
        });
    })();

    </script>
</body>
</html>
