<!--
  COMPONENT: DemoPage-InlineToolbar
  PURPOSE: Standalone demo page for the InlineToolbar component.
  RELATES: [[InlineToolbar]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InlineToolbar - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/inlinetoolbar/inlinetoolbar.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            InlineToolbar
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section">
            <h2>InlineToolbar — Buttons</h2>
            <p class="text-muted">A compact toolbar with icon buttons for common actions.</p>
            <div id="demo-toolbar-buttons" style="border: 1px solid var(--theme-border-color); padding: 8px;"></div>
        </div>

        <div class="demo-section">
            <h2>InlineToolbar — Toggles &amp; Separators</h2>
            <p class="text-muted">Toolbar with toggle buttons and separators for formatting actions.</p>
            <div id="demo-toolbar-toggles" style="border: 1px solid var(--theme-border-color); padding: 8px;"></div>
        </div>

        <pre class="demo-output mt-3 p-2" id="demo-output" style="font-size: 12px; max-height: 150px; overflow-y: auto;"></pre>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/inlinetoolbar/inlinetoolbar.js"></script>

    <script>
    (function()
    {
        "use strict";
        var LOG = "[InlineToolbar Demo]";
        var output = document.getElementById("demo-output");
        function log(msg) { output.textContent += msg + "\n"; output.scrollTop = output.scrollHeight; }

        if (typeof createInlineToolbar !== "function") { log("ERROR: createInlineToolbar not available"); return; }

        // --- Toolbar 1: Buttons ---
        var toolbar1 = createInlineToolbar({
            container: document.getElementById("demo-toolbar-buttons"),
            items: [
                { id: "new", icon: "plus-lg", tooltip: "New", onClick: function(item) { log(LOG + " Clicked: " + item.id); } },
                { id: "open", icon: "folder2-open", tooltip: "Open", onClick: function(item) { log(LOG + " Clicked: " + item.id); } },
                { id: "save", icon: "save", tooltip: "Save", onClick: function(item) { log(LOG + " Clicked: " + item.id); } },
                { id: "sep1", icon: "", tooltip: "", type: "separator" },
                { id: "undo", icon: "arrow-counterclockwise", tooltip: "Undo", onClick: function(item) { log(LOG + " Clicked: " + item.id); } },
                { id: "redo", icon: "arrow-clockwise", tooltip: "Redo", onClick: function(item) { log(LOG + " Clicked: " + item.id); } },
                { id: "sep2", icon: "", tooltip: "", type: "separator" },
                { id: "delete", icon: "trash", tooltip: "Delete", onClick: function(item) { log(LOG + " Clicked: " + item.id); } }
            ],
            size: "sm"
        });

        // --- Toolbar 2: Toggles + Separators ---
        var toolbar2 = createInlineToolbar({
            container: document.getElementById("demo-toolbar-toggles"),
            items: [
                { id: "bold", icon: "type-bold", tooltip: "Bold", type: "toggle", onClick: function(item, active) { log(LOG + " Toggle: " + item.id + " = " + active); } },
                { id: "italic", icon: "type-italic", tooltip: "Italic", type: "toggle", onClick: function(item, active) { log(LOG + " Toggle: " + item.id + " = " + active); } },
                { id: "underline", icon: "type-underline", tooltip: "Underline", type: "toggle", onClick: function(item, active) { log(LOG + " Toggle: " + item.id + " = " + active); } },
                { id: "sep3", icon: "", tooltip: "", type: "separator" },
                { id: "align-left", icon: "text-left", tooltip: "Align Left", type: "toggle", active: true, onClick: function(item, active) { log(LOG + " Toggle: " + item.id + " = " + active); } },
                { id: "align-center", icon: "text-center", tooltip: "Align Center", type: "toggle", onClick: function(item, active) { log(LOG + " Toggle: " + item.id + " = " + active); } },
                { id: "align-right", icon: "text-right", tooltip: "Align Right", type: "toggle", onClick: function(item, active) { log(LOG + " Toggle: " + item.id + " = " + active); } },
                { id: "sep4", icon: "", tooltip: "", type: "separator" },
                { id: "filter", icon: "funnel", tooltip: "Filter", type: "toggle", onClick: function(item, active) { log(LOG + " Toggle: " + item.id + " = " + active); } }
            ],
            size: "md"
        });

        log(LOG + " Created 2 inline toolbars — click buttons to see events");
    })();
    </script>
</body>
</html>
