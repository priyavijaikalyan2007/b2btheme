<!--
  COMPONENT: DemoPage-EmptyState
  PURPOSE: Standalone demo page for the EmptyState component.
  RELATES: [[EmptyState]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmptyState - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/emptystate/emptystate.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            EmptyState
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="emptystate-section">
            <h2><i class="bi bi-inbox"></i> EmptyState</h2>
            <p class="text-muted">Centered placeholder for empty views — icon, heading, description, CTA button, and secondary link.</p>

            <div class="row g-4">
                <!-- 1. Default (md) -->
                <div class="col-md-6">
                    <div id="emptystate-demo-default" style="border: 1px dashed var(--theme-border-color); min-height: 200px;"></div>
                </div>

                <!-- 2. With CTA and secondary -->
                <div class="col-md-6">
                    <div id="emptystate-demo-actions" style="border: 1px dashed var(--theme-border-color); min-height: 200px;"></div>
                </div>

                <!-- 3. Small compact -->
                <div class="col-md-6">
                    <div id="emptystate-demo-compact" style="border: 1px dashed var(--theme-border-color); min-height: 150px;"></div>
                </div>

                <!-- 4. Large with custom icon -->
                <div class="col-md-6">
                    <div id="emptystate-demo-large" style="border: 1px dashed var(--theme-border-color); min-height: 250px;"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/emptystate/emptystate.js"></script>

    <script>
    // EmptyState Demos
    (function() {
        // 1. Default (md) — heading + description only
        createEmptyState("emptystate-demo-default", {
            heading: "No results found",
            description: "Try adjusting your search or filter criteria."
        });

        // 2. With CTA and secondary actions
        createEmptyState("emptystate-demo-actions", {
            icon: "bi-folder-plus",
            heading: "No projects yet",
            description: "Create your first project to get started with the platform.",
            actionLabel: "Create Project",
            actionIcon: "bi-plus-lg",
            onAction: function() { console.log("[Demo] Create project clicked"); },
            secondaryLabel: "Learn more about projects",
            onSecondary: function() { console.log("[Demo] Learn more clicked"); }
        });

        // 3. Small compact (for panels)
        createEmptyState("emptystate-demo-compact", {
            icon: "bi-search",
            heading: "No matches",
            size: "sm",
            compact: true
        });

        // 4. Large with custom icon colour
        createEmptyState("emptystate-demo-large", {
            icon: "bi-cloud-slash",
            iconColor: "#dc3545",
            heading: "Connection lost",
            description: "Unable to reach the server. Please check your network connection and try again.",
            actionLabel: "Retry",
            actionVariant: "danger",
            onAction: function() { console.log("[Demo] Retry clicked"); },
            size: "lg"
        });
    })();

    </script>
</body>
</html>
