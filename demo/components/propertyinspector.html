<!--
  COMPONENT: DemoPage-PropertyInspector
  PURPOSE: Standalone demo page for the PropertyInspector component.
  RELATES: [[PropertyInspector]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PropertyInspector - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/propertyinspector/propertyinspector.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            PropertyInspector
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="propertyinspector-section">
            <h2>Property Inspector (Drawer)</h2>
            <p class="text-muted">Slide-out drawer for viewing/editing entity details with tabbed sections.</p>

            <div id="demo-propertyinspector-container" style="position:relative; min-height:300px; border:1px solid var(--theme-border-color); overflow:hidden;">
                <div style="padding:16px;">
                    <p>Click a row to open the Property Inspector:</p>
                    <div class="list-group" id="demo-pi-list">
                        <button class="list-group-item list-group-item-action" data-pi-title="Task #1001" data-pi-sub="High Priority">Task #1001 — Fix login bug</button>
                        <button class="list-group-item list-group-item-action" data-pi-title="Task #1002" data-pi-sub="Medium Priority">Task #1002 — Add export feature</button>
                        <button class="list-group-item list-group-item-action" data-pi-title="Task #1003" data-pi-sub="Low Priority">Task #1003 — Update documentation</button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/propertyinspector/propertyinspector.js"></script>

    <script>

    // ====================================================================
    // Property Inspector Demo
    // ====================================================================

    (function()
    {
        var inspector = createPropertyInspector({
            container: document.getElementById("demo-propertyinspector-container"),
            resizable: true,
            onClose: function() { console.log("Inspector closed"); },
            onAction: function(id) { console.log("Inspector action:", id); },
            onTabChange: function(tabId) { console.log("Tab:", tabId); }
        });

        var listEl = document.getElementById("demo-pi-list");
        var buttons = listEl.querySelectorAll("button");
        for (var i = 0; i < buttons.length; i++)
        {
            (function(btn)
            {
                btn.addEventListener("click", function()
                {
                    var title = btn.getAttribute("data-pi-title");
                    var sub = btn.getAttribute("data-pi-sub");

                    var detailsTab = document.createElement("div");
                    detailsTab.innerHTML = "<p><strong>Title:</strong> " + btn.textContent + "</p>"
                        + "<p><strong>Priority:</strong> " + sub + "</p>"
                        + "<p><strong>Status:</strong> In Progress</p>"
                        + "<p><strong>Assigned:</strong> Jane Smith</p>";

                    var historyTab = document.createElement("div");
                    historyTab.innerHTML = "<p>2026-02-28 — Created by admin</p>"
                        + "<p>2026-02-28 — Assigned to Jane Smith</p>";

                    inspector.open({
                        title: title,
                        subtitle: sub,
                        icon: "bi-clipboard-check",
                        actions: [
                            { id: "edit", label: "Edit", icon: "bi-pencil" },
                            { id: "delete", label: "Delete", icon: "bi-trash" }
                        ],
                        tabs: [
                            { id: "details", label: "Details", icon: "bi-info-circle", content: detailsTab },
                            { id: "history", label: "History", icon: "bi-clock-history", content: historyTab }
                        ]
                    });
                });
            })(buttons[i]);
        }
    })();

    </script>
</body>
</html>
