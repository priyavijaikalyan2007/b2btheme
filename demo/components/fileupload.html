<!--
  COMPONENT: DemoPage-FileUpload
  PURPOSE: Standalone demo page for the FileUpload component.
  RELATES: [[FileUpload]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FileUpload - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/fileupload/fileupload.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            FileUpload
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="fileupload-section">
            <h2><i class="bi bi-cloud-arrow-up"></i> FileUpload</h2>
            <p class="text-muted">Drag-and-drop upload zone with progress bars, file validation, retry, and optional download section.</p>

            <div class="row g-4">
                <div class="col-md-6">
                    <h3 class="h5">Upload (images + PDFs, 5 MB limit)</h3>
                    <div id="fileupload-demo-basic"></div>
                </div>
                <div class="col-md-6">
                    <h3 class="h5">With Downloads</h3>
                    <div id="fileupload-demo-downloads"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/fileupload/fileupload.js"></script>

    <script>

    // ====================================================================
    // FileUpload Demos
    // ====================================================================
    (function() {
        // Basic upload with simulated upload handler
        createFileUpload("fileupload-demo-basic", {
            accept: "image/*,.pdf",
            maxFileSize: 5 * 1024 * 1024,
            maxFiles: 5,
            onUpload: function(file, onProgress) {
                return new Promise(function(resolve, reject) {
                    var progress = 0;
                    var interval = setInterval(function() {
                        progress += 0.1 + Math.random() * 0.15;
                        if (progress >= 1) {
                            clearInterval(interval);
                            onProgress(1);
                            // Simulate occasional failure
                            if (Math.random() < 0.2) {
                                reject(new Error("Simulated upload failure"));
                            } else {
                                resolve();
                            }
                        } else {
                            onProgress(progress);
                        }
                    }, 200);
                });
            },
            onRemove: function(name) {
                console.log("[FileUpload Demo] Removed:", name);
            }
        });

        // With downloads section
        createFileUpload("fileupload-demo-downloads", {
            accept: "image/*,.pdf,.doc,.docx",
            maxFileSize: 10 * 1024 * 1024,
            showDownloads: true,
            downloads: [
                { name: "report-q4-2025.pdf", size: 2457600, url: "#" },
                { name: "design-mockup.png", size: 1048576, url: "#" },
                { name: "meeting-notes.docx", size: 35840, url: "#" }
            ],
            onUpload: function(file, onProgress) {
                return new Promise(function(resolve) {
                    var progress = 0;
                    var interval = setInterval(function() {
                        progress += 0.15;
                        if (progress >= 1) {
                            clearInterval(interval);
                            onProgress(1);
                            resolve();
                        } else {
                            onProgress(progress);
                        }
                    }, 150);
                });
            }
        });
    })();

    </script>
</body>
</html>
