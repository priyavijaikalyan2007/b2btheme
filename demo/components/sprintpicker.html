<!--
  COMPONENT: DemoPage-SprintPicker
  PURPOSE: Standalone demo page for the SprintPicker component.
  RELATES: [[SprintPicker]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SprintPicker - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/sprintpicker/sprintpicker.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            SprintPicker
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="sprintpicker-section">
            <h2>Sprint Picker</h2>
            <p>An agile sprint selector with list and calendar views. Computes sprints from an anchor date and sprint length, with configurable naming modes.</p>

            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label">2-Week Sprints (List View)</label>
                    <div id="demo-sprintpicker-list"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">1-Week Sprints (Calendar View)</label>
                    <div id="demo-sprintpicker-calendar"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">3-Week (Monthly Naming)</label>
                    <div id="demo-sprintpicker-monthly"></div>
                </div>
            </div>

            <div class="row g-4 mt-2">
                <div class="col-md-4">
                    <label class="form-label">End Mode (2-Week)</label>
                    <div id="demo-sprintpicker-end"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Custom Naming</label>
                    <div id="demo-sprintpicker-custom"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Small Size</label>
                    <div id="demo-sprintpicker-sm"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/sprintpicker/sprintpicker.js"></script>

    <script>
    // ====================================================================
    // Sprint Picker Demos
    // ====================================================================

    createSprintPicker("demo-sprintpicker-list", {
        anchorDate: new Date(2026, 0, 5),
        sprintLength: 2,
        viewMode: "list",
        onSelect: function(v) { console.log("[SprintPicker list]", v.sprintName, v.date); }
    });

    createSprintPicker("demo-sprintpicker-calendar", {
        anchorDate: new Date(2026, 0, 5),
        sprintLength: 1,
        viewMode: "calendar",
        onSelect: function(v) { console.log("[SprintPicker calendar]", v.sprintName, v.date); }
    });

    createSprintPicker("demo-sprintpicker-monthly", {
        anchorDate: new Date(2026, 0, 5),
        sprintLength: 3,
        sprintNaming: "monthly",
        onSelect: function(v) { console.log("[SprintPicker monthly]", v.sprintName, v.date); }
    });

    createSprintPicker("demo-sprintpicker-end", {
        anchorDate: new Date(2026, 0, 5),
        sprintLength: 2,
        mode: "end",
        onSelect: function(v) { console.log("[SprintPicker end]", v.sprintName, v.date); }
    });

    createSprintPicker("demo-sprintpicker-custom", {
        anchorDate: new Date(2026, 0, 5),
        sprintLength: 2,
        sprintNaming: function(index, start, end) {
            return "Iteration " + (index + 1);
        },
        onSelect: function(v) { console.log("[SprintPicker custom]", v.sprintName, v.date); }
    });

    createSprintPicker("demo-sprintpicker-sm", {
        anchorDate: new Date(2026, 0, 5),
        sprintLength: 2,
        size: "sm"
    });

    </script>
</body>
</html>
