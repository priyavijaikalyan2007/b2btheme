<!--
  COMPONENT: DemoPage-UserMenu
  PURPOSE: Standalone demo page for the UserMenu component.
  RELATES: [[UserMenu]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UserMenu - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/usermenu/usermenu.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            UserMenu
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="usermenu-section">
            <h2><i class="bi bi-person-circle"></i> UserMenu</h2>
            <p class="text-muted">Avatar-triggered dropdown menu for user account actions with keyboard navigation and status indicators.</p>

            <div class="row g-4">
                <div class="col-auto">
                    <h3 class="h5">Image Avatar</h3>
                    <div id="usermenu-demo-image"></div>
                </div>
                <div class="col-auto">
                    <h3 class="h5">Initials Fallback</h3>
                    <div id="usermenu-demo-initials"></div>
                </div>
                <div class="col-auto">
                    <h3 class="h5">Small (icon only)</h3>
                    <div id="usermenu-demo-sm"></div>
                </div>
            </div>
            <pre class="mt-3 p-2 demo-output" id="usermenu-demo-output" style="font-size: 12px; min-height: 32px;"></pre>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/usermenu/usermenu.js"></script>

    <script>

    // ====================================================================
    // UserMenu Demos
    // ====================================================================
    (function() {
        var output = document.getElementById("usermenu-demo-output");

        var menuItems = [
            { id: "profile", label: "My Profile", icon: "bi bi-person" },
            { id: "settings", label: "Settings", icon: "bi bi-gear" },
            { id: "billing", label: "Billing", icon: "bi bi-credit-card" },
            { id: "div1", label: "", type: "divider" },
            { id: "help", label: "Help & Support", icon: "bi bi-question-circle" },
            { id: "div2", label: "", type: "divider" },
            { id: "signout", label: "Sign Out", icon: "bi bi-box-arrow-right", danger: true }
        ];

        // Image avatar
        createUserMenu("usermenu-demo-image", {
            userName: "Jane Cooper",
            userRole: "Admin",
            avatarUrl: "https://i.pravatar.cc/150?u=jane",
            status: "online",
            menuItems: menuItems,
            onItemClick: function(id) {
                output.textContent = "Menu item clicked: " + id;
            },
            onSignOut: function() {
                output.textContent = "Sign out clicked!";
            }
        });

        // Initials fallback
        createUserMenu("usermenu-demo-initials", {
            userName: "Robert Johnson",
            userRole: "Developer",
            avatarInitials: "RJ",
            status: "busy",
            menuItems: menuItems,
            onItemClick: function(id) {
                output.textContent = "Menu item clicked: " + id;
            }
        });

        // Small (icon only)
        createUserMenu("usermenu-demo-sm", {
            userName: "Alex Kim",
            avatarInitials: "AK",
            status: "away",
            size: "sm",
            menuItems: [
                { id: "profile", label: "Profile", icon: "bi bi-person" },
                { id: "div1", label: "", type: "divider" },
                { id: "signout", label: "Sign Out", danger: true }
            ],
            onItemClick: function(id) {
                output.textContent = "Small menu item: " + id;
            }
        });
    })();

    </script>
</body>
</html>
