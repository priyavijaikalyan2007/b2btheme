<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DiagramEngine - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

<body class="demo-shell-body">

        <h1 class="demo-header-title">

            DiagramEngine

                <button class="btn btn-sm btn-outline-secondary" id="de-tool-measure" title="Measure tool (M)"><i class="bi bi-rulers"></i> Measure</button>

            <!-- Layout + Export buttons -->
            <div class="mb-2">
                <strong class="me-1" style="font-size: 12px;">Layout:</strong>
                <button class="btn btn-sm btn-outline-info" id="de-layout-grid" title="Arrange in grid"><i class="bi bi-grid-3x3"></i> Grid Layout</button>
                <button class="btn btn-sm btn-outline-info" id="de-layout-force" title="Circular arrangement"><i class="bi bi-diagram-3"></i> Force Layout</button>
                <button class="btn btn-sm btn-outline-info" id="de-zoom-fit" title="Zoom to fit all"><i class="bi bi-arrows-fullscreen"></i> Zoom to Fit</button>

                <button class="btn btn-sm btn-outline-warning" id="de-stencil-bpmn" title="Load BPMN shapes"><i class="bi bi-signpost-split"></i> BPMN</button>
                <button class="btn btn-sm btn-outline-warning" id="de-stencil-er" title="Load ER shapes"><i class="bi bi-database"></i> ER</button>
                <button class="btn btn-sm btn-outline-warning" id="de-stencil-network" title="Load network shapes"><i class="bi bi-hdd-network"></i> Network</button>
            </div>

            <!-- Active tool indicator -->
            <div class="mb-2">
                <small class="text-muted">Active tool: <strong id="de-active-tool-label">select</strong></small>
            </div>

            <!-- Property panel — shown when objects are selected -->
            <div id="de-property-panel" style="display: none; border: 1px solid var(--theme-border-color); padding: 12px; margin-bottom: 8px; background: var(--theme-card-bg, #fff); font-size: 12px;">
                <strong style="font-size: 13px;">Properties</strong>
                <span id="de-prop-selection-info" class="text-muted ms-2" style="font-size: 11px;"></span>

                <div class="row g-2 mt-1">
                    <!-- Fill controls -->
                    <div class="col-auto">
                        <label class="form-label mb-0" style="font-size: 11px;">Fill</label><br>
                        <input type="color" id="de-prop-fill-color" value="#0d6efd" style="width: 32px; height: 24px; padding: 0; border: 1px solid var(--theme-border-color);">
                        <label class="ms-1" style="font-size: 11px;"><input type="checkbox" id="de-prop-no-fill" class="form-check-input" style="margin-top: 0;"> No fill</label>
                    </div>

                    <!-- Stroke controls -->
                    <div class="col-auto">
                        <label class="form-label mb-0" style="font-size: 11px;">Stroke</label><br>
                        <input type="color" id="de-prop-stroke-color" value="#495057" style="width: 32px; height: 24px; padding: 0; border: 1px solid var(--theme-border-color);">
                        <input type="number" id="de-prop-stroke-width" value="1.5" min="0.5" max="5" step="0.5" style="width: 50px; font-size: 11px;" class="form-control form-control-sm d-inline-block">
                    </div>

                    <!-- Opacity -->
                    <div class="col-auto">
                        <label class="form-label mb-0" style="font-size: 11px;">Opacity</label><br>
                        <input type="range" id="de-prop-opacity" min="0" max="100" value="100" style="width: 80px; vertical-align: middle;">
                        <span id="de-prop-opacity-val" style="font-size: 10px;">100%</span>
                    </div>

                    <!-- Rotation -->
                    <div class="col-auto">
                        <label class="form-label mb-0" style="font-size: 11px;">Rotation</label><br>
                        <input type="number" id="de-prop-rotation" value="0" min="0" max="360" step="1" style="width: 58px; font-size: 11px;" class="form-control form-control-sm d-inline-block">
                        <span style="font-size: 10px;">deg</span>
                    </div>

                    <!-- Text -->
                    <div class="col-auto">
                        <label class="form-label mb-0" style="font-size: 11px;">Text</label><br>
                        <input type="text" id="de-prop-text" placeholder="Object text" style="width: 130px; font-size: 11px;" class="form-control form-control-sm d-inline-block">
                    </div>
                </div>

                <div class="row g-2 mt-1">
                    <!-- Shadow controls -->
                    <div class="col-auto">
                        <label class="form-label mb-0" style="font-size: 11px;">Shadow</label><br>
                        <label style="font-size: 11px;"><input type="checkbox" id="de-prop-shadow-on" class="form-check-input" style="margin-top: 0;"> Enable</label>
                        <input type="color" id="de-prop-shadow-color" value="#000000" style="width: 28px; height: 22px; padding: 0; border: 1px solid var(--theme-border-color); vertical-align: middle;" class="ms-1">
                        <label class="ms-1" style="font-size: 10px;">Blur</label>
                        <input type="range" id="de-prop-shadow-blur" min="0" max="20" value="4" style="width: 60px; vertical-align: middle;">
                        <label class="ms-1" style="font-size: 10px;">X</label>
                        <input type="number" id="de-prop-shadow-x" value="2" min="-10" max="10" step="1" style="width: 42px; font-size: 10px;" class="form-control form-control-sm d-inline-block">
                        <label class="ms-1" style="font-size: 10px;">Y</label>
                        <input type="number" id="de-prop-shadow-y" value="2" min="-10" max="10" step="1" style="width: 42px; font-size: 10px;" class="form-control form-control-sm d-inline-block">
                    </div>
                </div>

                <div class="row g-2 mt-1">
                    <!-- Page frames -->
                    <div class="col-auto">
                        <label class="form-label mb-0" style="font-size: 11px;">Page Frames</label><br>
                        <button class="btn btn-sm btn-outline-secondary" id="de-prop-frame-a4" style="font-size: 10px; padding: 1px 6px;">A4 Portrait</button>
                        <button class="btn btn-sm btn-outline-secondary" id="de-prop-frame-letter" style="font-size: 10px; padding: 1px 6px;">Letter</button>
                        <button class="btn btn-sm btn-outline-secondary" id="de-prop-frame-card" style="font-size: 10px; padding: 1px 6px;">Business Card</button>
                    </div>

                    <!-- Image URL -->
                    <div class="col-auto">
                        <label class="form-label mb-0" style="font-size: 11px;">Image</label><br>
                        <input type="text" id="de-prop-image-url" placeholder="https://..." style="width: 180px; font-size: 11px;" class="form-control form-control-sm d-inline-block">
                        <button class="btn btn-sm btn-outline-secondary" id="de-prop-add-image" style="font-size: 10px; padding: 1px 6px;">Add Image</button>
                    </div>
                </div>
            </div>

            <div id="demo-diagramengine" style="height: 900px; border: 1px solid var(--theme-border-color);"></div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/diagramengine/diagramengine.js"></script>

    <script>
    (function() {
        "use strict";
        var LOG = "[DiagramEngine Demo]";

        // ====================================================================
        // Shared utility — file download (used by both demos)
        // ====================================================================

        /**
         * Triggers a file download from a Blob.
         *
         * @param {Blob} blob - The data blob.
         * @param {string} filename - Suggested filename.
         */
        function downloadBlob(blob, filename)
        {
            var url = URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            console.log(LOG, "Downloaded:", filename);
        }

        try
        {

        // ====================================================================
        // Guard — bail if container or factory missing
        // ====================================================================
        var deContainer = document.getElementById("demo-diagramengine");

        if (!deContainer)
        {
            console.warn(LOG, "Container #demo-diagramengine not found");
            return;
        }

        if (typeof createDiagramEngine !== "function")
        {
            console.warn(LOG, "createDiagramEngine not available");
            return;
        }

        // ====================================================================
        // Create engine with data context for template binding
        // ====================================================================
        // ====================================================================
        // Property panel DOM references
        // ====================================================================
        var propPanel       = document.getElementById("de-property-panel");
        var propSelInfo     = document.getElementById("de-prop-selection-info");
        var propFillColor   = document.getElementById("de-prop-fill-color");
        var propNoFill      = document.getElementById("de-prop-no-fill");
        var propStrokeColor = document.getElementById("de-prop-stroke-color");
        var propStrokeWidth = document.getElementById("de-prop-stroke-width");
        var propOpacity     = document.getElementById("de-prop-opacity");
        var propOpacityVal  = document.getElementById("de-prop-opacity-val");
        var propRotation    = document.getElementById("de-prop-rotation");
        var propText        = document.getElementById("de-prop-text");
        var propShadowOn    = document.getElementById("de-prop-shadow-on");
        var propShadowColor = document.getElementById("de-prop-shadow-color");
        var propShadowBlur  = document.getElementById("de-prop-shadow-blur");
        var propShadowX     = document.getElementById("de-prop-shadow-x");
        var propShadowY     = document.getElementById("de-prop-shadow-y");
        var propImageUrl    = document.getElementById("de-prop-image-url");

        /** Currently selected object IDs for property panel updates. */
        var selectedObjectIds = [];

        /**
         * Extracts the plain text from an object's textContent runs.
         *
         * @param {object} obj - DiagramObject.
         * @returns {string} Concatenated text.
         */
        function getObjectText(obj)
        {
            if (!obj.presentation.textContent || !obj.presentation.textContent.runs)
            {
                return "";
            }

            return obj.presentation.textContent.runs
                .filter(function(r) { return r.text !== undefined; })
                .map(function(r) { return r.text; })
                .join("");
        }

        /**
         * Populates the property panel with the first selected object's
         * current values.
         *
         * @param {Array} objects - Array of selected DiagramObject instances.
         */
        function populatePanel(objects)
        {
            if (objects.length === 0)
            {
                return;
            }

            var obj = objects[0];
            var pres = obj.presentation;
            var style = pres.style || {};

            propSelInfo.textContent = objects.length + " selected — " + (pres.shape || "unknown");

            // Fill
            if (style.fill && style.fill.type === "solid" && style.fill.color)
            {
                propNoFill.checked = false;
                propFillColor.value = normalizeToHex(style.fill.color);
            }
            else
            {
                propNoFill.checked = true;
            }

            // Stroke
            if (style.stroke)
            {
                propStrokeColor.value = normalizeToHex(
                    typeof style.stroke.color === "string"
                        ? style.stroke.color
                        : "#495057"
                );
                propStrokeWidth.value = style.stroke.width || 1.5;
            }

            // Opacity
            var opVal = style.opacity !== undefined ? Math.round(style.opacity * 100) : 100;
            propOpacity.value = opVal;
            propOpacityVal.textContent = opVal + "%";

            // Rotation
            propRotation.value = pres.rotation || 0;

            // Text
            propText.value = getObjectText(obj);

            // Shadow
            if (style.shadow && style.shadow.enabled)
            {
                propShadowOn.checked = true;
                propShadowColor.value = normalizeToHex(style.shadow.color || "#000000");
                propShadowBlur.value = style.shadow.blur || 4;
                propShadowX.value = style.shadow.offsetX || 2;
                propShadowY.value = style.shadow.offsetY || 2;
            }
            else
            {
                propShadowOn.checked = false;
            }
        }

        /**
         * Attempts to normalize a CSS colour string to a 6-digit hex.
         * Handles hex, rgb(), and rgba() formats. Falls back to the
         * input string if parsing fails.
         *
         * @param {string} color - CSS colour string.
         * @returns {string} Hex colour string (e.g. "#0d6efd").
         */
        function normalizeToHex(color)
        {
            if (!color || typeof color !== "string")
            {
                return "#000000";
            }

            if (color.charAt(0) === "#" && (color.length === 7 || color.length === 4))
            {
                return color;
            }

            var match = color.match(/rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)/);

            if (match)
            {
                var r = parseInt(match[1], 10);
                var g = parseInt(match[2], 10);
                var b = parseInt(match[3], 10);

                return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
            }

            return "#000000";
        }

        /**
         * Handles selection change — show/hide panel and populate.
         *
         * @param {Array} objects - Selected DiagramObject array.
         */
        function onSelectionChanged(objects)
        {
            selectedObjectIds = objects.map(function(o) { return o.id; });

            if (objects.length === 0)
            {
                propPanel.style.display = "none";
                return;
            }

            propPanel.style.display = "";
            populatePanel(objects);
        }

        var engine = createDiagramEngine(deContainer, {
            grid: { visible: true, size: 20, style: "dots" },
            editable: true,
            textEditable: true,
            connectable: true,
            resizable: true,
            rotatable: true,
            data: { project: { name: "DiagramEngine Demo" } },
            onSelectionChange: function(objects)
            {
                onSelectionChanged(objects);
            },
        });

        // ====================================================================
        // Load all stencil packs
        // ====================================================================
        engine.loadStencilPack("flowchart");
        engine.loadStencilPack("uml");
        engine.loadStencilPack("bpmn");
        engine.loadStencilPack("er");
        engine.loadStencilPack("network");

        console.log(LOG, "Engine created, all stencil packs loaded");

        // ====================================================================
        // SECTION 1 — TOP: Flowchart example
        // Terminator -> Process -> Decision with connectors
        // ====================================================================

        // 1. Start terminator
        var fcStart = engine.addObject({
            semantic: { type: "flowchart.terminator", data: { label: "Start" } },
            presentation: {
                shape: "terminator",
                bounds: { x: 40, y: 30, width: 130, height: 50 },
                style: {
                    fill: { type: "solid", color: "rgba(82, 183, 136, 0.18)" },
                    stroke: { color: "#52b788", width: 2 },
                },
                textContent: {
                    runs: [{ text: "Start", bold: true, color: "#2d6a4f" }],
                    overflow: "visible", verticalAlign: "middle",
                    horizontalAlign: "center", padding: 8,
                },
            },
        });

        // 2. Process box
        var fcProcess = engine.addObject({
            semantic: { type: "flowchart.process", data: { label: "Validate Input" } },
            presentation: {
                shape: "process",
                bounds: { x: 220, y: 25, width: 160, height: 60 },
                style: {
                    fill: { type: "solid", color: "rgba(28, 126, 214, 0.12)" },
                    stroke: { color: "#1c7ed6", width: 2 },
                },
                textContent: {
                    runs: [{ text: "Validate Input" }],
                    overflow: "visible", verticalAlign: "middle",
                    horizontalAlign: "center", padding: 8,
                },
            },
        });

        // 3. Decision diamond
        var fcDecision = engine.addObject({
            semantic: { type: "flowchart.decision", data: { label: "Valid?" } },
            presentation: {
                shape: "decision",
                bounds: { x: 440, y: 15, width: 100, height: 90 },
                style: {
                    fill: { type: "solid", color: "rgba(245, 158, 11, 0.15)" },
                    stroke: { color: "#e8790c", width: 2 },
                },
                textContent: {
                    runs: [{ text: "Valid?", bold: true }],
                    overflow: "visible", verticalAlign: "middle",
                    horizontalAlign: "center", padding: 6,
                },
            },
        });

        // 4. End terminator
        var fcEnd = engine.addObject({
            semantic: { type: "flowchart.terminator", data: { label: "End" } },
            presentation: {
                shape: "terminator",
                bounds: { x: 600, y: 30, width: 120, height: 50 },
                style: {
                    fill: { type: "solid", color: "rgba(214, 51, 108, 0.15)" },
                    stroke: { color: "#d6336c", width: 2 },
                },
                textContent: {
                    runs: [{ text: "End", bold: true, color: "#862e46" }],
                    overflow: "visible", verticalAlign: "middle",
                    horizontalAlign: "center", padding: 8,
                },
            },
        });

        // Connector: Start -> Process (straight, classic arrow)
        engine.addConnector({
            semantic: { type: "flow", data: {} },
            presentation: {
                sourceId: fcStart.id,
                targetId: fcProcess.id,
                routing: "straight",
                waypoints: [],
                labels: [],
                style: { color: "#495057", width: 1.5, endArrow: "classic" },
            },
        });

        // Connector: Process -> Decision (orthogonal, block arrow, "Check" label)
        engine.addConnector({
            semantic: { type: "flow", data: {} },
            presentation: {
                sourceId: fcProcess.id,
                targetId: fcDecision.id,
                routing: "orthogonal",
                waypoints: [],
                labels: [
                    {
                        position: "middle",
                        textContent: {
                            runs: [{ text: "Check", bold: true, fontSize: 10, color: "#1c7ed6" }],
                            overflow: "visible", verticalAlign: "middle",
                            horizontalAlign: "center", padding: 3,
                        },
                        background: { type: "solid", color: "rgba(28, 126, 214, 0.1)" },
                    },
                ],
                style: { color: "#1c7ed6", width: 2, endArrow: "block" },
            },
        });

        // Connector: Decision -> End (curved, open arrow, "Yes" label)
        engine.addConnector({
            semantic: { type: "flow", data: {} },
            presentation: {
                sourceId: fcDecision.id,
                targetId: fcEnd.id,
                routing: "curved",
                waypoints: [],
                labels: [
                    {
                        position: "middle",
                        textContent: {
                            runs: [{ text: "Yes", bold: true, fontSize: 11, color: "#2d6a4f" }],
                            overflow: "visible", verticalAlign: "middle",
                            horizontalAlign: "center", padding: 3,
                        },
                        background: { type: "solid", color: "rgba(82, 183, 136, 0.15)" },
                    },
                ],
                style: { color: "#52b788", width: 1.5, endArrow: "open" },
            },
        });

        // Connector: Decision -> Start (manhattan, dashed, "No" label — retry loop)
        engine.addConnector({
            semantic: { type: "flow", data: {} },
            presentation: {
                sourceId: fcDecision.id,
                targetId: fcStart.id,
                routing: "manhattan",
                waypoints: [],
                labels: [
                    {
                        position: "middle",
                        textContent: {
                            runs: [{ text: "No — Retry", bold: true, fontSize: 10, color: "#c92a2a" }],
                            overflow: "visible", verticalAlign: "middle",
                            horizontalAlign: "center", padding: 3,
                        },
                        background: { type: "solid", color: "rgba(214, 51, 108, 0.1)" },
                    },
                ],
                style: { color: "#d6336c", width: 1.5, endArrow: "classic", dashPattern: [6, 3] },
            },
        });

        // ====================================================================
        // SECTION 2 — MIDDLE-LEFT: UML Diagram
        // Class + Actor
        // ====================================================================

        // 5. UML Class with compartments
        var umlClass = engine.addObject({
            semantic: { type: "uml.class", data: { label: "UserService" } },
            presentation: {
                shape: "uml-class",
                bounds: { x: 40, y: 160, width: 180, height: 140 },
                style: {
                    fill: { type: "solid", color: "rgba(111, 66, 193, 0.08)" },
                    stroke: { color: "#6f42c1", width: 2 },
                },
                textContent: {
                    runs: [{ text: "UserService\n---\n+name: string\n+email: string\n---\n+save(): void", fontSize: 11 }],
                    overflow: "clip", verticalAlign: "top",
                    horizontalAlign: "left", padding: 8,
                },
            },

        /**
         * Updates the active button highlight. Removes btn-primary from all
         * tool buttons and adds it to the active one. Updates the label.
         *
         * @param {string} activeId - The ID of the active button element.
         * @param {string} toolName - Human-readable tool name for the label.
         */
        function updateDeActiveButton(activeId, toolName)
        {
            for (var i = 0; i < deToolButtons.length; i++)
            {
                var btn = document.getElementById(deToolButtons[i].id);

                if (!btn)
                {
                    continue;
                }

                if (deToolButtons[i].id === activeId)
                {
                    btn.classList.remove("btn-outline-secondary");
                    btn.classList.add("btn-primary");
                }
                else
                {
                    btn.classList.remove("btn-primary");
                    btn.classList.add("btn-outline-secondary");
                }
            }

            if (deActiveLabel)
            {
                deActiveLabel.textContent = toolName;
            }

            console.log(LOG, "Tool:", toolName);
        }

        // ====================================================================
        // Tool button wiring — event listeners
        // ====================================================================

        for (var t = 0; t < deToolButtons.length; t++)
        {
            (function(cfg)
            {
                var btn = document.getElementById(cfg.id);

                if (!btn)
                {
                    return;
                }

                btn.addEventListener("click", function()
                {
                    if (cfg.shape)
                    {
                        engine.setDrawShape(cfg.shape);
                    }

                    engine.setActiveTool(cfg.tool);

                    var label = cfg.shape
                        ? cfg.tool + " (" + cfg.shape + ")"
                        : cfg.tool;

                    updateDeActiveButton(cfg.id, label);
                });
            })(deToolButtons[t]);
        }

        // Set initial active state
        updateDeActiveButton("de-tool-select", "select");

        // ====================================================================
        // Layout buttons
        // ====================================================================

        document.getElementById("de-layout-grid").addEventListener("click", function()
        {
            engine.applyLayout("grid", { columns: 5, gap: 60 });
            console.log(LOG, "Grid layout applied");
        });

        document.getElementById("de-layout-force").addEventListener("click", function()
        {
            engine.applyLayout("force");
            console.log(LOG, "Force layout applied");
        });

        document.getElementById("de-zoom-fit").addEventListener("click", function()
        {
            engine.zoomToFit();
            console.log(LOG, "Zoomed to fit");
        });

        // ====================================================================
        // Export buttons
        // ====================================================================

        // Export SVG
        document.getElementById("de-export-svg").addEventListener("click", function()
        {
            try
            {
                var svg = engine.exportSVG();
                var blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
                downloadBlob(blob, "diagram.svg");
            }
            catch (err)
            {
                console.error(LOG, "SVG export failed:", err);
            }
        });

        // Export JSON
        document.getElementById("de-export-json").addEventListener("click", function()
        {
            try
            {
                var json = engine.exportJSON();
                var blob = new Blob([json], { type: "application/json;charset=utf-8" });
                downloadBlob(blob, "diagram.json");
            }
            catch (err)
            {
                console.error(LOG, "JSON export failed:", err);
            }
        });

        // Export PNG
        document.getElementById("de-export-png").addEventListener("click", function()
        {
            try
            {
                if (typeof engine.exportPNG !== "function")
                {
                    console.warn(LOG, "exportPNG not available on this build");
                    return;
                }

                engine.exportPNG({ scale: 2 }).then(function(blob)
                {
                    downloadBlob(blob, "diagram.png");
                }).catch(function(err)
                {
                    console.error(LOG, "PNG export failed:", err);
                });
            }
            catch (err)
            {
                console.error(LOG, "PNG export error:", err);
            }
        });

        // ====================================================================
        // Stencil pack load buttons
        // ====================================================================

        var stencilButtons = [
            { id: "de-stencil-flowchart", pack: "flowchart" },
            { id: "de-stencil-uml",      pack: "uml" },
            { id: "de-stencil-bpmn",      pack: "bpmn" },
            { id: "de-stencil-er",        pack: "er" },
            { id: "de-stencil-network",   pack: "network" },
        ];

        for (var s = 0; s < stencilButtons.length; s++)
        {
            (function(cfg)
            {
                var btn = document.getElementById(cfg.id);

                if (!btn)
                {
                    return;
                }

                btn.addEventListener("click", function()
                {
                    engine.loadStencilPack(cfg.pack);
                    btn.classList.remove("btn-outline-warning");
                    btn.classList.add("btn-warning");
                    btn.disabled = true;
                    console.log(LOG, "Loaded stencil pack:", cfg.pack);
                });
            })(stencilButtons[s]);
        }

        // Mark all packs as already loaded (loaded on init)
        var allPackBtns = [
            "de-stencil-flowchart",
            "de-stencil-uml",
            "de-stencil-bpmn",
            "de-stencil-er",
            "de-stencil-network",
        ];

        for (var p = 0; p < allPackBtns.length; p++)
        {
            var packBtn = document.getElementById(allPackBtns[p]);

            if (packBtn)
            {
                packBtn.classList.remove("btn-outline-warning");
                packBtn.classList.add("btn-warning");
                packBtn.disabled = true;
            }
        }

        // ====================================================================
        // Property panel — event wiring
        // ====================================================================

        /**
         * Applies a property change to all currently selected objects.
         * Calls engine.updateObject() for each selected ID.
         *
         * @param {function} buildChanges - Function returning the changes partial.
         */
        function applyToSelected(buildChanges)
        {
            for (var i = 0; i < selectedObjectIds.length; i++)
            {
                var obj = engine.getObject(selectedObjectIds[i]);

                if (!obj)
                {
                    continue;
                }

                var changes = buildChanges(obj);

                engine.updateObject(selectedObjectIds[i], changes);
            }
        }

        // Fill colour
        propFillColor.addEventListener("input", function()
        {
            var color = propFillColor.value;

            applyToSelected(function()
            {
                return {
                    presentation: {
                        style: {
                            fill: { type: "solid", color: color }
                        }
                    }
                };
            });
        });

        // No fill checkbox
        propNoFill.addEventListener("change", function()
        {
            var noFill = propNoFill.checked;

            applyToSelected(function()
            {
                return {
                    presentation: {
                        style: {
                            fill: noFill
                                ? { type: "none" }
                                : { type: "solid", color: propFillColor.value }
                        }
                    }
                };
            });
        });

        // Stroke colour
        propStrokeColor.addEventListener("input", function()
        {
            var color = propStrokeColor.value;

            applyToSelected(function(obj)
            {
                var w = (obj.presentation.style && obj.presentation.style.stroke)
                    ? obj.presentation.style.stroke.width
                    : 1.5;

                return {
                    presentation: {
                        style: {
                            stroke: { color: color, width: w }
                        }
                    }
                };
            });
        });

        // Stroke width
        propStrokeWidth.addEventListener("input", function()
        {
            var w = parseFloat(propStrokeWidth.value) || 1.5;

            applyToSelected(function(obj)
            {
                var c = (obj.presentation.style && obj.presentation.style.stroke)
                    ? obj.presentation.style.stroke.color
                    : "#495057";

                return {
                    presentation: {
                        style: {
                            stroke: { color: c, width: w }
                        }
                    }
                };
            });
        });

        // Opacity slider
        propOpacity.addEventListener("input", function()
        {
            var val = parseInt(propOpacity.value, 10);

            propOpacityVal.textContent = val + "%";

            applyToSelected(function()
            {
                return {
                    presentation: {
                        style: {
                            opacity: val / 100
                        }
                    }
                };
            });
        });

        // Rotation
        propRotation.addEventListener("input", function()
        {
            var deg = parseFloat(propRotation.value) || 0;

            applyToSelected(function()
            {
                return {
                    presentation: {
                        rotation: deg
                    }
                };
            });
        });

        // Text
        propText.addEventListener("input", function()
        {
            var txt = propText.value;

            applyToSelected(function(obj)
            {
                var tc = obj.presentation.textContent || {
                    runs: [],
                    overflow: "visible",
                    verticalAlign: "middle",
                    horizontalAlign: "center",
                    padding: 8
                };

                return {
                    presentation: {
                        textContent: {
                            runs: [{ text: txt }],
                            overflow: tc.overflow,
                            verticalAlign: tc.verticalAlign,
                            horizontalAlign: tc.horizontalAlign,
                            padding: tc.padding
                        }
                    }
                };
            });
        });

        // Shadow enable
        propShadowOn.addEventListener("change", function()
        {
            applyToSelected(function()
            {
                return {
                    presentation: {
                        style: {
                            shadow: {
                                enabled: propShadowOn.checked,
                                color: propShadowColor.value,
                                blur: parseInt(propShadowBlur.value, 10) || 4,
                                offsetX: parseInt(propShadowX.value, 10) || 2,
                                offsetY: parseInt(propShadowY.value, 10) || 2,
                                opacity: 0.5
                            }
                        }
                    }
                };
            });
        });

        // Shadow colour
        propShadowColor.addEventListener("input", function()
        {
            if (!propShadowOn.checked) { return; }

            applyToSelected(function()
            {
                return {
                    presentation: {
                        style: {
                            shadow: {
                                enabled: true,
                                color: propShadowColor.value,
                                blur: parseInt(propShadowBlur.value, 10) || 4,
                                offsetX: parseInt(propShadowX.value, 10) || 2,
                                offsetY: parseInt(propShadowY.value, 10) || 2,
                                opacity: 0.5
                            }
                        }
                    }
                };
            });
        });

        // Shadow blur
        propShadowBlur.addEventListener("input", function()
        {
            if (!propShadowOn.checked) { return; }

            applyToSelected(function()
            {
                return {
                    presentation: {
                        style: {
                            shadow: {
                                enabled: true,
                                color: propShadowColor.value,
                                blur: parseInt(propShadowBlur.value, 10) || 4,
                                offsetX: parseInt(propShadowX.value, 10) || 2,
                                offsetY: parseInt(propShadowY.value, 10) || 2,
                                opacity: 0.5
                            }
                        }
                    }
                };
            });
        });

        // Shadow offset X
        propShadowX.addEventListener("input", function()
        {
            if (!propShadowOn.checked) { return; }

            applyToSelected(function()
            {
                return {
                    presentation: {
                        style: {
                            shadow: {
                                enabled: true,
                                color: propShadowColor.value,
                                blur: parseInt(propShadowBlur.value, 10) || 4,
                                offsetX: parseInt(propShadowX.value, 10) || 0,
                                offsetY: parseInt(propShadowY.value, 10) || 2,
                                opacity: 0.5
                            }
                        }
                    }
                };
            });
        });

        // Shadow offset Y
        propShadowY.addEventListener("input", function()
        {
            if (!propShadowOn.checked) { return; }

            applyToSelected(function()
            {
                return {
                    presentation: {
                        style: {
                            shadow: {
                                enabled: true,
                                color: propShadowColor.value,
                                blur: parseInt(propShadowBlur.value, 10) || 4,
                                offsetX: parseInt(propShadowX.value, 10) || 2,
                                offsetY: parseInt(propShadowY.value, 10) || 0,
                                opacity: 0.5
                            }
                        }
                    }
                };
            });
        });

        // Page frame buttons
        document.getElementById("de-prop-frame-a4").addEventListener("click", function()
        {
            engine.addPageFrame("A4 Portrait");
            console.log(LOG, "Added A4 Portrait page frame");
        });

        document.getElementById("de-prop-frame-letter").addEventListener("click", function()
        {
            engine.addPageFrame("Letter Portrait");
            console.log(LOG, "Added Letter Portrait page frame");
        });

        document.getElementById("de-prop-frame-card").addEventListener("click", function()
        {
            engine.addPageFrame("Business Card");
            console.log(LOG, "Added Business Card page frame");
        });

        // Add Image button
        document.getElementById("de-prop-add-image").addEventListener("click", function()
        {
            var url = propImageUrl.value.trim();

            if (!url)
            {
                console.warn(LOG, "No image URL provided");
                return;
            }

            engine.addObject({
                semantic: { type: "image", data: { src: url } },
                presentation: {
                    shape: "image",
                    bounds: { x: 100, y: 100, width: 200, height: 150 },
                    style: {
                        stroke: { color: "#6c757d", width: 1 }
                    },
                    image: {
                        src: url,
                        fit: "contain"
                    }
                }
            });

            console.log(LOG, "Added image:", url);
            propImageUrl.value = "";
        });

        console.log(LOG, "Property panel wired");

        console.log(LOG, "Initialized with", engine.getObjects().length, "objects,", engine.getConnectors().length, "connectors");

        }
        catch (err)
        {
            console.error("[DiagramEngine Demo]", "Initialization failed:", err);
        }

        // ====================================================================
        // Shape Builder Demo
        // ====================================================================
        var SB_LOG = "[ShapeBuilder Demo]";
        var sbContainer = document.getElementById("demo-shapebuilder");

        if (!sbContainer)
        {
            console.warn(SB_LOG, "Container #demo-shapebuilder not found");
            return;
        }

        var builder = createDiagramEngine(sbContainer, {
            grid: { visible: true, size: 10, style: "lines" },
            editable: true,
            resizable: true,
            rotatable: true,
        });

        console.log(SB_LOG, "Engine created with fine grid (10px, lines)");

        // Pre-populate with arrow and chevron shapes for editing
        builder.addObject({
            semantic: { type: "custom-shape", data: { name: "Right Arrow" } },
            presentation: {
                shape: "arrow-right",
                bounds: { x: 80, y: 80, width: 200, height: 90 },
                style: {
                    fill: { type: "solid", color: "rgba(28, 126, 214, 0.15)" },
                    stroke: { color: "#1c7ed6", width: 2 },
                },
                textContent: {
                    runs: [{ text: "Arrow Shape", fontSize: 12 }],
                    overflow: "visible", verticalAlign: "middle",
                    horizontalAlign: "center", padding: 8,
                },
            },
        });

        builder.addObject({
            semantic: { type: "custom-shape", data: { name: "Chevron" } },
            presentation: {
                shape: "chevron",
                bounds: { x: 340, y: 85, width: 180, height: 80 },
                style: {
                    fill: { type: "solid", color: "rgba(82, 183, 136, 0.15)" },
                    stroke: { color: "#52b788", width: 2 },
                },
                textContent: {
                    runs: [{ text: "Chevron Shape", fontSize: 12 }],
                    overflow: "visible", verticalAlign: "middle",
                    horizontalAlign: "center", padding: 8,
                },
            },
        });

        console.log(SB_LOG, "Pre-populated with", builder.getObjects().length, "shapes");

        // ====================================================================
        // Shape Builder — tool button wiring
        // ====================================================================

        var sbToolButtons = [
            { id: "sb-tool-select",       tool: "select",  shape: null },
            { id: "sb-tool-pen",          tool: "pen",     shape: null },
            { id: "sb-tool-brush",        tool: "brush",   shape: null },
            { id: "sb-tool-draw-rect",    tool: "draw",    shape: "rectangle" },
            { id: "sb-tool-draw-ellipse", tool: "draw",    shape: "ellipse" },
        ];

        var sbActiveLabel = document.getElementById("sb-active-tool-label");

        /**
         * Updates the Shape Builder active button highlight.
         *
         * @param {string} activeId - The ID of the active button element.
         * @param {string} toolName - Human-readable tool name for the label.
         */
        function updateSbActiveButton(activeId, toolName)
        {
            for (var i = 0; i < sbToolButtons.length; i++)
            {
                var btn = document.getElementById(sbToolButtons[i].id);

                if (!btn)
                {
                    continue;
                }

                if (sbToolButtons[i].id === activeId)
                {
                    btn.classList.remove("btn-outline-secondary");
                    btn.classList.add("btn-primary");
                }
                else
                {
                    btn.classList.remove("btn-primary");
                    btn.classList.add("btn-outline-secondary");
                }
            }

            if (sbActiveLabel)
            {
                sbActiveLabel.textContent = toolName;
            }

            console.log(SB_LOG, "Tool:", toolName);
        }

        for (var sb = 0; sb < sbToolButtons.length; sb++)
        {
            (function(cfg)
            {
                var btn = document.getElementById(cfg.id);

                if (!btn)
                {
                    return;
                }

                btn.addEventListener("click", function()
                {
                    if (cfg.shape)
                    {
                        builder.setDrawShape(cfg.shape);
                    }

                    builder.setActiveTool(cfg.tool);

                    var label = cfg.shape
                        ? cfg.tool + " (" + cfg.shape + ")"
                        : cfg.tool;

                    updateSbActiveButton(cfg.id, label);
                });
            })(sbToolButtons[sb]);
        }

        // Set initial active state
        updateSbActiveButton("sb-tool-select", "select");

        // Zoom to Fit
        document.getElementById("sb-zoom-fit").addEventListener("click", function()
        {
            builder.zoomToFit();
            console.log(SB_LOG, "Zoomed to fit");
        });

        // Export JSON
        document.getElementById("sb-export-json").addEventListener("click", function()
        {
            try
            {
                var json = builder.exportJSON();
                var blob = new Blob([json], { type: "application/json;charset=utf-8" });
                downloadBlob(blob, "shapebuilder.json");
            }
            catch (err)
            {
                console.error(SB_LOG, "JSON export failed:", err);
            }
        });

        console.log(SB_LOG, "Initialized");
    })();

    </script>
</body>
</html>
