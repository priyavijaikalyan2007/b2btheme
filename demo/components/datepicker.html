<!--
  COMPONENT: DemoPage-DatePicker
  PURPOSE: Standalone demo page for the DatePicker component.
  RELATES: [[DatePicker]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DatePicker - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/datepicker/datepicker.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            DatePicker
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="datepicker-section">
            <h2>Date Picker</h2>
            <p>A calendar date picker with day, month, and year navigation views. Supports manual input, configurable format, week numbers, and locale-aware first day of week.</p>

            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label">Default (yyyy-MM-dd)</label>
                    <div id="demo-datepicker-default"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">US Format (MM/dd/yyyy)</label>
                    <div id="demo-datepicker-us"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">With Week Numbers (Monday start)</label>
                    <div id="demo-datepicker-weeks"></div>
                </div>
            </div>

            <div class="row g-4 mt-2">
                <div class="col-md-4">
                    <label class="form-label">Min/Max Constrained</label>
                    <div id="demo-datepicker-minmax"></div>
                    <small class="text-muted mt-1 d-block">Only dates within the next 30 days are selectable.</small>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Small Size</label>
                    <div id="demo-datepicker-sm"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Large Size</label>
                    <div id="demo-datepicker-lg"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/datepicker/datepicker.js"></script>

    <script>
    // ====================================================================
    // Date Picker Demos
    // ====================================================================

    createDatePicker("demo-datepicker-default", {
        format: "yyyy-MM-dd",
        onSelect: function(d) { console.log("[DatePicker] selected:", d); }
    });

    createDatePicker("demo-datepicker-us", {
        format: "MM/dd/yyyy",
        onSelect: function(d) { console.log("[DatePicker US] selected:", d); }
    });

    createDatePicker("demo-datepicker-weeks", {
        format: "yyyy-MM-dd",
        showWeekNumbers: true,
        firstDayOfWeek: 1,
        onSelect: function(d) { console.log("[DatePicker weeks] selected:", d); }
    });

    (function() {
        var today = new Date();
        var maxDate = new Date(today);
        maxDate.setDate(maxDate.getDate() + 30);
        createDatePicker("demo-datepicker-minmax", {
            format: "yyyy-MM-dd",
            minDate: today,
            maxDate: maxDate
        });
    })();

    createDatePicker("demo-datepicker-sm", { format: "yyyy-MM-dd", size: "sm" });
    createDatePicker("demo-datepicker-lg", { format: "yyyy-MM-dd", size: "lg" });

    </script>
</body>
</html>
