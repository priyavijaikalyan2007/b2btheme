<!--
  COMPONENT: DemoPage-GuidedTour
  PURPOSE: Standalone demo page for the GuidedTour component.
  RELATES: [[GuidedTour]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuidedTour - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/driver.js@1.4.0/dist/driver.css">
    <link rel="stylesheet" href="../../dist/components/guidedtour/guidedtour.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            GuidedTour
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <!-- Tour controls -->
        <div class="demo-section" id="guidedtour-section">
            <h2>GuidedTour</h2>
            <p>Product walkthrough powered by Driver.js with enterprise-themed popovers.</p>
            <div class="d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-primary btn-sm" id="demo-guidedtour-start">Start Tour</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" id="demo-guidedtour-reset">Reset Progress</button>
            </div>
        </div>

        <!-- Mini-dashboard: tour anchor targets -->
        <div class="row g-0 border mt-3" style="min-height: 420px;">

            <!-- Sidebar nav -->
            <nav class="col-md-3 col-lg-2 border-end p-0" id="demo-sidebar">
                <div class="p-3 border-bottom fw-semibold small text-uppercase text-secondary">
                    <i class="bi bi-grid-1x2"></i> Navigation
                </div>
                <ul class="nav flex-column p-2 gap-1">
                    <li class="nav-item"><a class="nav-link active small" href="#"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link small" href="#"><i class="bi bi-people me-2"></i>Users</a></li>
                    <li class="nav-item"><a class="nav-link small" href="#"><i class="bi bi-bar-chart me-2"></i>Analytics</a></li>
                    <li class="nav-item"><a class="nav-link small" href="#"><i class="bi bi-gear me-2"></i>Settings</a></li>
                </ul>
            </nav>

            <!-- Main content area -->
            <div class="col-md-9 col-lg-10 d-flex flex-column">

                <!-- Toolbar with search and actions -->
                <div class="d-flex align-items-center gap-2 p-3 border-bottom" id="demo-toolbar">
                    <div class="input-group input-group-sm" style="max-width: 280px;" id="demo-search">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" class="form-control" placeholder="Search dashboard...">
                    </div>
                    <div class="ms-auto d-flex gap-2">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="demo-action-export">
                            <i class="bi bi-download me-1"></i>Export
                        </button>
                        <button type="button" class="btn btn-sm btn-primary" id="demo-action-create">
                            <i class="bi bi-plus-lg me-1"></i>New Report
                        </button>
                    </div>
                </div>

                <!-- Dashboard body -->
                <div class="p-4 flex-grow-1" id="demo-dashboard-body">
                    <h5 class="mb-3">Dashboard Overview</h5>
                    <div class="row g-3">
                        <div class="col-sm-4">
                            <div class="border p-3">
                                <div class="text-secondary small">Total Users</div>
                                <div class="fs-4 fw-semibold">12,483</div>
                            </div>
                        </div>
                        <div class="col-sm-4">
                            <div class="border p-3">
                                <div class="text-secondary small">Active Sessions</div>
                                <div class="fs-4 fw-semibold">1,024</div>
                            </div>
                        </div>
                        <div class="col-sm-4">
                            <div class="border p-3">
                                <div class="text-secondary small">Reports Generated</div>
                                <div class="fs-4 fw-semibold">347</div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/driver.js@1.4.0/dist/driver.js.iife.js"></script>
    <script defer src="../../dist/components/guidedtour/guidedtour.js"></script>

    <script>

    // ====================================================================
    // GuidedTour Demo
    // ====================================================================

    document.addEventListener("DOMContentLoaded", function() {
        var tour = createGuidedTour({
            tourId: "demo-onboarding",
            steps: [
                {
                    target: "#demo-sidebar",
                    title: "Navigation Sidebar",
                    description: "Use the sidebar to navigate between different sections of the application.",
                    side: "right"
                },
                {
                    target: "#demo-search",
                    title: "Search",
                    description: "Quickly find reports, users, or settings with the search bar.",
                    side: "bottom"
                },
                {
                    target: "#demo-action-create",
                    title: "Create Reports",
                    description: "Click here to generate a new analytics report from your data.",
                    side: "left"
                },
                {
                    target: "#demo-dashboard-body",
                    title: "Dashboard Overview",
                    description: "View key metrics at a glance. Tiles update in real time as data flows in.",
                    side: "top"
                }
            ],
            onTourStart: function() { console.log("[GuidedTour] started"); },
            onStepView: function(i) { console.log("[GuidedTour] step", i); },
            onTourComplete: function() { console.log("[GuidedTour] completed"); },
            onTourDismiss: function(i) { console.log("[GuidedTour] dismissed at step", i); }
        });

        document.getElementById("demo-guidedtour-start").addEventListener("click", function() {
            if (tour) {
                tour.resetProgress();
                tour.start();
            } else {
                console.warn("[GuidedTour] Driver.js not loaded — tour unavailable");
            }
        });

        document.getElementById("demo-guidedtour-reset").addEventListener("click", function() {
            if (tour) {
                tour.resetProgress();
                console.log("[GuidedTour] progress reset");
            }
        });
    });

    </script>
</body>
</html>
