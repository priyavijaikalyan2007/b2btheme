<!--
  COMPONENT: DemoPage-OrientationPicker
  PURPOSE: Standalone demo page for the OrientationPicker component.
  RELATES: [[OrientationPicker]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrientationPicker - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/orientationpicker/orientationpicker.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            OrientationPicker
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section">
            <h2>OrientationPicker</h2>
            <p class="text-muted">Dropdown picker for selecting page orientation (portrait or landscape).</p>
            <div id="demo-orientationpicker"></div>
            <pre class="demo-output mt-3 p-2" id="demo-output" style="font-size: 12px; max-height: 150px; overflow-y: auto;"></pre>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/orientationpicker/orientationpicker.js"></script>

    <script>
    (function()
    {
        "use strict";
        var LOG = "[OrientationPicker Demo]";
        var output = document.getElementById("demo-output");
        function log(msg) { output.textContent += msg + "\n"; output.scrollTop = output.scrollHeight; }

        if (typeof createOrientationPicker !== "function") { log("ERROR: createOrientationPicker not available"); return; }

        var picker = createOrientationPicker({
            container: "demo-orientationpicker",
            value: "portrait",
            onChange: function(v) { log("Changed: " + JSON.stringify(v)); }
        });
        log(LOG + " Created with default orientation: portrait");
    })();
    </script>
</body>
</html>
