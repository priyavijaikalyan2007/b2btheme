<!--
  COMPONENT: DemoPage-PeriodPicker
  PURPOSE: Standalone demo page for the PeriodPicker component.
  RELATES: [[PeriodPicker]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PeriodPicker - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/periodpicker/periodpicker.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            PeriodPicker
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="periodpicker-section">
            <h2>Period Picker</h2>
            <p>A coarse time-period selector for project planning. Select months, quarters, halves, or years with automatic date resolution based on start/end mode.</p>

            <div class="row g-4">
                <div class="col-md-4">
                    <label class="form-label">Start Mode (All Granularities)</label>
                    <div id="demo-periodpicker-start"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">End Mode (All Granularities)</label>
                    <div id="demo-periodpicker-end"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Quarters + Years Only</label>
                    <div id="demo-periodpicker-qy"></div>
                </div>
            </div>

            <div class="row g-4 mt-2">
                <div class="col-md-4">
                    <label class="form-label">Months + Halves Only</label>
                    <div id="demo-periodpicker-mh"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Small Size</label>
                    <div id="demo-periodpicker-sm"></div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Large Size</label>
                    <div id="demo-periodpicker-lg"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/periodpicker/periodpicker.js"></script>

    <script>
    // ====================================================================
    // Period Picker Demos
    // ====================================================================

    createPeriodPicker("demo-periodpicker-start", {
        mode: "start",
        onSelect: function(v) { console.log("[PeriodPicker start]", v.period, v.year, v.date); }
    });

    createPeriodPicker("demo-periodpicker-end", {
        mode: "end",
        onSelect: function(v) { console.log("[PeriodPicker end]", v.period, v.year, v.date); }
    });

    createPeriodPicker("demo-periodpicker-qy", {
        granularities: ["quarter", "year"],
        onSelect: function(v) { console.log("[PeriodPicker Q+Y]", v); }
    });

    createPeriodPicker("demo-periodpicker-mh", {
        granularities: ["month", "half"],
        onSelect: function(v) { console.log("[PeriodPicker M+H]", v); }
    });

    createPeriodPicker("demo-periodpicker-sm", { size: "sm" });
    createPeriodPicker("demo-periodpicker-lg", { size: "lg" });

    </script>
</body>
</html>
