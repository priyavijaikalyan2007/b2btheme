<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuditLogViewer - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/auditlogviewer/auditlogviewer.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            AuditLogViewer
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="auditlogviewer-section">
            <h2><i class="bi bi-shield-lock"></i> AuditLogViewer</h2>
            <p class="text-muted">Read-only filterable audit log with severity badges, expandable detail rows, filter chips, pagination, and export.</p>

            <div class="row g-4">
                <div class="col-12">
                    <h3 class="h5">Full-Featured Demo</h3>
                    <p class="text-muted small">Click rows to expand detail panels. Use filters to narrow results. Export as CSV or JSON.</p>
                    <div id="alv-demo-full" style="height: 500px;"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/auditlogviewer/auditlogviewer.js"></script>

    <script>

    // ====================================================================
    // AuditLogViewer Demo
    // ====================================================================

    (function() {
        var now = Date.now();
        var actions = ["user.login", "user.logout", "role.update", "file.upload", "file.delete", "settings.change", "backup.run", "backup.fail", "api.key.create", "permission.grant"];
        var actors = ["admin", "jsmith", "mjones", "system", "deployer", "root"];
        var resources = ["Session #42", "Admin Role", "report.pdf", "config.yaml", "DB Backup", "API Key #7", "Editor Role", "dashboard.js", "User Profile"];
        var ips = ["10.0.1.1", "10.0.1.5", "192.168.1.100", "internal", "10.0.2.30", "172.16.0.50"];
        var severities = ["info", "info", "info", "info", "warning", "warning", "critical"];

        var entries = [];
        for (var i = 0; i < 120; i++) {
            var sev = severities[Math.floor(Math.random() * severities.length)];
            var entry = {
                id: "entry-" + i,
                timestamp: new Date(now - i * 900000 - Math.random() * 300000),
                actor: actors[Math.floor(Math.random() * actors.length)],
                action: actions[Math.floor(Math.random() * actions.length)],
                resource: resources[Math.floor(Math.random() * resources.length)],
                ipAddress: ips[Math.floor(Math.random() * ips.length)],
                severity: sev
            };
            if (i % 5 === 0) {
                entry.detail = {
                    before: { permissions: ["read"] },
                    after: { permissions: ["read", "write", "admin"] }
                };
            }
            entries.push(entry);
        }

        createAuditLogViewer({
            entries: entries,
            pageSize: 25,
            height: "500px",
            onRowClick: function(entry) { console.log("[ALV Demo] Row clicked:", entry.id); }
        }, "alv-demo-full");
    })();

    </script>
</body>
</html>
