<!--
  COMPONENT: DemoPage-SkeletonLoader
  PURPOSE: Standalone demo page for the SkeletonLoader component.
  RELATES: [[SkeletonLoader]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkeletonLoader - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/skeletonloader/skeletonloader.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            SkeletonLoader
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="skeletonloader-section">
            <h2><i class="bi bi-card-text"></i> SkeletonLoader</h2>
            <p class="text-muted">Animated placeholder mimicking content layout during loading. CSS shimmer animation with six presets.</p>

            <div class="row g-4">
                <div class="col-md-6">
                    <h3 class="h5">Text (3 lines)</h3>
                    <div id="skeleton-demo-text"></div>
                </div>
                <div class="col-md-3">
                    <h3 class="h5">Avatar (circle)</h3>
                    <div id="skeleton-demo-avatar"></div>
                </div>
                <div class="col-md-3">
                    <h3 class="h5">Avatar (square)</h3>
                    <div id="skeleton-demo-avatar-sq"></div>
                </div>
                <div class="col-md-6">
                    <h3 class="h5">Card</h3>
                    <div id="skeleton-demo-card"></div>
                </div>
                <div class="col-md-6">
                    <h3 class="h5">Table (4x4)</h3>
                    <div id="skeleton-demo-table"></div>
                </div>
                <div class="col-md-6">
                    <h3 class="h5">Paragraph (5 lines)</h3>
                    <div id="skeleton-demo-paragraph"></div>
                </div>
                <div class="col-md-6">
                    <h3 class="h5">Custom Block (chart placeholder)</h3>
                    <div id="skeleton-demo-custom"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/skeletonloader/skeletonloader.js"></script>

    <script>
    // SkeletonLoader Demos
    (function() {
        createSkeletonLoader({ preset: "text", lines: 3 }, "skeleton-demo-text");
        createSkeletonLoader({ preset: "avatar", width: "4rem", height: "4rem", circle: true }, "skeleton-demo-avatar");
        createSkeletonLoader({ preset: "avatar", width: "4rem", height: "4rem" }, "skeleton-demo-avatar-sq");
        createSkeletonLoader({ preset: "card" }, "skeleton-demo-card");
        createSkeletonLoader({ preset: "table", rows: 4, columns: 4 }, "skeleton-demo-table");
        createSkeletonLoader({ preset: "paragraph", lines: 5 }, "skeleton-demo-paragraph");
        createSkeletonLoader({ preset: "custom", width: "100%", height: "120px" }, "skeleton-demo-custom");
    })();

    </script>
</body>
</html>
