<!--
  COMPONENT: DemoPage-LineWidthPicker
  PURPOSE: Standalone demo page for the LineWidthPicker component.
  RELATES: [[LineWidthPicker]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LineWidthPicker - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/linewidthpicker/linewidthpicker.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            LineWidthPicker
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="linewidthpicker-section">
            <h2><i class="bi bi-border-width"></i> LineWidthPicker</h2>
            <p class="text-muted mb-3">Visual dropdown for selecting line thickness with CSS border previews.</p>

            <div class="row g-4">
                <div class="col-md-4">
                    <h3 class="h5">Default</h3>
                    <p class="text-muted small">Standard size with all 13 default widths.</p>
                    <div id="linewidthpicker-demo-default"></div>
                </div>
                <div class="col-md-4">
                    <h3 class="h5">Small</h3>
                    <p class="text-muted small">Compact variant for toolbars.</p>
                    <div id="linewidthpicker-demo-sm"></div>
                </div>
                <div class="col-md-4">
                    <h3 class="h5">Large</h3>
                    <p class="text-muted small">Larger variant.</p>
                    <div id="linewidthpicker-demo-lg"></div>
                </div>
            </div>
            <pre class="mt-3 p-2 demo-output" id="linewidthpicker-demo-output" style="font-size: 12px; min-height: 32px;"></pre>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/linewidthpicker/linewidthpicker.js"></script>

    <script>

    // ── LineWidthPicker Demos ──
    (function()
    {
        var outputEl = document.getElementById("linewidthpicker-demo-output");
        function logEvent(msg) { if (outputEl) { outputEl.textContent = msg; } }

        // Default
        createLineWidthPicker("linewidthpicker-demo-default", {
            value: 2,
            onChange: function(w) { logEvent("Selected: " + w.label + " (" + w.value + "px)"); }
        });

        // Small
        createLineWidthPicker("linewidthpicker-demo-sm", {
            size: "sm",
            value: 1,
            onChange: function(w) { logEvent("Small: " + w.label); }
        });

        // Large
        createLineWidthPicker("linewidthpicker-demo-lg", {
            size: "lg",
            value: 4,
            onChange: function(w) { logEvent("Large: " + w.label); }
        });
    })();

    </script>
</body>
</html>
