<!--
  COMPONENT: DemoPage-TypeBadge
  PURPOSE: Standalone demo page for the TypeBadge component.
  RELATES: [[TypeBadge]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeBadge - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/typebadge/typebadge.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            TypeBadge
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="typebadge-section">
            <h2>TypeBadge</h2>
            <p>Small inline chip/badge that visually identifies an ontology type. 3 sizes (sm/md/lg) and 3 variants (filled/outlined/subtle).</p>

            <div class="row g-3 mb-3">
                <div class="col-auto"><strong>Subtle:</strong></div>
                <div class="col-auto" id="demo-typebadge-subtle-sm"></div>
                <div class="col-auto" id="demo-typebadge-subtle-md"></div>
                <div class="col-auto" id="demo-typebadge-subtle-lg"></div>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-auto"><strong>Filled:</strong></div>
                <div class="col-auto" id="demo-typebadge-filled-sm"></div>
                <div class="col-auto" id="demo-typebadge-filled-md"></div>
                <div class="col-auto" id="demo-typebadge-filled-lg"></div>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-auto"><strong>Outlined:</strong></div>
                <div class="col-auto" id="demo-typebadge-outlined-sm"></div>
                <div class="col-auto" id="demo-typebadge-outlined-md"></div>
                <div class="col-auto" id="demo-typebadge-outlined-lg"></div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/typebadge/typebadge.js"></script>

    <script>
    // ====================================================================
    // TypeBadge Demos
    // ====================================================================

    var tbSizes = ["sm", "md", "lg"];
    var tbVariants = ["subtle", "filled", "outlined"];
    tbVariants.forEach(function(variant) {
        tbSizes.forEach(function(size) {
            var el = document.getElementById("demo-typebadge-" + variant + "-" + size);
            if (el) {
                el.appendChild(createTypeBadge({
                    typeKey: "strategy.okr",
                    icon: "crosshair",
                    color: "#C0392B",
                    size: size,
                    variant: variant,
                    showNamespace: size === "lg"
                }));
            }
        });
    });

    </script>
</body>
</html>
