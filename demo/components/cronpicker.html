<!--
  COMPONENT: DemoPage-CronPicker
  PURPOSE: Standalone demo page for the CronPicker component.
  RELATES: [[CronPicker]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CronPicker - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/cronpicker/cronpicker.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            CronPicker
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="cronpicker-section">
            <h2>CRON Picker</h2>
            <p>A visual builder for 6-field CRON expressions with presets, field editors, human-readable descriptions, and bidirectional raw expression editing.</p>

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Full Builder with Presets</label>
                    <div id="demo-cron-full"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Pre-filled: Weekdays at 9am</label>
                    <div id="demo-cron-prefilled"></div>
                </div>
            </div>

            <div class="row g-4 mt-2">
                <div class="col-md-6">
                    <label class="form-label">Preset-Only Mode (no raw edit)</label>
                    <div id="demo-cron-presets"></div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/cronpicker/cronpicker.js"></script>

    <script>
    // ====================================================================
    // CRON Picker Demos
    // ====================================================================

    createCronPicker("demo-cron-full", {
        value: "0 * * * * *",
        onChange: function(v) { console.log("[CronPicker full]", v); }
    });

    createCronPicker("demo-cron-prefilled", {
        value: "0 0 9 * * 1-5",
        onChange: function(v) { console.log("[CronPicker prefilled]", v); }
    });

    createCronPicker("demo-cron-presets", {
        value: "0 0 0 * * *",
        allowRawEdit: false,
        onChange: function(v) { console.log("[CronPicker presets]", v); }
    });

    </script>
</body>
</html>
