<!--
  COMPONENT: DemoPage-Slider
  PURPOSE: Standalone demo page for the Slider component.
  RELATES: [[Slider]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slider - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/slider/slider.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            Slider
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="slider-section">
            <h2><i class="bi bi-sliders"></i> Slider</h2>
            <p class="text-muted mb-3">Range input with single and dual-thumb modes, tick marks, value labels, and keyboard navigation.</p>

            <div class="row g-4">
                <div class="col-md-6">
                    <h3 class="h5">Single Value</h3>
                    <div id="slider-demo-single"></div>
                </div>
                <div class="col-md-6">
                    <h3 class="h5">Range (Dual Thumb)</h3>
                    <div id="slider-demo-range"></div>
                </div>
            </div>

            <div class="row g-4 mt-2">
                <div class="col-md-6">
                    <h3 class="h5">Formatted + Ticks</h3>
                    <div id="slider-demo-ticks"></div>
                </div>
                <div class="col-md-3">
                    <h3 class="h5">Vertical</h3>
                    <div id="slider-demo-vertical" style="display: flex; justify-content: center;"></div>
                </div>
                <div class="col-md-3">
                    <h3 class="h5">Small Size</h3>
                    <div id="slider-demo-sm"></div>
                </div>
            </div>

            <pre class="mt-3 p-2 demo-output" id="slider-demo-output" style="font-size: 12px; min-height: 32px;"></pre>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/slider/slider.js"></script>

    <script>

    // ── Slider Demo ──
    (function()
    {
        var outputEl = document.getElementById("slider-demo-output");
        function logEvent(msg) { if (outputEl) { outputEl.textContent = msg; } }

        createSlider("slider-demo-single", {
            label: "Volume",
            min: 0,
            max: 100,
            value: 50,
            onChange: function(v) { logEvent("Single: " + v); }
        });

        createSlider("slider-demo-range", {
            mode: "range",
            label: "Price Range",
            min: 0,
            max: 1000,
            step: 10,
            valueLow: 200,
            valueHigh: 800,
            formatValue: function(v) { return "$" + v; },
            onChange: function(v) { logEvent("Range: $" + v.low + " – $" + v.high); }
        });

        createSlider("slider-demo-ticks", {
            label: "Temperature (°C)",
            min: 0,
            max: 50,
            step: 5,
            value: 20,
            showTicks: true,
            formatValue: function(v) { return v + "°C"; },
            onChange: function(v) { logEvent("Temperature: " + v + "°C"); }
        });

        createSlider("slider-demo-vertical", {
            orientation: "vertical",
            min: 0,
            max: 100,
            value: 60,
            onChange: function(v) { logEvent("Vertical: " + v); }
        });

        createSlider("slider-demo-sm", {
            label: "Opacity",
            size: "sm",
            min: 0,
            max: 100,
            value: 75,
            formatValue: function(v) { return v + "%"; },
            onChange: function(v) { logEvent("Small: " + v + "%"); }
        });

        logEvent("Drag a slider thumb or use arrow keys.");
    })();

    </script>
</body>
</html>
