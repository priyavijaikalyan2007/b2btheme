<!--
  COMPONENT: DemoPage-SymbolPicker
  PURPOSE: Standalone demo page for the SymbolPicker component.
  RELATES: [[SymbolPicker]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SymbolPicker - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/symbolpicker/symbolpicker.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            SymbolPicker
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="symbolpicker-section">
            <h2><i class="bi bi-grid-3x3"></i> SymbolPicker</h2>
            <p class="text-muted mb-3">Grid-based symbol and icon picker with Unicode characters and Bootstrap Icons, category tabs, search, and preview.</p>

            <div class="row g-4">
                <div class="col-md-6">
                    <h3 class="h5">Popup Mode</h3>
                    <p class="text-muted small">Click the trigger button to open the picker.</p>
                    <div id="symbolpicker-demo-popup"></div>
                </div>
                <div class="col-md-6">
                    <h3 class="h5">Inline Mode (Unicode Only)</h3>
                    <p class="text-muted small">Always visible, showing only Unicode symbols.</p>
                    <div id="symbolpicker-demo-inline"></div>
                </div>
            </div>
            <pre class="mt-3 p-2 demo-output" id="symbolpicker-demo-output" style="font-size: 12px; min-height: 32px;"></pre>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/symbolpicker/symbolpicker.js"></script>

    <script>

    // ── SymbolPicker Demos ──
    (function()
    {
        var outputEl = document.getElementById("symbolpicker-demo-output");
        function logEvent(msg) { if (outputEl) { outputEl.textContent = msg; } }

        // Popup mode (both Unicode + Icons)
        createSymbolPicker("symbolpicker-demo-popup", {
            mode: "both",
            onSelect: function(sym) { logEvent("Selected: " + sym.char + " — " + sym.name); },
            onInsert: function(sym) { logEvent("Inserted: " + sym.char + " (" + sym.code + ")"); }
        });

        // Inline mode (Unicode only)
        createSymbolPicker("symbolpicker-demo-inline", {
            mode: "unicode",
            inline: true,
            columns: 14,
            showPreview: true,
            onSelect: function(sym) { logEvent("Inline selected: " + sym.char + " — " + sym.name); },
            onInsert: function(sym) { logEvent("Inline inserted: " + sym.char + " (" + sym.code + ")"); }
        });
    })();

    </script>
</body>
</html>
