<!--
  COMPONENT: DemoPage-ContextMenu
  PURPOSE: Standalone demo page for the ContextMenu component.
  RELATES: [[ContextMenu]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ContextMenu - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/contextmenu/contextmenu.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            ContextMenu
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section">
            <h2>ContextMenu</h2>
            <p class="text-muted">Theme-aware context menu with icons, shortcuts, sub-menus, and keyboard navigation.</p>
            <div id="demo-contextmenu-area" style="position: relative; min-height: 250px; border: 1px solid var(--theme-border-color); padding: 16px; display: flex; align-items: center; justify-content: center; cursor: context-menu; user-select: none; font-size: 14px; color: var(--bs-secondary-color);">
                Right-click here to open context menu
            </div>
            <pre class="demo-output mt-3 p-2" id="demo-output" style="font-size: 12px; max-height: 150px; overflow-y: auto;"></pre>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/contextmenu/contextmenu.js"></script>

    <script>
    (function()
    {
        "use strict";
        var LOG = "[ContextMenu Demo]";
        var output = document.getElementById("demo-output");
        function log(msg) { output.textContent += msg + "\n"; output.scrollTop = output.scrollHeight; }

        if (typeof createContextMenu !== "function") { log("ERROR: createContextMenu not available"); return; }

        var area = document.getElementById("demo-contextmenu-area");

        var menuItems = [
            { id: "cut", label: "Cut", icon: "scissors", shortcut: "Ctrl+X" },
            { id: "copy", label: "Copy", icon: "clipboard", shortcut: "Ctrl+C" },
            { id: "paste", label: "Paste", icon: "clipboard-check", shortcut: "Ctrl+V" },
            { id: "sep1", label: "", type: "separator" },
            { id: "format", label: "Format", icon: "type", type: "submenu", children: [
                { id: "bold", label: "Bold", icon: "type-bold", shortcut: "Ctrl+B" },
                { id: "italic", label: "Italic", icon: "type-italic", shortcut: "Ctrl+I" },
                { id: "underline", label: "Underline", icon: "type-underline", shortcut: "Ctrl+U" }
            ]},
            { id: "sep2", label: "", type: "separator" },
            { id: "select-all", label: "Select All", icon: "check2-all", shortcut: "Ctrl+A" },
            { id: "disabled-item", label: "Locked Action", icon: "lock", disabled: true },
            { id: "sep3", label: "", type: "separator" },
            { id: "delete", label: "Delete", icon: "trash", shortcut: "Del", danger: true }
        ];

        area.addEventListener("contextmenu", function(e)
        {
            e.preventDefault();
            var items = menuItems.map(function(item)
            {
                var copy = Object.assign({}, item);
                if (copy.children)
                {
                    copy.children = copy.children.map(function(child)
                    {
                        var cc = Object.assign({}, child);
                        cc.onClick = function(ci) { log(LOG + " Sub-menu selected: " + ci.id + " (" + ci.label + ")"); };
                        return cc;
                    });
                }
                else if (copy.type !== "separator")
                {
                    copy.onClick = function(ci) { log(LOG + " Selected: " + ci.id + " (" + ci.label + ")"); };
                }
                return copy;
            });

            createContextMenu({
                items: items,
                x: e.clientX,
                y: e.clientY,
                onClose: function() { log(LOG + " Menu closed"); }
            });

            log(LOG + " Menu opened at (" + e.clientX + ", " + e.clientY + ")");
        });

        log(LOG + " Ready — right-click the area above to open the context menu");
    })();
    </script>
</body>
</html>
