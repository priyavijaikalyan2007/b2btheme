<!--
  COMPONENT: DemoPage-StatusBar
  PURPOSE: Standalone demo page for the StatusBar component.
  RELATES: [[StatusBar]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StatusBar - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/statusbar/statusbar.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            StatusBar
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="statusbar-section">
            <h2>Status Bar</h2>
            <p>A fixed-to-bottom viewport status bar with configurable label/value regions. Text is natively selectable for Ctrl+C copying — try selecting the bar at the bottom of this page.</p>

            <div class="row g-4">
                <div class="col-md-6">
                    <h3 class="h5">Dynamic Updates</h3>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="demo-sb-set-connected">Set "Connected"</button>
                        <button type="button" class="btn btn-sm btn-outline-warning" id="demo-sb-set-reconnecting">Set "Reconnecting…"</button>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="demo-sb-set-disconnected">Set "Disconnected"</button>
                    </div>
                    <div class="mt-2 d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="demo-sb-update-count">Update Record Count</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="demo-sb-update-time">Update Timestamp</button>
                    </div>
                </div>
                <div class="col-md-6">
                    <h3 class="h5">Region Management</h3>
                    <div class="d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-sm btn-outline-success" id="demo-sb-add-region">Add Region</button>
                        <button type="button" class="btn btn-sm btn-outline-danger" id="demo-sb-remove-region">Remove Region</button>
                    </div>
                    <div class="mt-2 d-flex flex-wrap gap-2">
                        <button type="button" class="btn btn-sm btn-outline-primary" id="demo-sb-gettext">getAllText()</button>
                        <button type="button" class="btn btn-sm btn-outline-secondary" id="demo-sb-toggle">Toggle Visibility</button>
                    </div>
                    <div class="mt-2">
                        <small class="text-muted">Output: </small><code id="demo-sb-output">—</code>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/statusbar/statusbar.js"></script>

    <script>
    // ====================================================================
    // Status Bar Demo
    // ====================================================================

    var statusBar = createStatusBar({
        regions: [
            { id: "connection", icon: "bi-circle-fill", value: "Connected" },
            { id: "env", label: "Environment:", value: "Production" },
            { id: "user", label: "User:", value: "jsmith" },
            { id: "records", label: "Records:", value: "1,284" },
            { id: "updated", label: "Updated:", value: new Date().toLocaleTimeString() },
            { id: "version", value: "v2.4.1" }
        ]
    });

    var sbOutput = document.getElementById("demo-sb-output");
    var sbRecordCount = 1284;
    var sbExtraRegionAdded = false;

    document.getElementById("demo-sb-set-connected").addEventListener("click", function() {
        statusBar.setValue("connection", "Connected");
        statusBar.setIcon("connection", "bi-circle-fill");
        sbOutput.textContent = "Status: Connected";
    });

    document.getElementById("demo-sb-set-reconnecting").addEventListener("click", function() {
        statusBar.setValue("connection", "Reconnecting\u2026");
        statusBar.setIcon("connection", "bi-arrow-repeat");
        sbOutput.textContent = "Status: Reconnecting";
    });

    document.getElementById("demo-sb-set-disconnected").addEventListener("click", function() {
        statusBar.setValue("connection", "Disconnected");
        statusBar.setIcon("connection", "bi-x-circle-fill");
        sbOutput.textContent = "Status: Disconnected";
    });

    document.getElementById("demo-sb-update-count").addEventListener("click", function() {
        sbRecordCount += Math.floor(Math.random() * 50) + 1;
        statusBar.setValue("records", sbRecordCount.toLocaleString());
        sbOutput.textContent = "Records: " + sbRecordCount.toLocaleString();
    });

    document.getElementById("demo-sb-update-time").addEventListener("click", function() {
        var now = new Date().toLocaleTimeString();
        statusBar.setValue("updated", now);
        sbOutput.textContent = "Updated: " + now;
    });

    document.getElementById("demo-sb-add-region").addEventListener("click", function() {
        if (sbExtraRegionAdded) {
            sbOutput.textContent = "Extra region already added.";
            return;
        }
        statusBar.addRegion({ id: "extra", label: "Build:", value: "#4821" });
        sbExtraRegionAdded = true;
        sbOutput.textContent = "Region 'extra' added.";
    });

    document.getElementById("demo-sb-remove-region").addEventListener("click", function() {
        if (!sbExtraRegionAdded) {
            sbOutput.textContent = "No extra region to remove.";
            return;
        }
        statusBar.removeRegion("extra");
        sbExtraRegionAdded = false;
        sbOutput.textContent = "Region 'extra' removed.";
    });

    document.getElementById("demo-sb-gettext").addEventListener("click", function() {
        sbOutput.textContent = statusBar.getAllText();
    });

    document.getElementById("demo-sb-toggle").addEventListener("click", function() {
        if (statusBar.isVisible()) {
            statusBar.hide();
            sbOutput.textContent = "StatusBar hidden.";
        } else {
            statusBar.show();
            sbOutput.textContent = "StatusBar shown.";
        }
    });

    </script>
</body>
</html>
