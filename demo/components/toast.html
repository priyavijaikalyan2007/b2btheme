<!--
  COMPONENT: DemoPage-Toast
  PURPOSE: Standalone demo page for the Toast component.
  RELATES: [[Toast]], [[DemoShell]]
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toast - Enterprise Theme Demo</title>

    <!-- FOUC prevention -->
    <script>
    (function()
    {
        var mode = sessionStorage.getItem("theme-mode") || "auto";
        var dark = mode === "dark" ||
                   (mode === "auto" && matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) { document.documentElement.setAttribute("data-bs-theme", "dark"); }
    })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../dist/css/custom.css">
    <link rel="stylesheet" href="../../dist/icons/bootstrap-icons.css">
    <link rel="stylesheet" href="../../dist/components/themetoggle/themetoggle.css">
    <link rel="stylesheet" href="../../dist/components/toast/toast.css">
    <link rel="stylesheet" href="../shared/demo-shell.css">
</head>
<body class="demo-shell-body">

    <header class="demo-header">
        <h1 class="demo-header-title">
            <a href="../index.html"><i class="bi bi-arrow-left"></i></a>
            Toast
        </h1>
        <div class="demo-header-actions">
            <a href="../index.html" class="demo-back-link">
                <i class="bi bi-grid-3x3-gap"></i> All Components
            </a>
            <div id="demo-theme-toggle"></div>
        </div>
    </header>

    <main class="demo-main">

        <div class="demo-section" id="toast-section">
            <h2><i class="bi bi-bell"></i> Toast</h2>
            <p class="text-muted">Transient non-blocking notifications with stacking, auto-dismiss, and action support. Click buttons to trigger toasts.</p>

            <div class="row g-3">
                <div class="col-auto">
                    <button class="btn btn-primary btn-sm" id="toast-demo-info">Info Toast</button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-success btn-sm" id="toast-demo-success">Success Toast</button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-warning btn-sm" id="toast-demo-warning">Warning Toast</button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-danger btn-sm" id="toast-demo-error">Error Toast</button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-outline-secondary btn-sm" id="toast-demo-action">With Action</button>
                </div>
                <div class="col-auto">
                    <button class="btn btn-outline-danger btn-sm" id="toast-demo-clear">Clear All</button>
                </div>
            </div>
        </div>

    </main>

    <script src="../../dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../dist/components/themetoggle/themetoggle.js"></script>
    <script src="../shared/demo-shell.js"></script>
    <script src="../../dist/components/toast/toast.js"></script>

    <script>
    // Toast Demos
    (function() {
        document.getElementById("toast-demo-info").addEventListener("click", function() {
            showInfoToast("This is an informational notification.", "Info");
        });
        document.getElementById("toast-demo-success").addEventListener("click", function() {
            showSuccessToast("Changes saved successfully.", "Saved");
        });
        document.getElementById("toast-demo-warning").addEventListener("click", function() {
            showWarningToast("Connection is unstable. Retrying...", "Warning");
        });
        document.getElementById("toast-demo-error").addEventListener("click", function() {
            showErrorToast("Failed to save changes. Please try again.", "Error");
        });
        document.getElementById("toast-demo-action").addEventListener("click", function() {
            showToast({
                message: "Item deleted successfully.",
                variant: "warning",
                title: "Deleted",
                actionLabel: "Undo",
                onAction: function() { console.log("[Demo] Undo clicked"); },
                duration: 8000
            });
        });
        document.getElementById("toast-demo-clear").addEventListener("click", function() {
            clearAllToasts();
        });
    })();

    </script>
</body>
</html>
